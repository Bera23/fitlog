<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FitLog">
<title>FitLog</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #8fd42e;
    --blue: #47c8ff;
    --orange: #ffb347;
    --red: #ff4f4f;
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --text: #f0f0f0;
    --muted: #555555;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }

  /* HEADER — slim, just logo + date */
  .header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--mono); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--green), #47ffb5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .date-input { background: transparent; border: none; border-radius: 8px; color: var(--muted); padding: 4px 0; font-size: 12px; font-family: var(--mono); cursor: pointer; outline: none; }
  .weight-row { margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .weight-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--green); padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  .weight-input { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 4px 8px; font-size: 12px; width: 65px; font-family: var(--mono); outline: none; }
  .save-btn { background: var(--green); color: #0a0a0a; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* API KEY SCREEN */
  .api-screen { padding: 40px 20px; text-align: center; }
  .api-screen h2 { font-family: var(--mono); color: var(--green); margin-bottom: 12px; font-size: 18px; }
  .api-screen p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
  .api-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 14px; font-size: 13px; font-family: var(--mono); outline: none; margin-bottom: 10px; }
  .api-save-btn { width: 100%; background: var(--green); color: #0a0a0a; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: var(--mono); letter-spacing: 1px; }
  .api-hint { font-size: 11px; color: #333; margin-top: 8px; }
  .api-hint a { color: var(--muted); }

  /* WEEKLY REPORT */
  .report-section { margin-bottom: 16px; }
  .report-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #161616; }
  .report-stat:last-child { border-bottom: none; }
  .report-stat-label { font-size: 13px; color: var(--muted); }
  .report-stat-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .report-day-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #111; font-size: 12px; }
  .report-day-row:last-child { border-bottom: none; }
  .report-day-name { color: var(--muted); min-width: 28px; font-family: var(--mono); }
  .report-day-bar-wrap { flex: 1; height: 5px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
  .report-day-bar { height: 100%; border-radius: 3px; }
  .report-day-val { min-width: 50px; text-align: right; font-family: var(--mono); font-weight: 700; font-size: 11px; }
  .report-grade { font-size: 48px; text-align: center; margin: 8px 0 4px; }
  .report-grade-label { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .report-grade-sub { text-align: center; font-size: 12px; color: var(--muted); }

  /* SKELETON LOADER */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 800px 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
  .skeleton-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin: 12px 16px 0; }
  .skeleton-time { height: 10px; width: 40px; margin-bottom: 10px; }
  .skeleton-line { height: 14px; margin-bottom: 8px; border-radius: 4px; }
  .skeleton-pills { display: flex; gap: 6px; margin-top: 10px; }
  .skeleton-pill { height: 20px; width: 55px; border-radius: 6px; }
  .skeleton-kcal { height: 28px; width: 50px; border-radius: 4px; }

  /* ZDRAVLJE TAB */
  .zdravlje-section { margin-bottom: 0; }
  .bmi-scale-wrap { margin: 12px 0 8px; }
  .bmi-scale-track { height: 10px; border-radius: 5px; background: linear-gradient(to right, var(--blue) 0%, var(--green) 30%, var(--orange) 55%, var(--red) 75%, #900 100%); position: relative; margin-bottom: 6px; }
  .bmi-scale-marker { position: absolute; top: -4px; width: 4px; height: 18px; background: #fff; border-radius: 2px; transform: translateX(-50%); }
  .bmi-scale-labels { display: flex; justify-content: space-between; font-size: 9px; color: #444; font-family: var(--mono); }
  .zdravlje-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #161616; }
  .zdravlje-stat:last-child { border-bottom: none; }
  .zdravlje-stat-label { font-size: 13px; color: var(--muted); }
  .zdravlje-stat-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .target-input-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .target-input { background: #0d0d0d; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 14px; font-family: var(--mono); width: 75px; outline: none; text-align: center; }
  .prognoza-bar { height: 8px; background: #1a1a1a; border-radius: 4px; overflow: hidden; margin: 8px 0 4px; }
  .prognoza-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.5s ease; }

  /* BOTTOM NAV — replaces top tabs */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #0e0e0e; border-top: 1px solid #1a1a1a; display: flex; z-index: 100; padding: 6px 0 10px; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 6px 0; transition: all 0.2s; }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 600; font-family: var(--sans); letter-spacing: 0.3px; }
  .nav-btn.active .nav-label { color: var(--green); }
  .nav-btn.inactive .nav-label { color: #3a3a3a; }
  .nav-btn.active .nav-icon { filter: none; }
  .nav-btn.inactive .nav-icon { opacity: 0.35; }

  /* CARD */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin: 12px 16px 0; }
  .card-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

  /* MODE TOGGLE */
  .mode-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .mode-btn { flex: 1; padding: 9px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: var(--sans); transition: all 0.2s; }
  .mode-btn.active { background: var(--green); color: #0a0a0a; }
  .mode-btn.inactive { background: #1a1a1a; color: #666; }

  /* INPUT */
  .msg-input { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 12px; color: var(--text); padding: 12px 14px; font-size: 14px; font-family: var(--sans); resize: none; outline: none; line-height: 1.5; }
  .hint { font-size: 11px; color: #2a2a2a; text-align: right; margin: 4px 0 6px; }

  /* SEND BUTTON — smaller, less aggressive */
  .send-btn { padding: 11px 20px; background: var(--green); color: #0a0a0a; border: none; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--sans); letter-spacing: 0.3px; margin-top: 8px; transition: opacity 0.2s; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .send-row .send-btn { flex: 1; margin-top: 0; }

  /* INLINE IMAGE BUTTON */
  .img-btn { position: relative; padding: 11px 14px; background: #1a1a1a; color: var(--muted); border: 1px solid #2a2a2a; border-radius: 10px; cursor: pointer; font-size: 18px; line-height: 1; flex-shrink: 0; transition: all 0.2s; }
  .img-btn.has-image { background: #47c8ff22; border-color: #47c8ff55; color: var(--blue); }
  .img-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-preview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; display: none; }
  .img-preview.show { display: block; }
  .img-analyze-btn { width: 100%; padding: 9px; background: #47c8ff22; color: var(--blue); border: 1px solid #47c8ff44; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--sans); margin-bottom: 8px; transition: opacity 0.2s; }
  .img-analyze-btn:disabled { opacity: 0.5; }

  /* STATS */
  .ring-wrap { position: relative; width: 128px; height: 128px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-kcal { font-size: 22px; font-weight: 800; font-family: var(--mono); }
  .ring-label { font-size: 10px; color: #666; letter-spacing: 1px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; font-size: 12px; }
  .stat-label { color: var(--muted); }
  .stat-val { font-family: var(--mono); font-weight: 700; }
  .goal-row { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .goal-input { background: #0d0d0d; border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 3px 8px; font-size: 12px; font-family: var(--mono); width: 70px; outline: none; }

  /* MACRO BAR */
  .macro-row { margin-bottom: 8px; }
  .macro-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .macro-track { height: 5px; background: #222; border-radius: 3px; overflow: hidden; }
  .macro-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  /* LOG ITEMS — better hierarchy */
  .log-item { background: #0d0d0d; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid #1a1a1a; position: relative; }
  .log-time { font-size: 11px; color: var(--green); font-family: var(--mono); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
  .log-row { display: flex; justify-content: space-between; align-items: flex-start; padding-right: 26px; gap: 10px; }
  .log-items-list { flex: 1; }
  .food-line { font-size: 14px; color: var(--text); font-weight: 500; margin-bottom: 3px; }
  .food-amount { color: var(--muted); font-size: 13px; font-weight: 400; }
  .food-kcal { color: #444; font-size: 11px; }
  .log-kcal { text-align: right; flex-shrink: 0; }
  .log-kcal-num { font-size: 22px; font-weight: 800; font-family: var(--mono); }
  .log-kcal-unit { font-size: 10px; color: #444; }
  .pills { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .log-note { margin-top: 6px; font-size: 11px; color: var(--muted); font-style: italic; }
  .del-btn { position: absolute; top: 6px; right: 6px; background: none; border: none; color: #2a2a2a; cursor: pointer; font-size: 18px; line-height: 1; padding: 8px; font-family: var(--sans); transition: color 0.2s; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
  .del-btn:active { color: var(--red); background: #ff4f4f11; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: #2a2a2a; font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* TOAST — above bottom nav */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px; z-index: 999; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: opacity 0.3s; font-family: var(--sans); }
  .toast.ok { background: var(--green); color: #0a0a0a; }
  .toast.err { background: var(--red); color: #fff; }
  .toast.hide { opacity: 0; }

  /* SETTINGS */
  .settings-link { font-size: 11px; color: #333; text-align: center; margin-top: 8px; cursor: pointer; }
  .settings-link:hover { color: var(--muted); }

  /* STREAK */
  .streak-wrap { display: flex; align-items: center; gap: 16px; }
  .streak-num { font-family: var(--mono); font-size: 52px; font-weight: 700; line-height: 1; color: var(--green); }
  .streak-num.zero { color: #333; }
  .streak-info { flex: 1; }
  .streak-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .streak-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .streak-fire { font-size: 36px; }

  /* WEEK CHART */
  .week-chart { width: 100%; overflow: hidden; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin-bottom: 6px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s ease; }
  .chart-day { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .chart-day.today { color: var(--green); }
  .chart-kcal { font-size: 9px; color: #444; font-family: var(--mono); }
  .week-avg { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; }
  .week-avg-item { text-align: center; }
  .week-avg-val { font-family: var(--mono); font-weight: 700; font-size: 14px; }
  .week-avg-label { color: var(--muted); margin-top: 2px; }

  /* WEIGHT LOG */
  .weight-log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
  .weight-log-item:last-child { border-bottom: none; }
  .weight-log-date { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .weight-log-val { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .weight-log-diff { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }
  .bmi-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .bmi-num { font-size: 36px; font-weight: 800; font-family: var(--mono); }
  .bmi-cat { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .bmi-sub { font-size: 11px; color: var(--muted); }

  /* HISTORY */
  .hist-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #161616; cursor: pointer; transition: background 0.15s; }
  .hist-item:last-child { border-bottom: none; }
  .hist-item:active { background: #161616; }
  .hist-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .hist-date { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 90px; }
  .hist-date.today { color: var(--green); }
  .hist-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .hist-bar-row { display: flex; align-items: center; gap: 6px; }
  .hist-bar-track { flex: 1; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
  .hist-bar-fill { height: 100%; border-radius: 2px; }
  .hist-bar-label { font-size: 10px; font-family: var(--mono); min-width: 38px; text-align: right; }
  .hist-right { text-align: right; min-width: 52px; }
  .hist-net { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .hist-status { font-size: 10px; margin-top: 1px; }
  .hist-empty { text-align: center; padding: 40px 20px; color: #2a2a2a; font-size: 13px; }

  /* TRAINING TAB */
  .ex-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
  .ex-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ex-icon { font-size: 22px; }
  .ex-name { font-size: 15px; font-weight: 700; }
  .ex-inputs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ex-input-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .ex-input-label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .ex-input { width: 62px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: var(--text); padding: 8px 6px; font-size: 16px; font-family: var(--mono); font-weight: 700; text-align: center; outline: none; }
  .ex-sep { font-size: 18px; color: #333; margin-top: 14px; }
  .ex-add-btn { margin-left: auto; background: var(--green); color: #0a0a0a; border: none; border-radius: 10px; padding: 10px 16px; font-weight: 800; font-size: 13px; cursor: pointer; font-family: var(--mono); white-space: nowrap; }
  .ex-add-btn:active { opacity: 0.8; }
  .ex-done-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a1a1a; }
  .ex-done-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #888; padding: 3px 0; }
  .ex-done-kcal { color: var(--blue); font-family: var(--mono); font-weight: 700; }
  .ex-done-del { background: none; border: none; color: #333; cursor: pointer; font-size: 15px; padding: 0 2px; }
  .custom-ex-card { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 14px; padding: 14px; margin-bottom: 8px; border-style: dashed; }
  .workout-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 4px; }
  .workout-total-label { font-size: 12px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .workout-total-val { font-family: var(--mono); font-size: 20px; font-weight: 800; color: var(--blue); }

  /* IMAGE UPLOAD */
  .img-upload-area { border: 2px dashed #2a2a2a; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 8px; position: relative; }
  .img-upload-area:active { border-color: var(--green); }
  .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; display: none; }
  .img-preview.show { display: block; }

  /* HISTORY DETAIL */
  .hist-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .hist-back-btn { background: #1a1a1a; border: none; border-radius: 8px; color: var(--text); padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: var(--sans); }
  .hist-detail-date { font-family: var(--mono); font-size: 14px; color: var(--green); font-weight: 700; }
  .hist-progress-wrap { margin: 12px 0 8px; }
  .hist-progress-track { height: 10px; background: #1a1a1a; border-radius: 5px; overflow: hidden; margin: 6px 0; }
  .hist-progress-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease; }
  .hist-progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .hist-meal-entry { padding: 10px 0; border-bottom: 1px solid #161616; }
  .hist-meal-entry:last-child { border-bottom: none; }
  .hist-meal-time { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
  .hist-meal-name { font-size: 13px; color: #ccc; }
  .hist-meal-kcal { font-size: 13px; font-family: var(--mono); font-weight: 700; }
  .hist-section-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin: 12px 0 6px; }
  .hist-workout-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #161616; font-size: 13px; }
  .hist-workout-entry:last-child { border-bottom: none; }

  /* BOTTOM NAV placeholder */
  .spacer { height: 20px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────

const state = {
  apiKey: localStorage.getItem('fitlog_apikey') || '',
  weight: parseFloat(localStorage.getItem('fitlog_weight')) || null,
  height: parseFloat(localStorage.getItem('fitlog_height')) || null,
  calorieGoal: parseInt(localStorage.getItem('fitlog_goal')) || 2000,
  date: todayStr(),
  dayData: { meals: [], exercises: [] },
  mode: 'food',
  activeTab: 'log',
  loading: false,
  editWeight: false,
  weightInput: '',
  heightInput: '',
  editHeight: false,
  selectedHistoryDate: null,
  imageBase64: null,
  imageMime: null,
  targetWeight: parseFloat(localStorage.getItem('fitlog_target_weight')) || null,
  targetWeightInput: '',
  editTargetWeight: false,
  // Training inputs state per exercise
  trainingInputs: {
    cucnjevi:  { sets: 3, reps: 10 },
    sklekovi:  { sets: 3, reps: 8  },
    plank:     { sets: 3, secs: 15 },
    iskoraci:  { sets: 3, reps: 8  },
    podizanje: { sets: 3, reps: 8  },
    custom:    { name: '', sets: 3, reps: 10 },
  },
};

// Predefined exercises: kcal/rep/kg or kcal/sec/kg
const EXERCISES = [
  { id: 'cucnjevi',  name: 'Čučnjevi',          icon: '🦵', type: 'reps', kcalPerRepPerKg: 0.0033 },
  { id: 'sklekovi',  name: 'Sklekovi od zida',   icon: '🤲', type: 'reps', kcalPerRepPerKg: 0.0020 },
  { id: 'plank',     name: 'Plank',              icon: '🧱', type: 'secs', kcalPerSecPerKg: 0.00083 },
  { id: 'iskoraci',  name: 'Bočni iskoraci',     icon: '⚡', type: 'reps', kcalPerRepPerKg: 0.0028 },
  { id: 'podizanje', name: 'Podizanje nogu',     icon: '🦶', type: 'reps', kcalPerRepPerKg: 0.0018 },
];

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────

function loadDay(date) {
  try {
    const raw = localStorage.getItem('fitlog_day_' + date);
    return raw ? JSON.parse(raw) : { meals: [], exercises: [] };
  } catch { return { meals: [], exercises: [] }; }
}

function saveDay(date, data) {
  localStorage.setItem('fitlog_day_' + date, JSON.stringify(data));
}

// Weight log: [{date, weight}] sorted by date desc
function loadWeightLog() {
  try {
    const raw = localStorage.getItem('fitlog_weightlog');
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveWeightEntry(date, weight) {
  const log = loadWeightLog();
  // Replace if same date exists, otherwise add
  const idx = log.findIndex(e => e.date === date);
  if (idx >= 0) log[idx].weight = weight;
  else log.push({ date, weight });
  // Sort descending
  log.sort((a, b) => b.date.localeCompare(a.date));
  localStorage.setItem('fitlog_weightlog', JSON.stringify(log));
}

// Workout log per day: [{id, name, sets, reps, secs, calories, time}]
function loadWorkout(date) {
  try {
    const raw = localStorage.getItem('fitlog_workout_' + date);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveWorkout(date, entries) {
  localStorage.setItem('fitlog_workout_' + date, JSON.stringify(entries));
}

function calcExerciseKcal(ex, sets, reps, secs) {
  const w = state.weight || 80;
  if (ex.type === 'reps') return Math.round(sets * reps * ex.kcalPerRepPerKg * w);
  if (ex.type === 'secs') return Math.round(sets * secs * ex.kcalPerSecPerKg * w);
  return 0;
}

// Safe JSON parse for localStorage — never crashes
function safeParseLS(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// Debounce helper for training inputs
let trainingDebounceTimer = null;
function debounceRender() {
  clearTimeout(trainingDebounceTimer);
  trainingDebounceTimer = setTimeout(render, 120);
}

// ─── GEMINI API ───────────────────────────────────────────────────────────────

async function callGemini(prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.1 }
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API greška');
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function parseFood(text) {
  const w = state.weight || 75;
  const prompt = `Ti si nutricionistički asistent. Korisnik opisuje šta je jeo.
Korisnikova telesna masa je ${w} kg.
Iz opisa izvuci namirnice i proceni kalorije, makronutrijente i šećer.
Vrati SAMO validan JSON, bez ikakvog teksta pre ili posle, bez markdown oznaka.
Format:
{"items":[{"name":"naziv","amount":"kolicina","calories":broj,"protein":broj,"carbs":broj,"fat":broj,"sugar":broj}],"total_calories":broj,"total_protein":broj,"total_carbs":broj,"total_fat":broj,"total_sugar":broj,"note":"napomena ili prazan string"}
Napomena: sugar je dodati i prirodni šećer u gramima.

Unos korisnika: ${text}`;

  const raw = await callGemini(prompt);
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

async function parseExercise(text) {
  const w = state.weight || 75;
  const prompt = `Ti si fitness asistent. Korisnik opisuje fizičke aktivnosti.
Korisnikova telesna masa je ${w} kg.
Iz opisa izvuci aktivnosti i proceni potrošnju kalorija.
Vrati SAMO validan JSON, bez ikakvog teksta pre ili posle, bez markdown oznaka.
Format:
{"items":[{"name":"naziv aktivnosti","detail":"trajanje/broj","calories_burned":broj}],"total_burned":broj,"note":"napomena ili prazan string"}

Unos korisnika: ${text}`;

  const raw = await callGemini(prompt);
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

async function parseFoodFromImage(base64, mimeType) {
  const w = state.weight || 75;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`;
  const prompt = `Ti si nutricionistički asistent. Analiziraj ovu sliku hrane.
Korisnikova telesna masa je ${w} kg.
Proceni namirnice, porcije, kalorije, makronutrijente i šećer koje vidiš na slici.
Vrati SAMO validan JSON, bez ikakvog teksta pre ili posle, bez markdown oznaka.
Format:
{"items":[{"name":"naziv","amount":"kolicina","calories":broj,"protein":broj,"carbs":broj,"fat":broj,"sugar":broj}],"total_calories":broj,"total_protein":broj,"total_carbs":broj,"total_fat":broj,"total_sugar":broj,"note":"napomena"}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { text: prompt },
        { inline_data: { mime_type: mimeType, data: base64 } }
      ]}],
      generationConfig: { temperature: 0.1 }
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API greška'); }

// ─── TOAST ───────────────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => { el.style.display = 'none'; el.classList.remove('hide'); }, 300);
  }, 3000);
}

// ─── RING SVG ─────────────────────────────────────────────────────────────────

function ringHTML(consumed, burned, goal) {
  const net = consumed - burned;
  const pct = Math.min(1, Math.max(0, net / goal));
  const r = 52, cx = 64, cy = 64;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct;
  const color = net > goal ? '#ff4f4f' : net > goal * 0.8 ? '#ffb347' : '#8fd42e';
  return `
    <div class="ring-wrap">
      <svg width="128" height="128">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="10"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <span class="ring-kcal" style="color:${color}">${Math.round(net)}</span>
        <span class="ring-label">NET kcal</span>
      </div>
    </div>`;
}

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────

function totals() {
  const d = state.dayData;
  const consumed    = d.meals.reduce((s, m) => s + (m.calories || 0), 0);
  const exBurned    = d.exercises.reduce((s, e) => s + (e.burned || 0), 0);
  // Include training tab workout calories in burned total
  const workout     = loadWorkout(state.date);
  const workoutBurned = workout.reduce((s, e) => s + (e.calories || 0), 0);
  const burned      = exBurned + workoutBurned;
  const protein     = d.meals.reduce((s, m) => s + (m.protein || 0), 0);
  const carbs       = d.meals.reduce((s, m) => s + (m.carbs || 0), 0);
  const fat         = d.meals.reduce((s, m) => s + (m.fat || 0), 0);
  const sugar       = d.meals.reduce((s, m) => s + (m.sugar || 0), 0);
  return { consumed, burned, protein, carbs, fat, sugar, net: consumed - burned };
}

function macroBar(label, value, min, max, color, unit) {
  unit = unit || 'g';
  const pct = Math.min(100, (value / max) * 100);
  const minPct = Math.min(100, (min / max) * 100);
  const overMin = value >= min;
  const overMax = value > max;
  const statusColor = overMax ? 'var(--red)' : overMin ? color : 'var(--orange)';
  const statusIcon = overMax ? '↑' : overMin ? '✓' : '!';
  const overageHTML = overMax
    ? `<div style="text-align:right;font-size:10px;color:var(--red);font-weight:700;margin-top:2px">+${Math.round(value - max)}${unit} iznad max</div>`
    : '';
  return `
    <div class="macro-row">
      <div class="macro-top">
        <span style="color:${color};font-weight:600">${label}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:${statusColor};font-weight:700">${statusIcon}</span>
          <span style="color:${statusColor};font-weight:700">${Math.round(value)}${unit}</span>
          <span style="color:#2a2a2a;font-size:10px">/ ${max}${unit}</span>
        </div>
      </div>
      <div class="macro-track" style="position:relative">
        <div class="macro-fill" style="width:${pct}%;background:${statusColor}"></div>
        <div style="position:absolute;top:-3px;bottom:-3px;left:${minPct}%;width:2px;background:#3a3a3a;border-radius:1px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#2a2a2a;margin-top:2px">
        <span>0</span>
        <span style="color:#333">min ${min}${unit}</span>
        <span>${max}${unit}</span>
      </div>
      ${overageHTML}
    </div>`;
}

// ─── WEEK DATA & STREAK ───────────────────────────────────────────────────────

// Returns current week Mon–Sun (future days shown as empty)
function getWeekData() {
  const result = [];
  const today = new Date();
  const dow = today.getDay(); // 0=Sun, 1=Mon...
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const dateStr = d.toISOString().slice(0, 10);
    if (d > today) {
      result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, hasData: false, future: true });
      continue;
    }
    const raw = localStorage.getItem('fitlog_day_' + dateStr);
    if (raw) {
      const day = safeParseLS('fitlog_day_' + dateStr);
      if (!day) { result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, hasData: false, future: false }); continue; }
      const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
      const exBurned  = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
      const workoutDay = safeParseLS('fitlog_workout_' + dateStr) || [];
      const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
      const burned = exBurned + workoutBurned;
      result.push({ date: dateStr, consumed, burned, net: consumed - burned, hasData: consumed > 0, future: false });
    } else {
      result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, hasData: false, future: false });
    }
  }
  return result;
}

function calcStreak() {
  let streak = 0;

  // Helper: get net calories for a date including workout
  function getDayNet(dateStr) {
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (!day) return null;
    const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
    if (consumed === 0) return null;
    const exBurned = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
    const workoutDay = safeParseLS('fitlog_workout_' + dateStr) || [];
    const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
    return consumed - exBurned - workoutBurned;
  }

  // Check if today counts
  const todayNet = getDayNet(todayStr());
  const todayInDeficit = todayNet !== null && todayNet < state.calorieGoal;

  for (let i = todayInDeficit ? 0 : 1; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    const net = getDayNet(dateStr);
    if (net === null) break;
    if (net < state.calorieGoal) streak++;
    else break;
  }
  return streak;
}

function weekChartHTML(weekData) {
  const goal = state.calorieGoal;
  const maxNet = Math.max(goal * 1.3, ...weekData.map(d => d.net));
  const days = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su']; // Sun=0 index kept for getDay()
  const todayDate = todayStr();

  const bars = weekData.map(d => {
    const date = new Date(d.date + 'T12:00:00');
    const dayLabel = days[date.getDay()];
    const isToday = d.date === todayDate;
    const heightPct = d.hasData ? Math.max(4, (d.net / maxNet) * 100) : 4;
    const color = d.future ? '#111' : !d.hasData ? '#1a1a1a' : d.net < goal ? '#8fd42e' : '#ff4f4f';
    const kcalLabel = d.hasData ? (d.net >= 1000 ? Math.round(d.net/100)/10 + 'k' : Math.round(d.net)) : '';
    return `
      <div class="chart-col">
        <div class="chart-kcal">${kcalLabel}</div>
        <div class="chart-bar" style="height:${heightPct}%;background:${color};opacity:${isToday ? 1 : 0.7}"></div>
        <div class="chart-day ${isToday ? 'today' : ''}">${dayLabel}</div>
      </div>`;
  }).join('');

  // Goal line position
  const goalPct = Math.min(95, (goal / maxNet) * 100);

  // Weekly averages (only days with data)
  const daysWithData = weekData.filter(d => d.hasData && !d.future);
  const avgNet = daysWithData.length ? Math.round(daysWithData.reduce((s, d) => s + d.net, 0) / daysWithData.length) : 0;
  const deficitDays = daysWithData.filter(d => d.net < goal).length;
  const avgColor = avgNet < goal ? 'var(--green)' : 'var(--red)';

  return `
    <div class="week-chart">
      <div style="position:relative">
        <div style="position:absolute;bottom:${goalPct}%;left:0;right:0;height:1px;background:#3a3a3a;z-index:1;display:flex;align-items:center;justify-content:flex-end">
          <span style="background:#1a1a1a;padding:1px 5px;font-size:9px;color:#555;font-family:var(--mono);border:1px solid #2a2a2a;border-radius:3px;line-height:1.4;margin-right:2px">cilj ${goal}</span>
        </div>
        <div class="chart-bars">${bars}</div>
      </div>
      <div class="week-avg">
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:${avgColor}">${avgNet > 0 ? avgNet : '-'}</div>
          <div class="week-avg-label">prosek kcal</div>
        </div>
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:var(--green)">${deficitDays}/${daysWithData.length}</div>
          <div class="week-avg-label">dana u deficitu</div>
        </div>
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:${avgNet < goal ? 'var(--green)' : 'var(--red)'}">
            ${avgNet > 0 ? (avgNet < goal ? '✓ deficit' : '✗ višak') : '-'}
          </div>
          <div class="week-avg-label">nedeljni status</div>
        </div>
      </div>
    </div>`;
}

function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: 'Pothranjenost', color: 'var(--blue)' };
  if (bmi < 25)   return { label: 'Normalna težina', color: 'var(--green)' };
  if (bmi < 30)   return { label: 'Prekomerna težina', color: 'var(--orange)' };
  if (bmi < 35)   return { label: 'Gojaznost I', color: 'var(--red)' };
  if (bmi < 40)   return { label: 'Gojaznost II', color: 'var(--red)' };
  return { label: 'Gojaznost III', color: 'var(--red)' };
}

function weightCardHTML() {
  const log = loadWeightLog();
  const h = state.height;
  const current = log[0] || null;
  const prev = log[1] || null;

  // BMI
  let bmiHTML = '';
  if (current && h) {
    const bmi = current.weight / ((h / 100) ** 2);
    const cat = bmiCategory(bmi);
    const idealMin = Math.round(18.5 * (h / 100) ** 2);
    const idealMax = Math.round(24.9 * (h / 100) ** 2);
    bmiHTML = `
      <div class="bmi-row">
        <div class="bmi-num" style="color:${cat.color}">${bmi.toFixed(1)}</div>
        <div>
          <div class="bmi-cat" style="color:${cat.color}">${cat.label}</div>
          <div class="bmi-sub">Idealna težina: ${idealMin}–${idealMax} kg</div>
          ${current.weight > idealMax ? `<div class="bmi-sub" style="color:var(--orange)">Do idealne: -${Math.round(current.weight - idealMax)} kg</div>` : ''}
        </div>
      </div>`;
  }

  // Diff between last two entries
  let diffHTML = '';
  if (current && prev) {
    const diff = current.weight - prev.weight;
    const color = diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--muted)';
    const sign = diff > 0 ? '+' : '';
    diffHTML = `<span class="weight-log-diff" style="background:${color}22;color:${color}">${sign}${diff.toFixed(1)} kg</span>`;
  }

  // Log list (last 6 entries)
  const logHTML = log.slice(0, 6).map((e, i) => {
    let entryDiff = '';
    if (i < log.length - 1) {
      const d = e.weight - log[i + 1].weight;
      const c = d < 0 ? 'var(--green)' : d > 0 ? 'var(--red)' : 'var(--muted)';
      entryDiff = `<span class="weight-log-diff" style="background:${c}22;color:${c}">${d > 0 ? '+' : ''}${d.toFixed(1)}</span>`;
    }
    return `<div class="weight-log-item">
      <span class="weight-log-date">${e.date}</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${entryDiff}
        <span class="weight-log-val">${e.weight} kg</span>
        <button onclick="deleteWeightEntry('${e.date}')" style="background:none;border:none;color:#2a2a2a;cursor:pointer;font-size:16px;padding:4px 6px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px" title="Obriši ovaj unos">×</button>
      </div>
    </div>`;
  }).join('');

  // Height input row
  const heightRow = h
    ? `<span style="color:#444;font-size:11px">Visina: ${h} cm <span onclick="startEditHeight()" style="color:#555;cursor:pointer;text-decoration:underline">izmeni</span></span>`
    : `<button class="weight-btn" onclick="startEditHeight()" style="font-size:11px">+ Unesi visinu (za BMI)</button>`;

  return `
    <div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>Težina</span>
        ${heightRow}
      </div>
      ${state.editHeight ? `
        <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
          <span style="font-size:12px;color:var(--muted)">Visina:</span>
          <input class="weight-input" id="hInput" type="number" value="${state.heightInput}" placeholder="cm" style="width:70px"/>
          <button class="save-btn" onclick="saveHeight()">Sačuvaj</button>
        </div>` : ''}
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:${log.length ? 12 : 0}px">
        <div style="font-size:42px;font-weight:800;font-family:var(--mono);color:var(--text)">${current ? current.weight : '–'}</div>
        <div style="font-size:14px;color:var(--muted)">kg ${diffHTML}</div>
        <button class="weight-btn" onclick="startEditWeight()" style="margin-left:auto;font-size:11px">
          ${current ? '✏ Izmeri' : '+ Unesi težinu'}
        </button>
      </div>
      ${state.editWeight ? `
        <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
          <span style="font-size:12px;color:var(--muted)">Nova težina:</span>
          <input class="weight-input" id="wInput" type="number" value="${state.weightInput}" placeholder="kg"/>
          <button class="save-btn" onclick="saveWeight()">Sačuvaj</button>
        </div>` : ''}
      ${bmiHTML}
      ${log.length > 0 ? `<div style="margin-top:12px"><div class="card-label" style="margin-bottom:6px">Istorija</div>${logHTML}</div>` : ''}
    </div>`;
}

function getHistoryData(maxDays = 90) {
  const entries = [];
  for (let i = 0; i < maxDays; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (day) {
      const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
      const exBurned  = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
      const workoutDay = safeParseLS('fitlog_workout_' + dateStr) || [];
      const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
      const burned = exBurned + workoutBurned;
      const protein = day.meals?.reduce((s, m) => s + (m.protein || 0), 0) || 0;
      if (consumed > 0 || burned > 0) {
        entries.push({ date: dateStr, consumed, burned, net: consumed - burned, protein });
      }
    }
  }
  return entries;
}

function historyDayDetailHTML(date) {

function historyTabHTML() {
  // Show detail view if a date is selected
  if (state.selectedHistoryDate) {
    return historyDayDetailHTML(state.selectedHistoryDate);
  }

  const entries = getHistoryData();
  if (entries.length === 0) {
    return `<div class="card"><div class="hist-empty">📭 Još nema istorije.<br>Počni da unosiš obroke u Dnevniku!</div></div>`;
  }

  const goal = state.calorieGoal;
  const maxConsumed = Math.max(...entries.map(e => e.consumed), goal);
  const todayDate = todayStr();

  const byMonth = {};
  entries.forEach(e => {
    const month = e.date.slice(0, 7);
    if (!byMonth[month]) byMonth[month] = [];
    byMonth[month].push(e);
  });

  const srMonths = ['', 'Januar', 'Februar', 'Mart', 'April', 'Maj', 'Jun', 'Jul', 'Avgust', 'Septembar', 'Oktobar', 'Novembar', 'Decembar'];
  const dayNames = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su'];

  let html = '';
  Object.keys(byMonth).sort().reverse().forEach(month => {
    const [yr, mo] = month.split('-');
    const monthLabel = `${srMonths[parseInt(mo)]} ${yr}`;
    const monthEntries = byMonth[month];
    const monthAvg = Math.round(monthEntries.reduce((s, e) => s + e.net, 0) / monthEntries.length);
    const monthDeficit = monthEntries.filter(e => e.net < goal).length;
    const avgColor = monthAvg < goal ? 'var(--green)' : 'var(--red)';

    const rows = monthEntries.map(e => {
      const isToday = e.date === todayDate;
      const inDeficit = e.net < goal;
      const dotColor = inDeficit ? '#8fd42e' : '#ff4f4f';
      const netColor = inDeficit ? 'var(--green)' : 'var(--red)';
      const consumedPct = Math.min(100, (e.consumed / maxConsumed) * 100);
      const burnedPct = Math.min(100, (e.burned / maxConsumed) * 100);
      const dayObj = new Date(e.date + 'T12:00:00');
      const dayLabel = isToday ? 'danas' : `${dayNames[dayObj.getDay()]} ${e.date.slice(8)}.`;

      return `<div class="hist-item" onclick="openHistoryDetail('${e.date}')">
        <div class="hist-dot" style="background:${dotColor}"></div>
        <div class="hist-date ${isToday ? 'today' : ''}">${dayLabel}</div>
        <div class="hist-bars">
          <div class="hist-bar-row">
            <div class="hist-bar-track"><div class="hist-bar-fill" style="width:${consumedPct}%;background:#8fd42e66"></div></div>
            <div class="hist-bar-label" style="color:#666">${Math.round(e.consumed)}</div>
          </div>
          ${e.burned > 0 ? `<div class="hist-bar-row">
            <div class="hist-bar-track"><div class="hist-bar-fill" style="width:${burnedPct}%;background:#47c8ff44"></div></div>
            <div class="hist-bar-label" style="color:#47c8ff88">-${Math.round(e.burned)}</div>
          </div>` : ''}
        </div>
        <div class="hist-right">
          <div class="hist-net" style="color:${netColor}">${Math.round(e.net)}</div>
          <div class="hist-status" style="color:${dotColor}">${inDeficit ? '↓' : '↑'}</div>
        </div>
      </div>`;
    }).join('');

    html += `<div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>${monthLabel}</span>
        <span style="color:${avgColor};font-size:10px">${monthDeficit}/${monthEntries.length} dana · prosek ${monthAvg} kcal</span>
      </div>
      ${rows}
    </div>`;
  });

  return html;
}

function weeklyReportHTML(weekData) {
  // weekData passed from render to avoid double compute
  weekData = weekData || getWeekData();
  const goal = state.calorieGoal;
  const daysWithData = weekData.filter(d => d.hasData && !d.future);

  if (daysWithData.length === 0) {
    return `<div class="card"><div class="hist-empty">📭 Nema podataka za ovu nedelju.<br>Počni da unosiš obroke!</div></div>`;
  }

  const totalConsumed = daysWithData.reduce((s, d) => s + d.consumed, 0);
  const totalBurned   = daysWithData.reduce((s, d) => s + d.burned, 0);
  const totalNet      = daysWithData.reduce((s, d) => s + d.net, 0);
  const avgNet        = Math.round(totalNet / daysWithData.length);
  const deficitDays   = daysWithData.filter(d => d.net < goal).length;
  const avgDeficit    = Math.round(goal - avgNet);
  const projectedLoss = ((avgDeficit * 7) / 7700).toFixed(2); // ~7700 kcal per kg fat

  // Grade
  const deficitRatio = deficitDays / daysWithData.length;
  const grade = deficitRatio >= 0.86 ? { emoji: '🏆', label: 'Odlično!', color: 'var(--green)' }
              : deficitRatio >= 0.57 ? { emoji: '💪', label: 'Dobro', color: 'var(--green)' }
              : deficitRatio >= 0.29 ? { emoji: '😐', label: 'Može bolje', color: 'var(--orange)' }
              : { emoji: '😔', label: 'Treba raditi', color: 'var(--red)' };

  const dayNames = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su'];
  const maxNet = Math.max(...weekData.map(d => d.net), goal);

  const dayRows = weekData.map(d => {
    const dayObj = new Date(d.date + 'T12:00:00');
    const name = dayNames[dayObj.getDay()];
    if (d.future) return `<div class="report-day-row">
      <span class="report-day-name">${name}</span>
      <div class="report-day-bar-wrap"><div class="report-day-bar" style="width:0%;background:#1a1a1a"></div></div>
      <span class="report-day-val" style="color:#2a2a2a">—</span>
    </div>`;
    if (!d.hasData) return `<div class="report-day-row">
      <span class="report-day-name">${name}</span>
      <div class="report-day-bar-wrap"><div class="report-day-bar" style="width:2%;background:#1a1a1a"></div></div>
      <span class="report-day-val" style="color:#2a2a2a">0</span>
    </div>`;
    const pct = Math.min(100, (d.net / maxNet) * 100);
    const color = d.net < goal ? 'var(--green)' : 'var(--red)';
    return `<div class="report-day-row" onclick="openDay('${d.date}')" style="cursor:pointer">
      <span class="report-day-name" style="color:${d.net < goal ? 'var(--green)' : 'var(--muted)'}">${name}</span>
      <div class="report-day-bar-wrap"><div class="report-day-bar" style="width:${pct}%;background:${color}55"></div></div>
      <span class="report-day-val" style="color:${color}">${Math.round(d.net)}</span>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-label">Nedeljni izveštaj</div>
      <div class="report-grade">${grade.emoji}</div>
      <div class="report-grade-label" style="color:${grade.color}">${grade.label}</div>
      <div class="report-grade-sub">${deficitDays} od ${daysWithData.length} dana ispod cilja</div>
    </div>

    <div class="card">
      <div class="card-label">Statistike nedelje</div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan dnevni unos</span>
        <span class="report-stat-val" style="color:var(--text)">${Math.round(totalConsumed / daysWithData.length)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečno sagoreno</span>
        <span class="report-stat-val" style="color:var(--blue)">${Math.round(totalBurned / daysWithData.length)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan neto</span>
        <span class="report-stat-val" style="color:${avgNet < goal ? 'var(--green)' : 'var(--red)'}">${avgNet} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan deficit</span>
        <span class="report-stat-val" style="color:${avgDeficit > 0 ? 'var(--green)' : 'var(--red)'}">${avgDeficit > 0 ? '-' : '+'}${Math.abs(avgDeficit)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Ukupno uneseno</span>
        <span class="report-stat-val" style="color:var(--muted)">${Math.round(totalConsumed)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Procenjen gubitak masti</span>
        <span class="report-stat-val" style="color:${avgDeficit > 0 ? 'var(--green)' : 'var(--red)'}">
          ${avgDeficit > 0 ? '~' + projectedLoss + ' kg' : 'Nema deficita'}
        </span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Dani — neto kalorije</div>
      ${dayRows}
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <span style="font-size:10px;color:#2a2a2a">Tapni dan za detalje</span>
      </div>
    </div>`;
}

function deleteWeightEntry(date) {
  const log = loadWeightLog().filter(e => e.date !== date);
  localStorage.setItem('fitlog_weightlog', JSON.stringify(log));
  // Update current weight to latest entry
  if (log.length > 0) {
    state.weight = log[0].weight;
    localStorage.setItem('fitlog_weight', log[0].weight);
  } else {
    state.weight = null;
    localStorage.removeItem('fitlog_weight');
  }
  render();
}

function zdravljeTabHTML() {
  const log = loadWeightLog();
  const current = log[0] || null;
  const h = state.height;
  const w = current ? current.weight : state.weight;
  const age = 30; // approximate — could be added to profile later
  const goal = state.calorieGoal;

  if (!w || !h) {
    return `<div class="card" style="text-align:center;padding:32px 20px">
      <div style="font-size:36px;margin-bottom:12px">⚖️</div>
      <div style="color:var(--muted);font-size:13px">Unesi težinu i visinu u Pregled tabu da vidiš zdravstvene podatke.</div>
    </div>`;
  }

  const bmi = w / ((h / 100) ** 2);
  const cat = bmiCategory(bmi);
  const idealMin = Math.round(18.5 * (h / 100) ** 2);
  const idealMax = Math.round(24.9 * (h / 100) ** 2);
  const toIdeal = Math.max(0, Math.round(w - idealMax));

  // TDEE — Mifflin-St Jeor (muško, sedentarni × 1.2)
  const bmr = Math.round(10 * w + 6.25 * h - 5 * age + 5);
  const tdee = Math.round(bmr * 1.2);
  const suggestedGoal = Math.round(tdee - 500);

  // BMI scale position (clamp 15-45)
  const bmiMin = 15, bmiMax = 45;
  const bmiPct = Math.min(100, Math.max(0, ((bmi - bmiMin) / (bmiMax - bmiMin)) * 100));

  // Target weight prognoza
  const tw = state.targetWeight;
  let progHTML = '';
  if (tw && tw < w) {
    const toTarget = w - tw;
    const weeklyDeficit = goal < tdee ? (tdee - goal) * 7 / 7700 : 0;
    const weeksNeeded = weeklyDeficit > 0 ? Math.ceil(toTarget / weeklyDeficit) : null;
    const progressPct = log.length > 1
      ? Math.min(100, Math.max(0, ((log[log.length-1].weight - w) / (log[log.length-1].weight - tw)) * 100))
      : 0;
    progHTML = `
      <div class="prognoza-bar"><div class="prognoza-fill" style="width:${progressPct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
        <span>Početak: ${log.length > 1 ? log[log.length-1].weight : w} kg</span>
        <span style="color:var(--green)">Cilj: ${tw} kg</span>
      </div>
      ${weeksNeeded ? `<div style="margin-top:8px;font-size:12px;color:var(--muted)">
        Procena: <strong style="color:var(--text)">~${weeksNeeded} nedelja</strong> pri trenutnom deficitu
        ${weeklyDeficit > 0 ? `(~${weeklyDeficit.toFixed(1)} kg/ned)` : ''}
      </div>` : `<div style="margin-top:8px;font-size:12px;color:var(--orange)">Postavi kalorijski deficit da vidiš prognozu.</div>`}`;
  }

function startEditTargetWeight() {
  state.editTargetWeight = true;
  state.targetWeightInput = state.targetWeight || '';
  render();
  document.getElementById('twInput')?.focus();
}

function saveTargetWeight() {
  const v = parseFloat(document.getElementById('twInput')?.value);
  if (!isNaN(v) && v > 0) {
    state.targetWeight = v;
    localStorage.setItem('fitlog_target_weight', v);
  }
  state.editTargetWeight = false;
  render();
}

function clearTargetWeight() {
  state.editTargetWeight = true;
  state.targetWeightInput = state.targetWeight || '';
  render();
  document.getElementById('twInput')?.focus();
}

function openHistoryDetail(date) {
  state.selectedHistoryDate = date;
  render();
  window.scrollTo(0, 0);
}

function closeHistoryDetail() {
  state.selectedHistoryDate = null;
  render();
}

function handleImageSelect(input) {
  const file = input.files[0];
  if (!file) return;
  // Reject files over 8MB — Gemini API limit
  if (file.size > 8 * 1024 * 1024) {
    showToast('Slika je prevelika (max 8MB). Smanji rezoluciju.', 'err');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const b64 = e.target.result.split(',')[1];
    state.imageBase64 = b64;
    state.imageMime = file.type || 'image/jpeg';
    render();
  };
  reader.readAsDataURL(file);
}

async function handleImageSubmit() {
  if (!state.imageBase64) return;
  state.loading = true;
  render();
  try {
    const result = await parseFoodFromImage(state.imageBase64, state.imageMime || 'image/jpeg');
    if (!result?.items?.length) throw new Error('Nije parsovano');
    const now = new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' });
    const meal = {
      id: Date.now(),
      time: now,
      items: result.items,
      calories: result.total_calories,
      protein: result.total_protein,
      carbs: result.total_carbs,
      fat: result.total_fat,
      sugar: result.total_sugar || 0,
      note: result.note || '',
    };
    state.dayData.meals.push(meal);
    saveDay(state.date, state.dayData);
    state.imageBase64 = null;
    state.imageMime = null;
    showToast(`+${Math.round(meal.calories)} kcal dodato ✓`);
  } catch (e) {
    showToast('Greška pri analizi slike. Pokušaj ponovo.', 'err');
  } finally {
    state.loading = false;
    render();
  }
}

function updateTrainingInput(exId, field, value) {
  if (field === 'name') state.trainingInputs[exId][field] = value;
  else state.trainingInputs[exId][field] = parseInt(value) || 0;
  debounceRender(); // debounced to avoid lag on fast typing
}

function addWorkoutEntry(exId) {
  const ex = EXERCISES.find(e => e.id === exId);
  if (!ex) return;
  const inp = state.trainingInputs[exId];
  // Guard against zero values
  if (ex.type === 'reps' && (!inp.sets || !inp.reps)) {
    showToast('Unesi serije i ponavljanja', 'err'); return;
  }
  if (ex.type === 'secs' && (!inp.sets || !inp.secs)) {
    showToast('Unesi serije i sekunde', 'err'); return;
  }
  const calories = calcExerciseKcal(ex, inp.sets, inp.reps || 0, inp.secs || 0);
  const entry = {
    uid: Date.now() + '_' + exId,
    exId,
    name: ex.name,
    sets: inp.sets,
    reps: ex.type === 'reps' ? inp.reps : null,
    secs: ex.type === 'secs' ? inp.secs : null,
    calories,
    time: new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' }),
  };
  const workout = loadWorkout(state.date);
  workout.push(entry);
  saveWorkout(state.date, workout);
  showToast(`${ex.name} dodato · -${calories} kcal`);
  render();
}

function addCustomWorkoutEntry() {
  // Read name directly from DOM to avoid re-render on every keystroke
  const nameEl = document.getElementById('customNameInput');
  const name = nameEl ? nameEl.value.trim() : state.trainingInputs.custom.name.trim();
  if (!name) { showToast('Unesi naziv vežbe', 'err'); return; }
  // Sync name to state for persistence
  state.trainingInputs.custom.name = name;
  const ci = state.trainingInputs.custom;
  const w = state.weight || 80;
  const calories = Math.round(ci.sets * ci.reps * 0.002 * w);
  const entry = {
    uid: Date.now() + '_custom',
    exId: 'custom',
    name,
    sets: ci.sets,
    reps: ci.reps,
    secs: null,
    calories,
    time: new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' }),
  };
  const workout = loadWorkout(state.date);
  workout.push(entry);
  saveWorkout(state.date, workout);
  state.trainingInputs.custom.name = ''; // reset after adding
  showToast(`${entry.name} dodato · ~-${calories} kcal`);
  render();
}

function deleteWorkoutEntry(uid) {
  const workout = loadWorkout(state.date).filter(e => e.uid !== uid);
  saveWorkout(state.date, workout);
  render();
}

function updateGoal(val) {
  const v = parseInt(val);
  if (!isNaN(v) && v > 0) {
    state.calorieGoal = v;
    localStorage.setItem('fitlog_goal', v);

}

function deleteMeal(id) {
  state.dayData.meals = state.dayData.meals.filter(m => m.id !== id);
  saveDay(state.date, state.dayData);

function deleteEx(id) {
  state.dayData.exercises = state.dayData.exercises.filter(e => e.id !== id);

async function handleSubmit() {
  const input = document.getElementById('msgInput')?.value.trim();
  if (!input) return;
  state.loading = true;
  render();

  try {
    const now = new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' });

    if (state.mode === 'food') {
      const result = await parseFood(input);
      if (!result?.items?.length) throw new Error('Nije parsovano');
      const meal = {
        id: Date.now(),
        time: now,
        items: result.items,
        calories: result.total_calories,
        protein: result.total_protein,
        carbs: result.total_carbs,
        fat: result.total_fat,
        sugar: result.total_sugar || 0,
        note: result.note || '',
      };
      state.dayData.meals.push(meal);
      saveDay(state.date, state.dayData);
      showToast(`+${Math.round(meal.calories)} kcal dodato ✓`);
    } else {
      const result = await parseExercise(input);
      if (!result?.items?.length) throw new Error('Nije parsovano');
      const ex = {
        id: Date.now(),
        time: now,
        items: result.items,
        burned: result.total_burned,
        note: result.note || '',
      };
      state.dayData.exercises.push(ex);
      saveDay(state.date, state.dayData);
      showToast(`-${Math.round(ex.burned)} kcal sagoreno ✓`);
    }
  } catch (e) {
    const msg = e.message?.includes('API_KEY_INVALID') || e.message?.includes('API_KEY') ? '❌ Neispravan API ključ — proveri u Promeni API ključ' :
                e.message?.includes('RESOURCE_EXHAUSTED') ? '⏳ API limit — sačekaj minut pa pokušaj' :
                e.message?.includes('quota') ? '⏳ Dnevni limit dostignut' :
                e.message?.includes('Failed to fetch') || e.message?.includes('fetch') ? '📡 Proveri internet konekciju' :
                `Greška: ${e.message?.slice(0, 55) || 'Pokušaj ponovo'}`;
    showToast(msg, 'err');
  } finally {
    state.loading = false;
    render();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

state.dayData = loadDay(state.date);
state.weightInput = state.weight || '';
state.heightInput = state.height || '';

// Migrate: if weight exists but log is empty, add it as today's entry
if (state.weight && loadWeightLog().length === 0) {
  saveWeightEntry(todayStr(), state.weight);
}

render();

// Toast element (persistent)
const toastEl = document.createElement('div');
toastEl.id = 'toast';
toastEl.style.display = 'none';
document.body.appendChild(toastEl);
</script>
</body>
</html>
