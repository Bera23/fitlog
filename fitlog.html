// ─── SWIPE TO DELETE ──────────────────────────────────────────────────────────
const _swipe = {};
function swipeCancel(id) {
  if (!_swipe[id]) return;
  const el = _swipeEl(id);
  const bg = el?.parentElement?.querySelector('.swipe-delete-bg');
  if (el) el.style.transform = 'translateX(0)';
  if (bg) bg.style.opacity = '0';
  delete _swipe[id];
}
// Resolve the inner sliding element based on swipe type
function _swipeEl(id) {
  const type = _swipe[id]?.type;
  if (type === 'hist-product') return document.getElementById('swipe-hist-' + id);
  if (type === 'exercise')     return document.getElementById('swipe-ex-' + id);
  return document.getElementById('swipe-meal-' + id);
}
function swipeStart(e, id, type, date) {
  // Store type and optional date (needed for hist-product delete)
  _swipe[id] = { startX: e.touches[0].clientX, type, date: date || null };
}
function swipeMove(e, id) {
  if (!_swipe[id]) return;
  const dx = e.touches[0].clientX - _swipe[id].startX;
  if (dx >= 0) return;
  const el = _swipeEl(id);
  const bg = el?.parentElement?.querySelector('.swipe-delete-bg');
  if (el) el.style.transform = `translateX(${Math.max(-80, dx)}px)`;
  if (bg) bg.style.opacity = String(Math.min(1, Math.abs(dx) / 60));
}
function swipeEnd(e, id, type) {
  if (!_swipe[id]) return;
  const dx = e.changedTouches[0].clientX - _swipe[id].startX;
  const meta = { ..._swipe[id] }; // capture before delete
  const el = _swipeEl(id);
  const bg = el?.parentElement?.querySelector('.swipe-delete-bg');
  if (dx < -60) {
    if (el) el.style.transform = 'translateX(-100%)';
    if (bg) bg.style.opacity = '0';
    setTimeout(() => {
      if (meta.type === 'meal') deleteMeal(id);
      else if (meta.type === 'exercise') deleteEx(id);
      else if (meta.type === 'hist-product') deleteHistoryProductWithUndo(meta.date, id);
    }, 200);
  } else {
    if (el) el.style.transform = 'translateX(0)';
    if (bg) bg.style.opacity = '0';
  }
  delete _swipe[id];
}

// Returns all products from the last 90 days as a flat array
function getAllHistoryProducts() {
  const all = [];
  for (let i = 0; i < 90; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    loadProducts(localDateStr(d)).forEach(p => all.push(p));
  }
  return all;
}

// Returns the first history product matching name (case-insensitive, trimmed)
function findDuplicateInHistory(name) {
  const normalized = name.trim().toLowerCase();
  return getAllHistoryProducts().find(p => p.name?.trim().toLowerCase() === normalized) || null;
}

// Pending undo state for swipe-deleted history products
let _histUndoPending = null;
let _histUndoTimer   = null;

// Delete a product from history storage only (diary entries untouched), with undo support
function deleteHistoryProductWithUndo(date, id) {
  const products = loadProducts(date);
  const product  = products.find(p => String(p.id) === String(id));
  if (!product) return;

  // Save undo state before removing
  _histUndoPending = { date, product };

  saveProducts(date, products.filter(p => String(p.id) !== String(id)));
  scheduleRender();

  showUndoToast(`"${product.name}" obrisano`);
  clearTimeout(_histUndoTimer);
  // Auto-expire undo state after toast fades
  _histUndoTimer = setTimeout(() => { _histUndoPending = null; }, 4500);
}

// Restore the last swipe-deleted history product
function undoDeleteHistoryProduct() {
  if (!_histUndoPending) return;
  const { date, product } = _histUndoPending;
  clearTimeout(_histUndoTimer);
  _histUndoPending = null;

  const products = loadProducts(date);
  products.unshift(product);
  saveProducts(date, products);
  scheduleRender();
  showToast('Vraćeno ✓');
}

// Generic undo toast — accepts a callback for the undo action
function showUndoToastFor(msg, undoFn) {
  window._currentUndoFn = undoFn;
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${msg}</span><button class="toast-undo-btn" onclick="window._currentUndoFn()">Poništi</button>`;
  el.className = 'toast undo';
  el.style.display = 'flex';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => { el.style.display = 'none'; el.classList.remove('hide'); el.innerHTML = ''; }, 300);
  }, 4000);
}

// Legacy wrapper for history product undo
function showUndoToast(msg) {
  showUndoToastFor(msg, undoDeleteHistoryProduct);
}

function estimateBodyFat(bmi, age, gender) {
  // Deurenberg formula
  const factor = gender === 'male' ? 1 : 0;
  return Math.round((1.20 * bmi) + (0.23 * age) - (10.8 * factor) - 5.4);
}

// Submit handler for the product analyzer — separate from food/exercise flow
async function handleProductSubmit() {
  const input = document.getElementById('productInput')?.value.trim();
  if (!input && !state.productImageBase64) return;

  state.productLoading = true;
  render();

  try {
    const result = await analyzeProduct(
      input || null,
      state.productImageBase64 || null,
      state.productImageMime || 'image/jpeg'
    );
    if (!result?.name) throw new Error('Nije parsovano');

    const product = {
      id:   Date.now(),
      date: state.date,  // stored for display in history and log cards
      time: new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' }),
      ...result,
    };

    // Check for duplicate BEFORE saving — after save the product is in storage
    // and findDuplicateInHistory would always find it (self-match)
    const isDuplicate = !!findDuplicateInHistory(result.name);

    const products = loadProducts(state.date);
    products.unshift(product); // newest first
    saveProducts(state.date, products);

    // Clear inputs after successful scan
    state.productImageBase64 = null;
    state.productImageMime   = null;
    // Clear textarea via DOM (avoids full re-render before state.loading resets)
    const ta = document.getElementById('productInput');
    if (ta) ta.value = '';

    // Warn if a product with this name already existed in history before this scan
    if (isDuplicate) {
      showToast(`⚠️ "${result.name}" već postoji u istoriji`, 'err');
    } else {
      showToast(`${result.name} analiziran ✓`);
    }
  } catch (e) {
    const msg = e.message?.includes('API_KEY') ? '❌ Neispravan API ključ' :
                e.message?.includes('RESOURCE_EXHAUSTED') ? '⏳ API limit — sačekaj minut' :
                e.message?.includes('fetch') ? '📡 Proveri internet konekciju' :
                `Greška: ${e.message?.slice(0, 55) || 'Pokušaj ponovo'}`;
    showToast(msg, 'err');
  } finally {
    state.productLoading = false;
    scheduleRender();
  }
}

// Insert a scanned product into the meal textarea with per-100g macros for accurate AI calculation.
// If the user is on a different tab, switches to the log tab first (triggering a render),
// then appends the formatted line to whatever is already in the textarea.
function addProductToMeal(productId, productDate) {
  const products = loadProducts(productDate);
  const p = products.find(prod => prod.id === productId);
  if (!p) { showToast('Proizvod nije pronađen', 'err'); return; }

  const srv = p.serving_size_g || 100;

  // Build text line: name, gram amount (user will adjust), and per-100g macros in brackets
  // so AI can accurately scale regardless of the final gram value
  const macroTag = `[P:${p.protein_per_100g||0}g/100g UH:${p.carbs_per_100g||0}g/100g M:${p.fat_per_100g||0}g/100g ${p.calories_per_100g||0}kcal/100g]`;
  const line = `${p.name} - ${srv}g ${macroTag}`;

  // Switch to log tab in food mode if needed — product mode has no msgInput in DOM
  if (state.activeTab !== 'log' || state.mode !== 'food') {
    state.activeTab = 'log';
    state.mode = 'food';
    render();
  }

  const ta = document.getElementById('msgInput');
  if (!ta) return;

  // Use state draft as base — ta.value would be empty if render() was just called above
  const current = state.mealInputDraft.trim();
  const newValue = current ? current + '\n' + line : line;
  state.mealInputDraft = newValue;
  ta.value = newValue;
  ta.focus();
  showToast('Dodato u unos ✓');
}

function saveOnboarding() {
  const w = parseFloat(document.getElementById('ob_weight')?.value);
  const h = parseFloat(document.getElementById('ob_height')?.value);
  const age = parseInt(document.getElementById('ob_age')?.value);
  const gender = document.getElementById('ob_gender')?.value;
  const activity = document.getElementById('ob_activity')?.value;
  const fitnessGoal = document.getElementById('ob_goal')?.value || 'lose';

  if (!w || !h || !age) { showToast('Unesi sve podatke', 'err'); return; }

  state.weight = w; localStorage.setItem('fitlog_weight', w);
  state.height = h; localStorage.setItem('fitlog_height', h);
  state.age = age; localStorage.setItem('fitlog_age', age);
  state.gender = gender; localStorage.setItem('fitlog_gender', gender);
  state.activity = activity; localStorage.setItem('fitlog_activity', activity);
  state.fitnessGoal = fitnessGoal; localStorage.setItem('fitlog_fitness_goal', fitnessGoal);
  localStorage.setItem('fitlog_onboarding_done', '1');

  // Save weight to log
  saveWeightEntry(todayStr(), w);

  // Auto water goal
  state.waterGoal = Math.round(w * WATER_ML_PER_KG);

  // Auto calorie goal
  state.calorieGoalManual = false;
  localStorage.removeItem('fitlog_goal_manual');
  autoCalorieGoal();

  showToast('Profil sačuvan! 🎉');

async function scoreMeal(mealId) {
  const meal = state.dayData.meals.find(m => m.id === mealId);
  if (!meal) return;

  // Helper — always re-query to guard against stale ref if render() fires during async
  const getArea = () => document.querySelector(`.log-item[data-id="${mealId}"] .meal-score-area`);

  if (getArea()) {
    getArea().innerHTML = `<div class="meal-score-inline"><span style="font-size:11px;color:var(--muted)">🤖 Ocenjujem...</span></div>`;
  }
  state.mealScoreLoading = mealId;

  try {
    const items = meal.items.map(i => `${i.amount} ${i.name} (${i.calories} kcal)`).join(', ');

    // Infer meal context from logged time (affects scoring expectations)
    const mealHour   = parseInt(meal.time?.split(':')[0]) || 12;
    const mealContext = mealHour < 10 ? 'doručak' : mealHour < 14 ? 'ručak' : mealHour < 18 ? 'užina' : 'večera';

    // Build goal context from actual user state
    const goalMode = state.fitnessGoal === 'gain' ? 'gojenje (kalorijski suficit)'
      : 'mršavljenje (kalorijski deficit)';
    const goalContext = state.calorieGoalManual
      ? `kalorijski cilj ${state.calorieGoal} kcal (ručno postavljeno), cilj: ${goalMode}`
      : `cilj ${goalMode}, kalorijski cilj ${state.calorieGoal} kcal`;

    const profile = buildUserProfile();

    // Calculate calories consumed before this meal and remaining after it
    const consumedBefore = state.dayData.meals
      .filter(m2 => m2.id !== mealId)
      .reduce((s, m2) => s + (m2.calories || 0), 0);
    const consumedAfter  = consumedBefore + (meal.calories || 0);
    const remainingAfter = Math.round(state.calorieGoal - consumedAfter);

    const prompt = `Oceni ovaj obrok (${mealContext}) i daj ocenu 1-10.
Obrok: ${items}
Ukupno: ${Math.round(meal.calories)} kcal, P${Math.round(meal.protein)}g UH${Math.round(meal.carbs)}g M${Math.round(meal.fat)}g Š${Math.round(meal.sugar||0)}g
Kontekst dana: pre ovog obroka ${Math.round(consumedBefore)} kcal, nakon ovog obroka ostaje ${remainingAfter} kcal od dnevnog cilja.
${profile} ${goalContext}.
PRAVILA:
- "comment" mora biti TAČNO max 12 reči — ovo je strogo pravilo, ne smernica
- "suggestion" mora početi sa jednim od: Dodaj / Smanji / Izbegaj / Uključi / Zameni, i biti specifičan za ovaj obrok i ostatak dana (ne "jedi više povrća" nego npr. "Dodaj proteine u večeru — danas si ispod cilja") ili null ako nema smislene preporuke
- Ton: direktan, bez uvoda, bez pohvala tipa "Odličan izbor!"
Vrati SAMO JSON bez markdown: ${GEMINI_MEAL_SCORE_SCHEMA}`;
    const raw = await callGemini([{ text: prompt }], 0.2);
    const result = parseGeminiJson(raw);
    state.mealScores[mealId] = result;
    saveMealScores(state.date, state.mealScores);

    // Re-query after await — element may have been replaced if render() fired during loading
    const resultArea = getArea();
    if (resultArea) {
      const c = result.score >= 7 ? 'var(--green)' : result.score >= 5 ? 'var(--orange)' : 'var(--red)';
      // Render suggestion block only when AI returned a non-null value
      const suggHTML = result.suggestion
        ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text-secondary);line-height:1.4">💡 ${result.suggestion}</div>`
        : '';
      resultArea.innerHTML = `
        <div class="meal-score-inline" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;align-items:center;gap:8px;width:100%">
            <span class="meal-score-num" style="color:${c}">${result.score}/10</span>
            <span style="flex:1;font-size:12px;line-height:1.4">${result.comment}</span>
            <button onclick="clearMealScore('${mealId}')" style="background:none;border:none;color:var(--s8);cursor:pointer;font-size:15px;flex-shrink:0">×</button>
          </div>
          ${suggHTML}
        </div>`;
    }
  } catch(e) {
    state.mealScores[mealId] = { score: null, comment: 'Greška pri analizi.' };
    const errArea = getArea();
    if (errArea) {
      errArea.innerHTML = `<button class="meal-score-btn" onclick="scoreMeal('${mealId}')">🤖 Oceni ponovo</button>`;
    }
  } finally {
    state.mealScoreLoading = null;
    // No render() — DOM already updated above
  }
}

function clearMealScore(mealId) {

// Pending undo state for swipe-deleted meals and exercises
let _mealUndoPending = null, _mealUndoTimer = null;
let _exUndoPending   = null, _exUndoTimer   = null;

function deleteMeal(id) {
  const meal = state.dayData.meals.find(m => m.id === id);
  if (!meal) return;

  // Save undo state before removing
  _mealUndoPending = { meal };
  state.dayData.meals = state.dayData.meals.filter(m => m.id !== id);
  saveDay(state.date, state.dayData);
  scheduleRender();

  showUndoToastFor(`Obrok (${Math.round(meal.calories)} kcal) obrisan`, undoDeleteMeal);
  clearTimeout(_mealUndoTimer);
  _mealUndoTimer = setTimeout(() => { _mealUndoPending = null; }, 4500);
}

function undoDeleteMeal() {
  if (!_mealUndoPending) return;
  const { meal } = _mealUndoPending;
  clearTimeout(_mealUndoTimer);
  _mealUndoPending = null;
  state.dayData.meals.unshift(meal);
  saveDay(state.date, state.dayData);
  scheduleRender();
  showToast('Vraćeno ✓');
}

function deleteEx(id) {
  const ex = state.dayData.exercises.find(e => e.id === id);
  if (!ex) return;

  // Save undo state before removing
  _exUndoPending = { ex };
  state.dayData.exercises = state.dayData.exercises.filter(e => e.id !== id);
  saveDay(state.date, state.dayData);
  scheduleRender();

  showUndoToastFor(`Vežba (${Math.round(ex.burned)} kcal) obrisana`, undoDeleteEx);
  clearTimeout(_exUndoTimer);
  _exUndoTimer = setTimeout(() => { _exUndoPending = null; }, 4500);
}

function undoDeleteEx() {
  if (!_exUndoPending) return;
  const { ex } = _exUndoPending;
  clearTimeout(_exUndoTimer);
  _exUndoPending = null;
  state.dayData.exercises.unshift(ex);

  scheduleRender();
  showToast('Vraćeno ✓');
}

async function handleSubmit() {
  const input = document.getElementById('msgInput')?.value.trim();
  // Require text OR image (image only valid in food mode)
  if (!input && !(state.imageBase64 && state.mode === 'food')) return;
  // Snapshot mode at submit time — mode buttons are disabled during loading
  // but this guards against any future race conditions
  const modeAtSubmit = state.mode;
  state.loading = true;
  render();

  try {
    const now = new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' });

    if (modeAtSubmit === 'food') {
      let result;
      if (state.imageBase64) {
        // Image path — optional text becomes context for the model
        result = await parseFoodFromImage(state.imageBase64, state.imageMime || 'image/jpeg', input || null);
        state.imageBase64 = null;
        state.imageMime = null;
      } else {
        result = await parseFood(input);
      }
      if (!result?.items?.length) throw new Error('Nije parsovano');
      const meal = {
        id: crypto.randomUUID(),
        time: now,
        items: result.items,
        calories: result.total_calories,
        protein: result.total_protein,
        carbs: result.total_carbs,
        fat: result.total_fat,
        sugar: result.total_sugar || 0,
        note: result.note || '',
      };
      state.dayData.meals.push(meal);
      saveDay(state.date, state.dayData);
      state.mealInputDraft = '';   // clear draft after successful submission
      showToast(`+${Math.round(meal.calories)} kcal dodato ✓`);
    } else {
      const result = await parseExercise(input);
      if (!result?.items?.length) throw new Error('Nije parsovano');
      const ex = {
        id: crypto.randomUUID(),
        time: now,
        items: result.items,
        burned: result.total_burned,
        note: result.note || '',
      };
      state.dayData.exercises.push(ex);
      saveDay(state.date, state.dayData);
      state.exerciseInputDraft = ''; // clear draft after successful submission
      showToast(`-${Math.round(ex.burned)} kcal sagoreno ✓`);
    }
  } catch (e) {
    const msg = e.message?.includes('API_KEY_INVALID') || e.message?.includes('API_KEY') ? '❌ Neispravan API ključ — proveri u Promeni API ključ' :
                e.message?.includes('RESOURCE_EXHAUSTED') ? '⏳ API limit — sačekaj minut pa pokušaj' :
                e.message?.includes('quota') ? '⏳ Dnevni limit dostignut' :
                e.message?.includes('Failed to fetch') || e.message?.includes('fetch') ? '📡 Proveri internet konekciju' :
                `Greška: ${e.message?.slice(0, 55) || 'Pokušaj ponovo'}`;
    showToast(msg, 'err');
  } finally {
    state.loading = false;
    scheduleRender();
  }
}

// Run all pending migrations from `from` up to `to`.
// Add a new `if (from < N)` block here whenever LS_VERSION is bumped.
function migrateSchema(from) {
  // v0 → v1: backfill weight log from legacy fitlog_weight scalar if log is empty
  if (from < 1) {
    const w = parseFloat(localStorage.getItem('fitlog_weight'));
    if (w && loadWeightLog().length === 0) {
      saveWeightEntry(todayStr(), w);
    }
  }
}

function checkSchemaVersion() {
  const stored = parseInt(localStorage.getItem('fitlog_version') || '0');
  if (stored < LS_VERSION) {
    migrateSchema(stored);
    localStorage.setItem('fitlog_version', String(LS_VERSION));
  }
}
