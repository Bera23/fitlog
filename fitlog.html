<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FitLog">
<title>FitLog</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #8fd42e;
    --blue: #47c8ff;
    --orange: #ffb347;
    --red: #ff4f4f;
    --pink: #ff6b9d;
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --text: #f0f0f0;
    --text-secondary: #ccc;  /* renamed from --tc */
    --muted: #555;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    /* Surface scale */
    --s0: #0a0a0a;
    --s1: #0d0d0d;
    --s2: #111;
    --s3: #161616;
    --s4: #1a1a1a;
    --s5: #1e1e1e;
    --s6: #2a2a2a;
    --s7: #333;
    --s8: #3a3a3a;
    --s9: #444;
    --s10: #555;
    --s11: #666;
    --tc: #ccc; /* kept for compat */
    --white: #fff;
    /* Elevation tokens */
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    --shadow-nav: 0 -4px 24px rgba(0,0,0,0.5);
    /* Easing */
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }

  /* Webkit scrollbar — minimal */
  ::-webkit-scrollbar { width: 0; }

  /* ── TAB CONTENT ANIMATION ─────────────────────────────── */
  @keyframes tabFadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tab-content { animation: tabFadeIn 0.18s var(--ease); }

  /* HEADER — logo + date */
  .header { padding: 14px 16px 4px; border-bottom: none; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--mono); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--green), #47ffb5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }


  /* HEADER PROGRESS BAR */
  .header-progress-wrap { padding: 8px 16px 0; }
  .header-progress-track { height: 5px; background: var(--s4); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
  .header-progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s var(--ease), background 0.3s; }
  .header-progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); }

  /* ZDRAVLJE SUBTABS */
  .sub-tabs { display: flex; gap: 4px; margin: 12px 16px 0; background: var(--bg); border-radius: 8px; padding: 4px; border: 1px solid var(--border); }
  .sub-tab { flex: 1; padding: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: var(--sans); transition: background 0.15s, color 0.15s; }
  .sub-tab.active { background: var(--green); color: #0a0a0a; font-weight: 800; }
  .sub-tab.inactive { background: transparent; color: var(--s11); }
  .weight-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--green); padding: 4px 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  .weight-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 4px 8px; font-size: 13px; width: 65px; font-family: var(--mono); outline: none; }
  .save-btn { background: var(--green); color: var(--bg); border: none; border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 700; cursor: pointer; }

  /* API KEY SCREEN */
  .api-screen { padding: 40px 20px; text-align: center; }
  .api-screen h2 { font-family: var(--mono); color: var(--green); margin-bottom: 12px; font-size: 18px; }
  .api-screen p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
  .api-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 16px; font-size: 13px; font-family: var(--mono); outline: none; margin-bottom: 10px; }
  .api-save-btn { width: 100%; background: var(--green); color: var(--bg); border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: var(--mono); letter-spacing: 1px; }
  .api-hint { font-size: 11px; color: var(--s7); margin-top: 8px; }
  .api-hint a { color: var(--muted); }

  /* WEEKLY REPORT */
  .report-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--s3); }
  .report-stat:last-child { border-bottom: none; }
  .report-stat-label { font-size: 13px; color: var(--muted); }
  .report-stat-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .report-day-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--s2); font-size: 13px; }
  .report-day-row:last-child { border-bottom: none; }
  .report-day-name { color: var(--muted); min-width: 28px; font-family: var(--mono); }
  .report-day-bar-wrap { flex: 1; height: 5px; background: var(--s4); border-radius: 3px; overflow: hidden; }
  .report-day-bar { height: 100%; border-radius: 3px; }
  .report-day-val { min-width: 50px; text-align: right; font-family: var(--mono); font-weight: 700; font-size: 11px; }
  .report-grade { font-size: 48px; text-align: center; margin: 8px 0 4px; }
  .report-grade-label { text-align: center; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .report-grade-sub { text-align: center; font-size: 13px; color: var(--muted); }

  /* SKELETON LOADER */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton { background: linear-gradient(90deg, var(--s4) 25%, #252525 50%, var(--s4) 75%); background-size: 800px 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  .skeleton-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin: 12px 16px 0; }
  .skeleton-time { height: 10px; width: 40px; margin-bottom: 10px; }
  .skeleton-line { height: 14px; margin-bottom: 8px; border-radius: 4px; }
  .skeleton-pills { display: flex; gap: 6px; margin-top: 10px; }
  .skeleton-pill { height: 20px; width: 55px; border-radius: 8px; }
  .skeleton-kcal { height: 28px; width: 50px; border-radius: 4px; }

  /* ZDRAVLJE TAB */
  .bmi-scale-wrap { margin: 12px 0 8px; }
  .bmi-scale-track { height: 10px; border-radius: 5px; background: linear-gradient(to right, var(--blue) 0%, var(--green) 30%, var(--orange) 55%, var(--red) 75%, #900 100%); position: relative; margin-bottom: 6px; }
  .bmi-scale-marker { position: absolute; top: -4px; width: 4px; height: 18px; background: var(--white); border-radius: 2px; transform: translateX(-50%); }
  .bmi-scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--s9); font-family: var(--mono); }
  .zdravlje-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--s3); }
  .zdravlje-stat:last-child { border-bottom: none; }
  .zdravlje-stat-label { font-size: 13px; color: var(--muted); }
  .zdravlje-stat-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .target-input-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .target-input { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 13px; font-family: var(--mono); width: 75px; outline: none; text-align: center; }
  .prognoza-bar { height: 8px; background: var(--s4); border-radius: 4px; overflow: hidden; margin: 8px 0 4px; }
  .prognoza-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.5s ease; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--s4);
    box-shadow: var(--shadow-nav);
    display: flex; z-index: 100; padding: 6px 0 10px;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; padding: 6px 0;
    transition: opacity 0.15s; position: relative;
  }
  .nav-btn::after {
    content: ''; position: absolute; bottom: 2px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--green);
    opacity: 0; transition: opacity 0.2s var(--ease);
  }
  .nav-btn.active::after { opacity: 1; }
  .nav-icon { font-size: 18px; line-height: 1; transition: transform 0.15s var(--ease); }
  .nav-btn.active .nav-icon { transform: scale(1.12); }
  .nav-label { font-size: 11px; font-weight: 600; font-family: var(--sans); letter-spacing: 0.3px; }
  .nav-btn.active .nav-label { color: var(--green); }
  .nav-btn.inactive .nav-label { color: var(--s8); }
  .nav-btn.active .nav-icon { filter: none; }
  .nav-btn.inactive .nav-icon { opacity: 0.35; }

  /* CARD */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin: 12px 16px 0; box-shadow: var(--shadow-sm); }
  .card-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

  /* MODE TOGGLE */
  .mode-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .mode-btn { flex: 1; padding: 9px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: var(--sans); transition: background 0.15s var(--ease), color 0.15s var(--ease); }
  .mode-btn.active { background: var(--green); color: var(--bg); }
  .mode-btn.inactive { background: var(--s4); color: var(--s11); }

  /* INPUT */
  .msg-input { width: 100%; background: var(--s1); border: 1px solid var(--s6); border-radius: 12px; color: var(--text); padding: 12px 14px; font-size: 14px; font-family: var(--sans); resize: none; outline: none; line-height: 1.6; transition: border-color 0.15s; }
  .msg-input:focus { border-color: var(--s8); }
  .hint { font-size: 11px; color: var(--s6); text-align: right; margin: 4px 0 6px; }

  /* SEND BUTTON */
  .send-btn { width: 100%; padding: 14px 20px; background: var(--green); color: var(--bg); border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; font-family: var(--sans); letter-spacing: 0.3px; margin-top: 2px; transition: opacity 0.2s, transform 0.1s; }
  .send-btn:active:not(:disabled) { transform: scale(0.98); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* INPUT AREA — unified image + text */
  .msg-input { min-height: 90px; }
  .input-img-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; position: relative; -webkit-tap-highlight-color: transparent; }
  .input-img-label input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-strip { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 10px; background: var(--blue)11; border-radius: 8px; border: 1px solid var(--blue)33; }
  .img-strip img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }

  /* STATS */
  .ring-wrap { position: relative; flex-shrink: 0; }
  .ring-wrap svg { display: block; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-kcal { font-size: 22px; font-weight: 800; font-family: var(--mono); }
  .ring-label { font-size: 11px; color: var(--s11); letter-spacing: 1px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; font-size: 13px; }
  .stat-label { color: var(--muted); }
  .stat-val { font-family: var(--mono); font-weight: 700; }
  .goal-row { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .goal-input { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 3px 8px; font-size: 13px; font-family: var(--mono); width: 70px; outline: none; }

  /* MACRO BAR */
  .macro-row { margin-bottom: 8px; }
  .macro-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .macro-track { height: 5px; background: var(--s2); border-radius: 3px; overflow: hidden; }
  .macro-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  /* LOG ITEMS — better hierarchy */
  .log-item { position: relative; overflow: hidden; border-bottom: 1px solid var(--s3); }
  .log-item:last-child { border-bottom: none; }
  .pills { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .log-note { margin-top: 6px; font-size: 11px; color: var(--muted); font-style: italic; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 20px 36px; color: var(--s9); font-size: 13px; line-height: 1.6; }
  .empty-icon { font-size: 40px; margin-bottom: 14px; display: block; opacity: 0.6; }
  .empty-title { font-size: 15px; font-weight: 700; color: var(--s10); margin-bottom: 6px; }

  /* TOAST — above bottom nav */
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 10px) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }
  .toast {
    position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px;
    z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    transition: opacity 0.25s, transform 0.25s;
    font-family: var(--sans);
    animation: toastIn 0.2s var(--ease);
  }
  .toast.ok  { background: var(--green); color: var(--bg); }
  .toast.err { background: var(--red); color: var(--white); }
  .toast.hide { opacity: 0; transform: translate(-50%, -4px) scale(0.97); }

  /* STREAK */
  .streak-wrap { display: flex; align-items: center; gap: 16px; }
  .streak-num { font-family: var(--mono); font-size: 48px; font-weight: 700; line-height: 1; color: var(--green); }
  .streak-num.zero { color: var(--s7); }
  .streak-info { flex: 1; }
  .streak-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .streak-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* WEEK CHART */
  .week-chart { width: 100%; overflow: hidden; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin-bottom: 6px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s ease; }
  .chart-day { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .chart-day.today { color: var(--green); }
  .chart-kcal { font-size: 11px; color: var(--s9); font-family: var(--mono); }
  .week-avg { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 13px; }
  .week-avg-item { text-align: center; }
  .week-avg-val { font-family: var(--mono); font-weight: 700; font-size: 13px; }
  .week-avg-label { color: var(--muted); margin-top: 2px; }

  /* WEIGHT LOG */
  .weight-log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--s4); }
  .weight-log-item:last-child { border-bottom: none; }
  .weight-log-date { font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .weight-log-val { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .weight-log-diff { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }

  /* HISTORY */
  .hist-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--s3); cursor: pointer; transition: background 0.12s; border-radius: 4px; }
  .hist-item:last-child { border-bottom: none; }
  .hist-item:active { background: var(--s4); }
  .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hist-date { font-family: var(--mono); font-size: 13px; color: var(--muted); min-width: 90px; }
  .hist-date.today { color: var(--green); }
  .hist-net { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .hist-empty { text-align: center; padding: 40px 20px; color: var(--s6); font-size: 13px; }

  /* TRAINING TAB */
  .ex-card { background: var(--s2); border: 1px solid var(--s5); border-radius: 12px; padding: 16px; margin-bottom: 8px; transition: border-color 0.15s; }
  .ex-card:focus-within { border-color: var(--s8); }
  .ex-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ex-icon { font-size: 22px; }
  .ex-name { font-size: 15px; font-weight: 700; }
  .ex-inputs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ex-input-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .ex-input-label { font-size: 10px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; font-weight: 600; }
  .ex-input { width: 62px; background: var(--s4); border: 1px solid var(--s6); border-radius: 8px; color: var(--text); padding: 8px 6px; font-size: 15px; font-family: var(--mono); font-weight: 700; text-align: center; outline: none; transition: border-color 0.15s; }
  .ex-input:focus { border-color: var(--s9); }
  .ex-sep { font-size: 18px; color: var(--s7); margin-top: 14px; }
  .ex-add-btn { margin-left: auto; background: var(--green); color: var(--bg); border: none; border-radius: 8px; padding: 10px 16px; font-weight: 800; font-size: 13px; cursor: pointer; font-family: var(--mono); white-space: nowrap; transition: opacity 0.15s, transform 0.1s; }
  .ex-add-btn:active { opacity: 0.85; transform: scale(0.97); }
  .ex-done-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--s5); }
  .ex-done-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); padding: 4px 0; }
  .ex-done-kcal { color: var(--blue); font-family: var(--mono); font-weight: 700; }
  .ex-done-del { background: none; border: none; color: var(--s8); cursor: pointer; font-size: 16px; padding: 2px 4px; transition: color 0.12s; }
  .ex-done-del:hover { color: var(--red); }
  /* Custom exercise — subtle dashed border with blue accent */
  .custom-ex-card { background: var(--s2); border: 1.5px dashed var(--s7); border-radius: 12px; padding: 16px; margin-bottom: 8px; }
  .workout-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 4px; }
  .workout-total-label { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .workout-total-val { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--blue); }

  /* HISTORY DETAIL */
  .hist-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .hist-back-btn { background: var(--s4); border: none; border-radius: 8px; color: var(--text); padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: var(--sans); transition: background 0.12s; }
  .hist-back-btn:active { background: var(--s6); }
  .hist-detail-date { font-family: var(--mono); font-size: 13px; color: var(--green); font-weight: 700; }
  .hist-progress-track { height: 8px; background: var(--s4); border-radius: 4px; overflow: hidden; margin: 6px 0; }
  .hist-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s var(--ease); }
  .hist-progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .hist-meal-entry { padding: 10px 0; border-bottom: 1px solid var(--s3); }
  .hist-meal-entry:last-child { border-bottom: none; }
  .hist-meal-time { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
  .hist-meal-name { font-size: 13px; color: var(--tc); }
  .hist-meal-kcal { font-size: 13px; font-family: var(--mono); font-weight: 700; }
  .hist-section-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin: 12px 0 6px; }
  .hist-workout-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--s3); font-size: 13px; }
  .hist-workout-entry:last-child { border-bottom: none; }

  /* WATER TRACKER */
  .water-drops { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .water-drop {

<body>

<div id="app"></div>

<script>
const SCORE_KEY = 'fitlog_score_';
const MEAL_SCORE_KEY = 'fitlog_meal_scores_';

function loadMealScores(date) {
  const raw = localStorage.getItem(MEAL_SCORE_KEY + date);
  try { return raw ? JSON.parse(raw) : {}; } catch { return {}; }
}

function saveMealScores(date, scores) {
  localStorage.setItem(MEAL_SCORE_KEY + date, JSON.stringify(scores));
}

// ─── STATE ───────────────────────────────────────────────────────────────────

const state = {
  apiKey: localStorage.getItem('fitlog_apikey') || '',
  weight: parseFloat(localStorage.getItem('fitlog_weight')) || null,
  height: parseFloat(localStorage.getItem('fitlog_height')) || null,
  calorieGoal: parseInt(localStorage.getItem('fitlog_goal')) || 2000,
  calorieGoalManual: !!localStorage.getItem('fitlog_goal_manual'),
  date: todayStr(),
  dayData: { meals: [], exercises: [] },
  mode: 'food',
  activeTab: 'log',
  zdravljeSubTab: 'tezina',
  nutritionScore: null,
  nutritionScoreLoading: false,
  expandedScoreDate: null,
  mealScores: {},
  mealScoreLoading: null,
  expandedHistoryMealIds: new Set(),
  expandedMealIds: new Set(),
  expandedExIds: new Set(),
  loading: false,
  editWeight: false,
  weightInput: '',
  heightInput: '',
  editHeight: false,
  selectedHistoryDate: null,
  imageBase64: null,
  imageMime: null,
  drawerOpen: false,
  geminiModel: localStorage.getItem('fitlog_model') || 'gemini-2.0-flash-lite',
  targetWeight: parseFloat(localStorage.getItem('fitlog_target_weight')) || null,
  targetWeightInput: '',
  editTargetWeight: false,
  age: parseInt(localStorage.getItem('fitlog_age')) || 30,
  gender: localStorage.getItem('fitlog_gender') || 'male',
  activity: localStorage.getItem('fitlog_activity') || 'sedentary',
  waterGoal: parseInt(localStorage.getItem('fitlog_water_goal')) || (parseFloat(localStorage.getItem('fitlog_weight')) ? Math.round(parseFloat(localStorage.getItem('fitlog_weight')) * 30) : 2000),
  // Training inputs state per exercise
  trainingInputs: {
    cucnjevi:  { sets: 3, reps: 10 },
    sklekovi:  { sets: 3, reps: 8  },
    plank:     { sets: 3, secs: 15 },
    iskoraci:  { sets: 3, reps: 8  },
    podizanje: { sets: 3, reps: 8  },
    custom:    { name: '', sets: 3, reps: 10 },
  },
};

// Predefined exercises: kcal/rep/kg or kcal/sec/kg
const EXERCISES = [
  { id: 'cucnjevi',  name: 'Čučnjevi',          icon: '🦵', type: 'reps', kcalPerRepPerKg: 0.0033 },
  { id: 'sklekovi',  name: 'Sklekovi od zida',   icon: '🤲', type: 'reps', kcalPerRepPerKg: 0.0020 },
  { id: 'plank',     name: 'Plank',              icon: '🧱', type: 'secs', kcalPerSecPerKg: 0.00083 },
  { id: 'iskoraci',  name: 'Bočni iskoraci',     icon: '⚡', type: 'reps', kcalPerRepPerKg: 0.0028 },
  { id: 'podizanje', name: 'Podizanje nogu',     icon: '🦶', type: 'reps', kcalPerRepPerKg: 0.0018 },
];

// Human-readable activity labels used across tabs and drawer
const ACT_LABELS = { sedentary: 'Sedentarni', light: 'Lako aktivan', moderate: 'Umeren', active: 'Aktivan' };

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────

function loadDay(date) {
  try {
    const raw = localStorage.getItem('fitlog_day_' + date);
    return raw ? JSON.parse(raw) : { meals: [], exercises: [] };
  } catch { return { meals: [], exercises: [] }; }
}

function saveDay(date, data) {
  localStorage.setItem('fitlog_day_' + date, JSON.stringify(data));
}

// Weight log: [{date, weight}] sorted by date desc
function loadWeightLog() {
  try {
    const raw = localStorage.getItem('fitlog_weightlog');
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function loadWater(date) {
  const raw = localStorage.getItem('fitlog_water_' + date);
  return raw ? parseInt(raw) : 0;
}

function saveWater(date, ml) {
  localStorage.setItem('fitlog_water_' + date, String(ml));
}

function loadWaterHistory(days) {
  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    result.push({ date: dateStr, ml: parseInt(localStorage.getItem('fitlog_water_' + dateStr) || 0) });
  }
  return result;
}

function saveWeightEntry(date, weight) {
  const log = loadWeightLog();
  // Replace if same date exists, otherwise add
  const idx = log.findIndex(e => e.date === date);
  if (idx >= 0) log[idx].weight = weight;
  else log.push({ date, weight });
  // Sort descending
  log.sort((a, b) => b.date.localeCompare(a.date));
  localStorage.setItem('fitlog_weightlog', JSON.stringify(log));
}

// Workout log per day: [{id, name, sets, reps, secs, calories, time}]
function loadWorkout(date) {
  try {
    const raw = localStorage.getItem('fitlog_workout_' + date);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveWorkout(date, entries) {
  localStorage.setItem('fitlog_workout_' + date, JSON.stringify(entries));
}

function calcExerciseKcal(ex, sets, reps, secs) {
  const w = state.weight || 80;
  if (ex.type === 'reps') return Math.round(sets * reps * ex.kcalPerRepPerKg * w);
  if (ex.type === 'secs') return Math.round(sets * secs * ex.kcalPerSecPerKg * w);
  return 0;
}

// Safe JSON parse for localStorage — never crashes
function safeParseLS(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ─── API STATS ────────────────────────────────────────────────────────────────

function loadApiStats() {
  return safeParseLS('fitlog_api_stats') || {
    requests: { total: 0, today: 0, todayDate: '' },
    errors: {},
    responseTimes: [],
    tokensApprox: 0,
  };
}

function saveApiStats(s) {
  localStorage.setItem('fitlog_api_stats', JSON.stringify(s));
}

// Called after every Gemini request to record metrics
function trackApiCall({ success, errorType, ms, promptLen, responseLen }) {
  const s = loadApiStats();
  const today = todayStr();
  // Reset daily counter on new day
  if (s.requests.todayDate !== today) { s.requests.today = 0; s.requests.todayDate = today; }
  s.requests.total++;
  s.requests.today++;
  if (!success && errorType) {
    s.errors[errorType] = (s.errors[errorType] || 0) + 1;
  }
  // Keep last 50 response times for rolling average
  s.responseTimes.push(ms);
  if (s.responseTimes.length > 50) s.responseTimes = s.responseTimes.slice(-50);
  // Rough token approximation: 4 chars ≈ 1 token
  s.tokensApprox = (s.tokensApprox || 0) + Math.round((promptLen + responseLen) / 4);
  saveApiStats(s);
}

// Debounce helper for training inputs
let trainingDebounceTimer = null;
function debounceRender() {
  clearTimeout(trainingDebounceTimer);
  trainingDebounceTimer = setTimeout(render, 120);
}

// ─── GEMINI API ───────────────────────────────────────────────────────────────

async function callGemini(prompt, temperature = 0.1) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.geminiModel}:generateContent?key=${state.apiKey}`;
  const start = Date.now();
  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature }
      })
    });
  } catch (fetchErr) {
    trackApiCall({ success: false, errorType: 'NetworkError', ms: Date.now() - start, promptLen: prompt.length, responseLen: 0 });
    throw fetchErr;
  }
  if (!res.ok) {
    const err = await res.json();
    const code = res.status;
    const errType = code === 429 ? '429 TooManyRequests' : code === 503 ? '503 ServiceUnavailable' : code === 404 ? '404 NotFound' : `${code} Error`;
    trackApiCall({ success: false, errorType: errType, ms: Date.now() - start, promptLen: prompt.length, responseLen: 0 });
    throw new Error(err.error?.message || 'API greška');
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  trackApiCall({ success: true, errorType: null, ms: Date.now() - start, promptLen: prompt.length, responseLen: text.length });
  return text;
}

async function parseFood(text) {
  const w = state.weight || 75;
  const prompt = `Ti si nutricionistički asistent. Korisnik opisuje šta je jeo.
Korisnikova telesna masa je ${w} kg.
Iz opisa izvuci namirnice i proceni kalorije, makronutrijente i šećer.
Vrati SAMO validan JSON, bez ikakvog teksta pre ili posle, bez markdown oznaka.
Format:
{"items":[{"name":"naziv","amount":"kolicina","calories":broj,"protein":broj,"carbs":broj,"fat":broj,"sugar":broj}],"total_calories":broj,"total_protein":broj,"total_carbs":broj,"total_fat":broj,"total_sugar":broj,"note":"napomena ili prazan string"}
Napomena: sugar je dodati i prirodni šećer u gramima.

Unos korisnika: ${text}`;

  const raw = await callGemini(prompt);
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

async function parseExercise(text) {
  const w = state.weight || 75;
  const prompt = `Ti si fitness asistent. Korisnik opisuje fizičke aktivnosti.
Korisnikova telesna masa je ${w} kg.
Iz opisa izvuci aktivnosti i proceni potrošnju kalorija.
Vrati SAMO validan JSON, bez ikakvog teksta pre ili posle, bez markdown oznaka.
Format:
{"items":[{"name":"naziv aktivnosti","detail":"trajanje/broj","calories_burned":broj}],"total_burned":broj,"note":"napomena ili prazan string"}

Unos korisnika: ${text}`;

  const raw = await callGemini(prompt);
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

async function parseFoodFromImage(base64, mimeType, textContext) {
  const w = state.weight || 75;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.geminiModel}:generateContent?key=${state.apiKey}`;
  // Append optional user text as extra context for the model
  const contextNote = textContext ? `\nDodatni opis od korisnika: "${textContext}"` : '';
  const prompt = `Ti si nutricionistički asistent. Analiziraj ovu sliku hrane.
Korisnikova telesna masa je ${w} kg.
Proceni namirnice, porcije, kalorije, makronutrijente i šećer koje vidiš na slici.${contextNote}
Vrati SAMO validan JSON, bez ikakvog teksta pre ili posle, bez markdown oznaka.
Format:
{"items":[{"name":"naziv","amount":"kolicina","calories":broj,"protein":broj,"carbs":broj,"fat":broj,"sugar":broj}],"total_calories":broj,"total_protein":broj,"total_carbs":broj,"total_fat":broj,"total_sugar":broj,"note":"napomena"}`;

  const start = Date.now();
  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: prompt },
          { inline_data: { mime_type: mimeType, data: base64 } }
        ]}],
        generationConfig: { temperature: 0.1 }
      })
    });
  } catch (fetchErr) {
    trackApiCall({ success: false, errorType: 'NetworkError', ms: Date.now() - start, promptLen: prompt.length, responseLen: 0 });
    throw fetchErr;
  }
  if (!res.ok) {
    const e = await res.json();
    const code = res.status;
    const errType = code === 429 ? '429 TooManyRequests' : code === 503 ? '503 ServiceUnavailable' : `${code} Error`;
    trackApiCall({ success: false, errorType: errType, ms: Date.now() - start, promptLen: prompt.length, responseLen: 0 });
    throw new Error(e.error?.message || 'API greška');
  }
  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  trackApiCall({ success: true, errorType: null, ms: Date.now() - start, promptLen: prompt.length, responseLen: raw.length });
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

// ─── SETTINGS DRAWER ─────────────────────────────────────────────────────────

function openDrawer() {
  state.drawerOpen = true;
  renderDrawer();
}

function closeDrawer() {
  state.drawerOpen = false;
  renderDrawer();
}

// Persistent DOM element outside #app — survives render() calls
function renderDrawer() {
  let wrap = document.getElementById('settings-drawer-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'settings-drawer-wrap';
    document.body.appendChild(wrap);
  }
  wrap.innerHTML = `
    <div class="drawer-overlay ${state.drawerOpen ? 'open' : ''}" onclick="closeDrawer()"></div>
    <div class="drawer ${state.drawerOpen ? 'open' : ''}">
      ${settingsDrawerHTML()}
    </div>`;
}

function settingsDrawerHTML() {

function saveDrawerProfile() {

function saveDrawerGoal() {
  const val = parseInt(document.getElementById('drawerGoalInput')?.value);
  if (!val || isNaN(val) || val < 500) { showToast('Unesi validan cilj (min 500 kcal)', 'err'); return; }

function updateModel(val) {
  state.geminiModel = val;
  localStorage.setItem('fitlog_model', val);
  showToast(`Model: ${val}`);
  renderDrawer();
}

function clearApiStats() {
  localStorage.removeItem('fitlog_api_stats');
  showToast('Statistika resetovana');
  renderDrawer();
}

function exportData() {
  // Collect all fitlog_ prefixed keys from localStorage
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('fitlog_')) {
      try { data[key] = JSON.parse(localStorage.getItem(key)); }
      catch { data[key] = localStorage.getItem(key); }
    }
  }
  data._exportedAt = new Date().toISOString();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fitlog_backup_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Podaci izvezeni ✓');
}

let toastTimer = null;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  clearTimeout(toastTimer);

    el.classList.add('hide');
    setTimeout(() => { el.style.display = 'none'; el.classList.remove('hide'); }, 300);
  }, 3000);
}

// ─── TDEE / PROFILE HELPERS ───────────────────────────────────────────────────

function calcTDEE(w, h, age, gender, activity) {
  if (!w || !h) return null;
  const actMults = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725 };
  const genderOffset = gender === 'male' ? 5 : -161;
  const bmr = 10 * w + 6.25 * h - 5 * age + genderOffset;
  return Math.round(bmr * (actMults[activity] || 1.2));
}

function autoCalorieGoal() {
  // Only auto-set if user hasn't manually overridden
  if (state.calorieGoalManual) return;
  const tdee = calcTDEE(state.weight, state.height, state.age, state.gender, state.activity);
  if (tdee) {
    state.calorieGoal = tdee - 500;
    localStorage.setItem('fitlog_goal', state.calorieGoal);
  }
}

function macroLimits() {
  // Dynamic macro limits based on calorie goal
  const kcal = state.calorieGoal || 2000;
  return {
    protMin: 130,
    protMax: Math.round((kcal * 0.30) / 4),
    carbMin: Math.round((kcal * 0.20) / 4),
    carbMax: Math.round((kcal * 0.40) / 4),
    fatMin: 50,
    fatMax: Math.round((kcal * 0.30) / 9),
    sugarMax: 50,
  };
}

function loadNutritionScore(date) {
  const raw = localStorage.getItem(SCORE_KEY + date);
  try { return raw ? JSON.parse(raw) : null; } catch { return null; }
}

function saveNutritionScore(date, score) {

// ─── RING SVG ─────────────────────────────────────────────────────────────────

function ringHTML(consumed, burned, goal) {
  const net = consumed - burned;
  const pct = Math.min(1, Math.max(0, net / goal));
  const r = 68, cx = 80, cy = 80;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct;
  const color = net > goal ? 'var(--red)' : 'var(--green)';
  return `
    <div class="ring-wrap" style="width:160px;height:160px">
      <svg width="160" height="160" style="transform:rotate(-90deg)">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s4)" stroke-width="12"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="12"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <span class="ring-kcal" style="color:${color};font-size:36px;line-height:1">${Math.round(net)}</span>
        <span class="ring-label" style="font-size:11px;margin-top:2px">NET kcal</span>
      </div>
    </div>`;
}

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────

function totals() {
  const d = state.dayData;
  const consumed    = d.meals.reduce((s, m) => s + (m.calories || 0), 0);
  const exBurned    = d.exercises.reduce((s, e) => s + (e.burned || 0), 0);
  // Include training tab workout calories in burned total
  const workout     = loadWorkout(state.date);
  const workoutBurned = workout.reduce((s, e) => s + (e.calories || 0), 0);
  const burned      = exBurned + workoutBurned;
  const protein     = d.meals.reduce((s, m) => s + (m.protein || 0), 0);
  const carbs       = d.meals.reduce((s, m) => s + (m.carbs || 0), 0);
  const fat         = d.meals.reduce((s, m) => s + (m.fat || 0), 0);
  const sugar       = d.meals.reduce((s, m) => s + (m.sugar || 0), 0);
  return { consumed, burned, protein, carbs, fat, sugar, net: consumed - burned };
}

function macroBar(label, value, min, max, color, unit) {
  unit = unit || 'g';
  const pct = Math.min(100, (value / max) * 100);
  const overMax = value > max;
  const underMin = min > 0 && value < min;
  const statusColor = overMax ? 'var(--red)' : underMin ? 'var(--orange)' : color;
  const statusIcon = overMax ? '↑' : underMin ? '!' : '✓';
  const overageText = overMax
    ? `<span style="font-size:11px;color:var(--red);font-weight:700;margin-left:4px">+${Math.round(value - max)}${unit}</span>`
    : '';
  return `
    <div class="macro-row">
      <div class="macro-top">
        <span style="color:${color};font-weight:600">${label}</span>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="display:inline-block;width:12px;text-align:center;font-size:11px;color:${statusColor};font-weight:700">${statusIcon}</span>
          <span style="color:${statusColor};font-weight:700;min-width:36px;text-align:right">${Math.round(value)}${unit}</span>
          <span style="color:var(--s8);font-size:11px">/ ${max}${unit}</span>
          ${overageText}
        </div>
      </div>
      <div class="macro-track">
        <div class="macro-fill" style="width:${pct}%;background:${statusColor}"></div>
      </div>
    </div>`;
}

// ─── WEEK DATA & STREAK ───────────────────────────────────────────────────────

// Returns current week Mon–Sun (future days shown as empty)
function getWeekData() {
  const result = [];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  // Always start from Monday of current week
  const dow = today.getDay(); // 0=Sun, 1=Mon...
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  monday.setHours(0, 0, 0, 0);

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    d.setHours(0, 0, 0, 0);
    const dateStr = d.toISOString().slice(0, 10);
    if (d > today) {
      result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, hasData: false, future: true });
      continue;
    }
    const raw = localStorage.getItem('fitlog_day_' + dateStr);
    if (raw) {
      const day = safeParseLS('fitlog_day_' + dateStr);
      if (!day) { result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, hasData: false, future: false }); continue; }
      const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
      const exBurned  = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
      const workoutDay = safeParseLS('fitlog_workout_' + dateStr) || [];
      const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
      const burned = exBurned + workoutBurned;
      result.push({ date: dateStr, consumed, burned, net: consumed - burned, hasData: consumed > 0, future: false });
    } else {
      result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, hasData: false, future: false });
    }
  }
  return result;
}

function calcStreak() {
  let streak = 0;

  // Helper: get net calories for a date including workout
  function getDayNet(dateStr) {
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (!day) return null;
    const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
    if (consumed === 0) return null;
    const exBurned = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
    const workoutDay = safeParseLS('fitlog_workout_' + dateStr) || [];
    const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
    return consumed - exBurned - workoutBurned;
  }

  // Check if today counts
  const todayNet = getDayNet(todayStr());
  const todayInDeficit = todayNet !== null && todayNet < state.calorieGoal;

  for (let i = todayInDeficit ? 0 : 1; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    const net = getDayNet(dateStr);
    if (net === null) break;
    if (net < state.calorieGoal) streak++;
    else break;
  }
  return streak;
}

function weekChartHTML(weekData) {
  const goal = state.calorieGoal;
  const maxNet = Math.max(goal * 1.3, ...weekData.map(d => d.net));
  const days = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su']; // Sun=0 index kept for getDay()
  const todayDate = todayStr();

  const bars = weekData.map(d => {
    const date = new Date(d.date + 'T12:00:00');
    const dayLabel = days[date.getDay()];
    const isToday = d.date === todayDate;
    const heightPct = d.hasData ? Math.max(4, (d.net / maxNet) * 100) : 4;
    const color = d.future ? 'var(--s2)' : !d.hasData ? 'var(--s4)' : d.net < goal ? 'var(--green)' : 'var(--red)';
    const kcalLabel = d.hasData ? (d.net >= 1000 ? Math.round(d.net/100)/10 + 'k' : Math.round(d.net)) : '';
    return `
      <div class="chart-col">
        <div class="chart-kcal">${kcalLabel}</div>
        <div class="chart-bar" style="height:${heightPct}%;background:${color};opacity:${isToday ? 1 : 0.7}"></div>
        <div class="chart-day ${isToday ? 'today' : ''}">${dayLabel}</div>
      </div>`;
  }).join('');

  // Goal line position
  const goalPct = Math.min(95, (goal / maxNet) * 100);

  // Weekly averages (only days with data)
  const daysWithData = weekData.filter(d => d.hasData && !d.future);
  const avgNet = daysWithData.length ? Math.round(daysWithData.reduce((s, d) => s + d.net, 0) / daysWithData.length) : 0;
  const deficitDays = daysWithData.filter(d => d.net < goal).length;
  const avgColor = avgNet < goal ? 'var(--green)' : 'var(--red)';

  return `
    <div class="week-chart">
      <div style="position:relative">
        <div style="position:absolute;bottom:${goalPct}%;left:0;right:0;height:1px;background:var(--s8);z-index:1;display:flex;align-items:center;justify-content:flex-end">
          <span style="background:var(--s4);padding:1px 5px;font-size:9px;color:var(--s10);font-family:var(--mono);border:1px solid var(--s6);border-radius:3px;line-height:1.4;margin-right:2px">cilj ${goal}</span>
        </div>
        <div class="chart-bars">${bars}</div>
      </div>
      <div class="week-avg">
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:${avgColor}">${avgNet > 0 ? avgNet : '-'}</div>
          <div class="week-avg-label">prosek kcal</div>
        </div>
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:var(--green)">${deficitDays}/${daysWithData.length}</div>
          <div class="week-avg-label">dana u deficitu</div>
        </div>
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:${avgNet < goal ? 'var(--green)' : 'var(--red)'}">
            ${avgNet > 0 ? (avgNet < goal ? '✓ deficit' : '✗ višak') : '-'}
          </div>
          <div class="week-avg-label">nedeljni status</div>
        </div>
      </div>
    </div>`;
}

function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: 'Pothranjenost', color: 'var(--blue)' };
  if (bmi < 25)   return { label: 'Normalna težina', color: 'var(--green)' };
  if (bmi < 30)   return { label: 'Prekomerna težina', color: 'var(--orange)' };
  if (bmi < 35)   return { label: 'Gojaznost I', color: 'var(--red)' };
  if (bmi < 40)   return { label: 'Gojaznost II', color: 'var(--red)' };
  return { label: 'Gojaznost III', color: 'var(--red)' };
}



function getHistoryData(maxDays = 90) {
  const entries = [];
  for (let i = 0; i < maxDays; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (day) {
      const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
      const exBurned  = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
      const workoutDay = safeParseLS('fitlog_workout_' + dateStr) || [];
      const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
      const burned = exBurned + workoutBurned;
      const protein = day.meals?.reduce((s, m) => s + (m.protein || 0), 0) || 0;
      if (consumed > 0 || burned > 0) {
        entries.push({ date: dateStr, consumed, burned, net: consumed - burned, protein });
      }
    }
  }
  return entries;
}

  const goal = state.calorieGoal;
  const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
  const workoutBurned = workout.reduce((s, e) => s + (e.calories || 0), 0);
  const exBurned = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
  const totalBurned = workoutBurned + exBurned;
  const net = consumed - totalBurned;
  const inDeficit = net < goal;
  const deficit = goal - net;
  const pct = Math.min(100, (net / goal) * 100);
  const barColor = inDeficit ? 'var(--green)' : 'var(--red)';

  const dObj = new Date(date + 'T12:00:00');
  const dayNum = dObj.getDate();
  const srMonths = ['','jan','feb','mar','apr','maj','jun','jul','avg','sep','okt','nov','dec'];
  const dateLabel = `${dayNum}. ${srMonths[dObj.getMonth()+1]} ${dObj.getFullYear()}.`;

  // Totals for day macros
  const totP = day.meals?.reduce((s,m) => s+(m.protein||0), 0) || 0;
  const totC = day.meals?.reduce((s,m) => s+(m.carbs||0), 0) || 0;
  const totF = day.meals?.reduce((s,m) => s+(m.fat||0), 0) || 0;
  const totS = day.meals?.reduce((s,m) => s+(m.sugar||0), 0) || 0;

  const histMealScores = loadMealScores(date);

  // Meals — collapsible per meal
  const mealsHTML = day.meals?.length ? day.meals.map(m => {
    const ms = histMealScores[m.id];
    const isExp = state.expandedHistoryMealIds.has(m.id);
    const msHTML = ms ? (() => {
      const c = ms.score >= 7 ? 'var(--green)' : ms.score >= 5 ? 'var(--orange)' : 'var(--red)';
      return `<div class="meal-score-inline"><span class="meal-score-num" style="color:${c}">${ms.score}/10</span><span style="flex:1;font-size:13px;line-height:1.4">${ms.comment}</span></div>`;
    })() : '';

    return `
    <div style="border-top:1px solid var(--s3)">
      <div onclick="toggleHistoryMeal(${m.id})" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;cursor:pointer">
        <div>
          <div style="font-size:15px;font-weight:700;font-family:var(--mono);color:var(--green)">${m.time}</div>
          <div style="font-size:13px;color:var(--tc);margin-top:2px">${m.items?.[0] ? m.items[0].name + (m.items.length > 1 ? ` +${m.items.length-1}` : '') : (m.desc||'Obrok')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${ms ? `<span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${ms.score>=7?'var(--green)':ms.score>=5?'var(--orange)':'var(--red)'}">${ms.score}/10</span>` : ''}
          <span style="font-family:var(--mono);font-size:15px;font-weight:800;color:var(--green)">${Math.round(m.calories)}</span>
          <span style="color:var(--muted);font-size:11px">${isExp ? '▲' : '▼'}</span>
        </div>
      </div>
      ${!isExp ? `
      <div style="padding:0 0 10px;display:flex;gap:5px;flex-wrap:wrap">
        <span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(143,212,46,0.1);color:var(--green);font-weight:600">P ${Math.round(m.protein||0)}g</span>
        <span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(71,200,255,0.1);color:var(--blue);font-weight:600">UH ${Math.round(m.carbs||0)}g</span>
        <span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(255,179,71,0.1);color:var(--orange);font-weight:600">M ${Math.round(m.fat||0)}g</span>
        ${(m.sugar||0) > 0 ? `<span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(255,107,157,0.1);color:var(--pink);font-weight:600">Š ${Math.round(m.sugar)}g</span>` : ''}
      </div>` : ''}
      ${isExp ? `
      <div style="padding-bottom:12px">
        ${m.items?.map(it => `<div style="font-size:13px;color:var(--tc);padding:2px 0">${it.amount} ${it.name} <span style="color:var(--s9)">· ${it.calories} kcal</span></div>`).join('') || ''}
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <span class="pill" style="background:var(--green)22;color:var(--green)">P ${Math.round(m.protein||0)}g</span>
          <span class="pill" style="background:var(--blue)22;color:var(--blue)">UH ${Math.round(m.carbs||0)}g</span>
          <span class="pill" style="background:var(--orange)22;color:var(--orange)">M ${Math.round(m.fat||0)}g</span>
          ${m.sugar ? `<span class="pill" style="background:var(--pink)22;color:var(--pink)">Š ${Math.round(m.sugar)}g</span>` : ''}
        </div>
        ${msHTML}
      </div>` : ''}
    </div>`;
  }).join('') : `<div style="color:var(--s7);font-size:13px;padding:12px 0">Nema unetih obroka</div>`;

  // Exercises (AI unos)
  const exHTML = day.exercises?.length ? `
    <div class="hist-section-label" style="margin-top:16px">💪 Aktivnosti</div>
    ${day.exercises.map(e => `
      <div class="hist-workout-entry">
        <div>
          <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${e.time}</div>
          ${e.items?.map(it => `<div style="color:var(--tc)">${it.name} · ${it.detail}</div>`).join('') || ''}
        </div>
        <div style="color:var(--blue);font-family:var(--mono);font-weight:700;flex-shrink:0">-${Math.round(e.burned)} kcal</div>
      </div>`).join('')}` : '';

  const workoutHTML = workout.length ? `
    <div class="hist-section-label" style="margin-top:16px">🏋️ Trening</div>
    ${workout.map(e => `
      <div class="hist-workout-entry">
        <div>
          <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${e.time}</div>
          <div style="color:var(--tc)">${e.name} · ${e.sets}×${e.reps || e.secs+'s'}</div>
        </div>
        <div style="color:var(--blue);font-family:var(--mono);font-weight:700;flex-shrink:0">-${e.calories} kcal</div>
      </div>`).join('')}` : '';

  return `<div class="card">
    <div class="hist-detail-header">
      <button class="hist-back-btn" onclick="closeHistoryDetail()">← Nazad</button>
      <span class="hist-detail-date">${dateLabel}</span>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
      <span style="font-size:32px;font-weight:800;font-family:var(--mono);color:${barColor}">${Math.round(net)}</span>
      <span style="font-size:13px;color:var(--muted)">od ${goal} kcal</span>
    </div>
    <div class="hist-progress-track">
      <div class="hist-progress-fill" style="width:${pct}%;background:${barColor}"></div>
    </div>
    <div class="hist-progress-labels">
      <span>Uneseno: <strong style="color:var(--text)">${Math.round(consumed)}</strong></span>
      <span>Sagoreno: <strong style="color:var(--blue)">${Math.round(totalBurned)}</strong></span>
      <span style="color:${inDeficit?'var(--green)':'var(--red)'}">
        ${inDeficit ? '↓ ' + Math.abs(Math.round(deficit)) : '↑ +' + Math.abs(Math.round(deficit))} kcal
      </span>
    </div>

    ${day.meals?.length ? `
    <div style="display:flex;gap:8px;margin-top:16px;padding:10px 12px;background:var(--s3);border-radius:8px">
      <div style="flex:1;text-align:center">
        <div style="font-size:15px;font-weight:800;font-family:var(--mono);color:var(--green)">${Math.round(totP)}g</div>
        <div style="font-size:11px;color:var(--muted)">proteini</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:15px;font-weight:800;font-family:var(--mono);color:var(--blue)">${Math.round(totC)}g</div>
        <div style="font-size:11px;color:var(--muted)">UH</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:15px;font-weight:800;font-family:var(--mono);color:var(--orange)">${Math.round(totF)}g</div>
        <div style="font-size:11px;color:var(--muted)">masti</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:15px;font-weight:800;font-family:var(--mono);color:var(--pink)">${Math.round(totS)}g</div>
        <div style="font-size:11px;color:var(--muted)">šećer</div>
      </div>
    </div>` : ''}

    <div class="hist-section-label" style="margin-top:16px">🍽 Obroci</div>
    ${mealsHTML}
    ${exHTML}
    ${workoutHTML}
    ${(() => {
      const score = loadNutritionScore(date);
      if (!score) return '';
      const scoreColor = score.score >= 7 ? 'var(--green)' : score.score >= 5 ? 'var(--orange)' : 'var(--red)';
      const isExpanded = state.expandedScoreDate === date;
      return `
    <div style="margin-top:16px;padding:12px;background:var(--s3);border-radius:12px;cursor:pointer" onclick="toggleHistoryScore('${date}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--muted)">🤖 Analiza ishrane</span>
        <span style="font-family:var(--mono);font-size:15px;font-weight:800;color:${scoreColor}">${score.score}/10 ${isExpanded ? '▲' : '▼'}</span>
      </div>
      ${isExpanded ? `
      <div style="margin-top:10px">
        <div class="score-row"><span>${score.calories}</span></div>
        <div class="score-row"><span>${score.protein}</span></div>
        <div class="score-row"><span>${score.fat}</span></div>
        <div class="score-row"><span>${score.sugar}</span></div>
        <div style="margin-top:8px;font-size:13px;color:var(--muted)">${score.tip}</div>
      </div>` : ''}
    </div>`;
    })()}
  </div>`;
}

function historyTabHTML() {
  // Show detail view if a date is selected
  if (state.selectedHistoryDate) {
    return historyDayDetailHTML(state.selectedHistoryDate);
  }

  const entries = getHistoryData();
  if (entries.length === 0) {
    return `<div class="card"><div class="hist-empty">📭 Još nema istorije.<br>Počni da unosiš obroke u Dnevniku!</div></div>`;
  }

  const goal = state.calorieGoal;
  const todayDate = todayStr();

  const byMonth = {};
  entries.forEach(e => {
    const month = e.date.slice(0, 7);
    if (!byMonth[month]) byMonth[month] = [];
    byMonth[month].push(e);
  });

  const srMonths = ['', 'Januar', 'Februar', 'Mart', 'April', 'Maj', 'Jun', 'Jul', 'Avgust', 'Septembar', 'Oktobar', 'Novembar', 'Decembar'];

  let html = '';
  Object.keys(byMonth).sort().reverse().forEach(month => {
    const [yr, mo] = month.split('-');
    const monthLabel = `${srMonths[parseInt(mo)]} ${yr}`;
    const monthEntries = byMonth[month];
    const monthAvg = Math.round(monthEntries.reduce((s, e) => s + e.net, 0) / monthEntries.length);
    const monthDeficit = monthEntries.filter(e => e.net < goal).length;
    const avgColor = monthAvg < goal ? 'var(--green)' : 'var(--red)';

    const rows = monthEntries.map(e => {
      const isToday = e.date === todayDate;
      const inDeficit = e.net < goal;
      const dotColor = inDeficit ? 'var(--green)' : 'var(--red)';
      const netColor = inDeficit ? 'var(--green)' : 'var(--red)';
      const dayNum = e.date.slice(8).replace(/^0/, '');
      const dayLabel = `${dayNum}.${e.date.slice(5,7)}.`;
      const score = loadNutritionScore(e.date);

      return `<div class="hist-item" onclick="openHistoryDetail('${e.date}')">
        <div class="hist-dot" style="background:${dotColor}"></div>
        <div class="hist-date ${isToday ? 'today' : ''}" style="min-width:44px;font-size:13px;font-family:var(--mono)">${dayLabel}</div>
        <div style="flex:1"></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${score ? `<span style="font-family:var(--mono);font-size:11px;color:${score.score>=7?'var(--green)':score.score>=5?'var(--orange)':'var(--red)'};font-weight:700">${score.score}/10</span>` : ''}
          <div class="hist-net" style="font-family:var(--mono);font-size:18px;font-weight:800;color:${netColor};min-width:42px;text-align:right">${Math.round(e.net)}</div>
          <span style="font-size:11px;color:var(--muted)">▶</span>
        </div>
      </div>`;
    }).join('');

    html += `<div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>${monthLabel}</span>
        <span style="color:${avgColor};font-size:10px">${monthDeficit}/${monthEntries.length} dana · prosek ${monthAvg} kcal</span>
      </div>
      ${rows}
    </div>`;
  });

  return html;
}

function trainingTabHTML() {
  const workout = loadWorkout(state.date);
  const totalKcal = workout.reduce((s, e) => s + (e.calories || 0), 0);

  // Group done entries by exercise id
  const doneByEx = {};
  workout.forEach(e => {
    if (!doneByEx[e.exId]) doneByEx[e.exId] = [];
    doneByEx[e.exId].push(e);
  });

  // Predefined exercise cards
  const exCards = EXERCISES.map(ex => {
    const inp = state.trainingInputs[ex.id];
    const done = doneByEx[ex.id] || [];
    const preview = ex.type === 'reps'
      ? calcExerciseKcal(ex, inp.sets, inp.reps, 0)
      : calcExerciseKcal(ex, inp.sets, 0, inp.secs);

    const doneHTML = done.length ? `
      <div class="ex-done-list">
        ${done.map(e => `
          <div class="ex-done-item">
            <span>${e.sets}×${e.reps || e.secs + 's'}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="ex-done-kcal">-${e.calories} kcal</span>
              <button class="ex-done-del" onclick="deleteWorkoutEntry('${e.uid}')">×</button>
            </div>
          </div>`).join('')}
      </div>` : '';

    const inputsHTML = ex.type === 'reps' ? `
      <div class="ex-input-group">
        <div class="ex-input-label">Serije</div>
        <input class="ex-input" type="number" min="1" max="20" value="${inp.sets}"
          oninput="updateTrainingInput('${ex.id}','sets',this.value)" />
      </div>
      <div class="ex-sep">×</div>
      <div class="ex-input-group">
        <div class="ex-input-label">Ponavljanja</div>
        <input class="ex-input" type="number" min="1" max="200" value="${inp.reps}"
          oninput="updateTrainingInput('${ex.id}','reps',this.value)" />
      </div>` : `
      <div class="ex-input-group">
        <div class="ex-input-label">Serije</div>
        <input class="ex-input" type="number" min="1" max="20" value="${inp.sets}"
          oninput="updateTrainingInput('${ex.id}','sets',this.value)" />
      </div>
      <div class="ex-sep">×</div>
      <div class="ex-input-group">
        <div class="ex-input-label">Sekunde</div>
        <input class="ex-input" type="number" min="5" max="600" value="${inp.secs}"
          oninput="updateTrainingInput('${ex.id}','secs',this.value)" />
      </div>`;

    return `<div class="ex-card">
      <div class="ex-header">
        <span class="ex-icon">${ex.icon}</span>
        <span class="ex-name">${ex.name}</span>
      </div>
      <div class="ex-inputs">
        ${inputsHTML}
        <button class="ex-add-btn" onclick="addWorkoutEntry('${ex.id}')">
          +${preview} kcal
        </button>
      </div>
      ${doneHTML}
    </div>`;
  }).join('');

  // Custom exercise
  const ci = state.trainingInputs.custom;
  const customCard = `
    <div class="custom-ex-card">
      <div class="ex-header">
        <span class="ex-icon">✏️</span>
        <span class="ex-name" style="color:var(--muted)">Custom vežba</span>
      </div>
      <input id="customNameInput" style="width:100%;background:var(--s4);border:1px solid var(--s6);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--sans);outline:none;margin-bottom:10px"
        type="text" placeholder="Naziv vežbe..." value="${ci.name}" />
      <div class="ex-inputs">
        <div class="ex-input-group">
          <div class="ex-input-label">Serije</div>
          <input class="ex-input" type="number" min="1" max="20" value="${ci.sets}"
            oninput="updateTrainingInput('custom','sets',this.value)" />
        </div>
        <div class="ex-sep">×</div>
        <div class="ex-input-group">
          <div class="ex-input-label">Ponavljanja</div>
          <input class="ex-input" type="number" min="1" max="200" value="${ci.reps}"
            oninput="updateTrainingInput('custom','reps',this.value)" />
        </div>
        <button class="ex-add-btn" style="background:var(--blue)" onclick="addCustomWorkoutEntry()">Dodaj</button>
      </div>
      ${(doneByEx['custom'] || []).length ? `
        <div class="ex-done-list">
          ${(doneByEx['custom'] || []).map(e => `
            <div class="ex-done-item">
              <span>${e.name} · ${e.sets}×${e.reps}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="ex-done-kcal" style="color:var(--blue)">~${e.calories} kcal</span>
                <button class="ex-done-del" onclick="deleteWorkoutEntry('${e.uid}')">×</button>
              </div>
            </div>`).join('')}
        </div>` : ''}
    </div>`;

  const totalHTML = totalKcal > 0 ? `
    <div class="card">
      <div class="workout-total">
        <span class="workout-total-label">Ukupno sagoreno</span>
        <span class="workout-total-val">-${totalKcal} kcal</span>
      </div>
    </div>` : '';

  return `
    ${totalHTML}
    <div class="card">
      <div class="card-label">Trening — ${state.date === todayStr() ? 'danas' : state.date}</div>
      ${exCards}
      ${customCard}
    </div>`;
}

function weeklyReportHTML(weekData) {
  // weekData passed from render to avoid double compute
  weekData = weekData || getWeekData();
  const goal = state.calorieGoal;
  const daysWithData = weekData.filter(d => d.hasData && !d.future);

  if (daysWithData.length === 0) {
    return `<div class="card"><div class="hist-empty">📭 Nema podataka za ovu nedelju.<br>Počni da unosiš obroke!</div></div>`;
  }

  const totalConsumed = daysWithData.reduce((s, d) => s + d.consumed, 0);
  const totalBurned   = daysWithData.reduce((s, d) => s + d.burned, 0);
  const totalNet      = daysWithData.reduce((s, d) => s + d.net, 0);
  const avgNet        = Math.round(totalNet / daysWithData.length);
  const deficitDays   = daysWithData.filter(d => d.net < goal).length;
  const avgDeficit    = Math.round(goal - avgNet);
  const projectedLoss = ((avgDeficit * 7) / 7700).toFixed(2); // ~7700 kcal per kg fat

  // Grade
  const deficitRatio = deficitDays / daysWithData.length;
  const grade = deficitRatio >= 0.86 ? { emoji: '🏆', label: 'Odlično!', color: 'var(--green)' }
              : deficitRatio >= 0.57 ? { emoji: '💪', label: 'Dobro', color: 'var(--green)' }
              : deficitRatio >= 0.29 ? { emoji: '😐', label: 'Može bolje', color: 'var(--orange)' }
              : { emoji: '😔', label: 'Treba raditi', color: 'var(--red)' };

  const dayNames = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su'];
  const maxNet = Math.max(...weekData.map(d => d.net), goal);

  const dayRows = weekData.map(d => {
    const dayObj = new Date(d.date + 'T12:00:00');
    const name = dayNames[dayObj.getDay()];
    if (d.future) return `<div class="report-day-row">
      <span class="report-day-name">${name}</span>
      <div class="report-day-bar-wrap"><div class="report-day-bar" style="width:0%;background:var(--s4)"></div></div>
      <span class="report-day-val" style="color:var(--s6)">—</span>
    </div>`;
    if (!d.hasData) return `<div class="report-day-row">
      <span class="report-day-name">${name}</span>
      <div class="report-day-bar-wrap"><div class="report-day-bar" style="width:2%;background:var(--s4)"></div></div>
      <span class="report-day-val" style="color:var(--s6)">0</span>
    </div>`;
    const pct = Math.min(100, (d.net / maxNet) * 100);
    const color = d.net < goal ? 'var(--green)' : 'var(--red)';
    return `<div class="report-day-row" onclick="setTab('history');state.selectedHistoryDate='${d.date}';render()" style="cursor:pointer">
      <span class="report-day-name" style="color:${d.net < goal ? 'var(--green)' : 'var(--muted)'}">${name}</span>
      <div class="report-day-bar-wrap"><div class="report-day-bar" style="width:${pct}%;background:${color}55"></div></div>
      <span class="report-day-val" style="color:${color}">${Math.round(d.net)}</span>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-label">Nedeljni izveštaj</div>
      <div class="report-grade">${grade.emoji}</div>
      <div class="report-grade-label" style="color:${grade.color}">${grade.label}</div>
      <div class="report-grade-sub">${deficitDays} od ${daysWithData.length} dana ispod cilja</div>
    </div>

    <div class="card">
      <div class="card-label">Statistike nedelje</div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan dnevni unos</span>
        <span class="report-stat-val" style="color:var(--text)">${Math.round(totalConsumed / daysWithData.length)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečno sagoreno</span>
        <span class="report-stat-val" style="color:var(--blue)">${Math.round(totalBurned / daysWithData.length)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan neto</span>
        <span class="report-stat-val" style="color:${avgNet < goal ? 'var(--green)' : 'var(--red)'}">${avgNet} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan deficit</span>
        <span class="report-stat-val" style="color:${avgDeficit > 0 ? 'var(--green)' : 'var(--red)'}">${avgDeficit > 0 ? '-' : '+'}${Math.abs(avgDeficit)} kcal</span>
      </div>

      </div>
