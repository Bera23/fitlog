<style>
  :root {
    --green: #8fd42e;
    --blue: #47c8ff;
    --orange: #ffb347;
    --red: #ff4f4f;
    --pink: #ff6b9d;
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --text: #f0f0f0;
    --text-secondary: #ccc;  /* renamed from --tc */
    --muted: #999;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    /* Surface scale */
    --s0: #0a0a0a;
    --s1: #0d0d0d;
    --s2: #111;
    --s3: #161616;
    --s4: #1a1a1a;
    --s5: #1e1e1e;
    --s6: #2a2a2a;
    --s7: #333;
    --s8: #3a3a3a;
    --s9: #444;
    --s10: #555;
    --s11: #666;
    /* --tc removed; use --text-secondary instead */
    --white: #fff;
    /* Elevation tokens */
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    --shadow-nav: 0 -4px 24px rgba(0,0,0,0.5);
    /* Easing */
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }

  /* Webkit scrollbar — minimal */
  ::-webkit-scrollbar { width: 0; }

  /* ── TAB CONTENT ANIMATION ─────────────────────────────── */
  @keyframes tabFadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tab-content { animation: tabFadeIn 0.18s var(--ease); }

  /* HEADER — logo + date */
  .header { padding: 14px 16px 4px; border-bottom: none; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--mono); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--green), #47ffb5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }


  /* HEADER PROGRESS BAR */
  .header-progress-wrap { padding: 8px 16px 0; }
  .header-progress-track { height: 12px; background: var(--s4); border-radius: 99px; overflow: hidden; }
  .header-progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green), #47ffb5); transition: width 0.6s var(--ease), background 0.3s; }
  .header-progress-labels { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 0; }

  /* ZDRAVLJE SUBTABS */
  .sub-tabs { display: flex; gap: 4px; margin: 12px 16px 0; background: var(--bg); border-radius: 8px; padding: 4px; border: 1px solid var(--border); }
  .sub-tab { flex: 1; padding: 12px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: var(--sans); transition: background 0.15s, color 0.15s; min-height: 44px; }
  .sub-tab.active { background: var(--green); color: #0a0a0a; font-weight: 800; }
  .sub-tab.inactive { background: transparent; color: var(--s11); }
  .weight-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--green); padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); min-height: 44px; }
  .weight-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px 8px; font-size: 13px; width: 65px; font-family: var(--mono); outline: none; min-height: 44px; box-sizing: border-box; }
  .save-btn { background: var(--green); color: var(--bg); border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 700; cursor: pointer; min-height: 44px; }

  /* API KEY SCREEN */
  .api-screen { padding: 40px 20px; text-align: center; }
  .api-screen h2 { font-family: var(--mono); color: var(--green); margin-bottom: 12px; font-size: 18px; }
  .api-screen p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
  .api-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 16px; font-size: 13px; font-family: var(--mono); outline: none; margin-bottom: 10px; }
  .api-save-btn { width: 100%; background: var(--green); color: var(--bg); border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: var(--mono); letter-spacing: 1px; }
  .api-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .api-hint a { color: var(--muted); }

  /* WEEKLY REPORT */
  .report-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--s3); }
  .report-stat:last-child { border-bottom: none; }
  .report-stat-label { font-size: 13px; color: var(--muted); }
  .report-stat-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .report-day-row { display: flex; align-items: center; gap: 6px; padding: 7px 0; border-bottom: 1px solid var(--s3); }
  .report-day-row:last-child { border-bottom: none; }
  .report-day-name { font-family: var(--mono); font-size: 12px; font-weight: 700; min-width: 22px; }
  .report-day-bar-wrap { flex: 1; position: relative; height: 5px; }
  /* Three number columns: consumed | burned | delta */
  .rdr-consumed { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--text); min-width: 34px; text-align: right; }
  .rdr-burned   { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--blue); min-width: 26px; text-align: right; }
  .rdr-delta    { font-family: var(--mono); font-size: 11px; font-weight: 700; min-width: 36px; text-align: right; }
  .report-grade { font-size: 48px; text-align: center; margin: 8px 0 4px; }
  .report-grade-label { text-align: center; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .report-grade-sub { text-align: center; font-size: 13px; color: var(--muted); }

  /* SKELETON LOADER */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .skeleton { background: linear-gradient(90deg, var(--s4) 25%, #252525 50%, var(--s4) 75%); background-size: 800px 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  .skeleton-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin: 12px 16px 0; }
  .skeleton-time { height: 10px; width: 40px; margin-bottom: 10px; }
  .skeleton-line { height: 14px; margin-bottom: 8px; border-radius: 4px; }
  .skeleton-pills { display: flex; gap: 6px; margin-top: 10px; }
  .skeleton-pill { height: 20px; width: 55px; border-radius: 8px; }
  .skeleton-kcal { height: 28px; width: 50px; border-radius: 4px; }

  /* ZDRAVLJE TAB */
  .bmi-scale-wrap { margin: 12px 0 8px; }
  .bmi-scale-track { height: 10px; border-radius: 5px; background: linear-gradient(to right, var(--blue) 0%, var(--green) 30%, var(--orange) 55%, var(--red) 75%, #900 100%); position: relative; margin-bottom: 6px; }
  .bmi-scale-marker { position: absolute; top: -4px; width: 4px; height: 18px; background: var(--white); border-radius: 2px; transform: translateX(-50%); }
  .bmi-scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); font-family: var(--mono); }
  .zdravlje-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--s3); }
  .zdravlje-stat:last-child { border-bottom: none; }
  .zdravlje-stat-label { font-size: 13px; color: var(--muted); }
  .zdravlje-stat-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .target-input-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .target-input { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px 10px; font-size: 13px; font-family: var(--mono); width: 75px; outline: none; text-align: center; min-height: 44px; box-sizing: border-box; }
  .prognoza-bar { height: 8px; background: var(--s4); border-radius: 4px; overflow: hidden; margin: 8px 0 4px; }
  .prognoza-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.5s ease; }

  /* PRODUCT CARDS */
  .product-card { position: relative; border-bottom: 1px solid var(--s5); }
  .product-card:last-child { border-bottom: none; }
  /* Inside swipe wrappers each .product-card is :last-child of .hist-swipe-inner,
     so the rule above strips all borders. Restore them and only remove on last wrapper. */
  .hist-swipe-inner .product-card { border-bottom: 1px solid var(--s5); }
  .hist-swipe-wrap:last-child .product-card { border-bottom: none; }
  .product-card-header { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; cursor: pointer; gap: 8px; }
  .product-rating-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .rating-good  { background: rgba(143,212,46,0.15);  color: var(--green); }
  .rating-mod   { background: rgba(255,179,71,0.15);  color: var(--orange); }
  .rating-avoid { background: rgba(255,79,79,0.15);   color: var(--red); }
  .product-collapsed { display: flex; flex-wrap: wrap; gap: 4px; padding-bottom: 10px; }
  .product-expanded  { display: none; padding-bottom: 12px; }
  .product-card.expanded .product-collapsed { display: none; }
  .product-card.expanded .product-expanded  { display: block; }
  .red-flag-chip { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: rgba(255,79,79,0.12); color: var(--red); margin: 2px 2px 2px 0; }
  .product-macro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 10px 0; padding: 10px; background: var(--s3); border-radius: 8px; }
  .product-macro-cell { text-align: center; }
  .product-macro-val  { font-family: var(--mono); font-size: 14px; font-weight: 800; }
  .product-macro-lbl  { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--s4);
    box-shadow: var(--shadow-nav);
    display: flex; z-index: 100; padding: 6px 0 10px;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; padding: 13px 4px;
    transition: opacity 0.15s; position: relative; border-radius: 12px;
    margin: 0 2px; min-height: 44px;
  }
  /* Active chip — pill background replaces the invisible 4px dot */
  .nav-btn.active {
    background: rgba(143, 212, 46, 0.10);
  }
  /* Remove the barely-visible dot — chip communicates state clearly enough */
  .nav-btn::after { display: none; }
  .nav-icon { font-size: 18px; line-height: 1; transition: transform 0.15s var(--ease); }
  .nav-btn.active .nav-icon { transform: scale(1.12); }
  .nav-label { font-size: 11px; font-weight: 600; font-family: var(--sans); letter-spacing: 0.3px; }
  .nav-btn.active .nav-label { color: var(--green); }
  .nav-btn.inactive .nav-label { color: var(--s11); }
  .nav-btn.active .nav-icon { filter: none; }
  .nav-btn.inactive .nav-icon { opacity: 0.35; }

  /* CARD */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin: 12px 16px 0; box-shadow: var(--shadow-sm); }
  .card-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

  /* MODE TOGGLE */
  .mode-toggle { display: flex; gap: 4px; margin-bottom: 10px; background: var(--bg); border-radius: 8px; padding: 4px; border: 1px solid var(--border); }
  .mode-btn { flex: 1; padding: 12px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: var(--sans); transition: background 0.15s, color 0.15s; min-height: 44px; }
  .mode-btn.active { background: var(--green); color: #0a0a0a; font-weight: 800; }
  .mode-btn.inactive { background: transparent; color: var(--s11); }

  /* INPUT */
  .msg-input { width: 100%; background: var(--s1); border: 1px solid var(--s6); border-radius: 12px; color: var(--text); padding: 12px 14px; font-size: 14px; font-family: var(--sans); resize: none; outline: none; line-height: 1.6; transition: border-color 0.15s; }
  .msg-input:focus { border-color: var(--s8); }
  .hint { font-size: 11px; color: var(--muted); text-align: right; margin: 4px 0 6px; }

  /* SEND BUTTON */
  .send-btn { width: 100%; padding: 14px 20px; background: var(--green); color: var(--bg); border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; font-family: var(--sans); letter-spacing: 0.3px; transition: opacity 0.2s, transform 0.1s; }
  .send-btn:active:not(:disabled) { transform: scale(0.98); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* INPUT AREA — unified image + text */
  .msg-input { min-height: 90px; }
  /* Camera upload styled as a tappable button chip */
  .input-img-label {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; position: relative;
    -webkit-tap-highlight-color: transparent;
    background: var(--s3); border: 1px solid var(--s6);
    border-radius: 8px; padding: 7px 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .input-img-label:active { background: var(--s4); }
  .input-img-label input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-strip { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 10px; background: rgba(71,200,255,0.07); border-radius: 8px; border: 1px solid rgba(71,200,255,0.2); }
  .img-strip img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }

  /* STATS */
  .ring-wrap { position: relative; flex-shrink: 0; }
  .ring-wrap svg { display: block; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-kcal { font-size: 22px; font-weight: 800; font-family: var(--mono); }
  .ring-label { font-size: 11px; color: var(--s11); letter-spacing: 1px; }
  /* Uppercase micro-label with tracking */
  .stat-label { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .stat-val { font-family: var(--mono); font-weight: 700; }
  /* Horizontal split calorie card */
  .kcal-body { display: flex; align-items: center; padding: 12px 16px 14px; }
  .kcal-stats-side { flex: 1; padding-left: 14px; display: flex; flex-direction: column; gap: 10px; }
  .kcal-vstat { display: flex; flex-direction: column; gap: 3px; }
  .kcal-vsep { height: 1px; background: var(--border); }
  /* Enhanced preostalo footer */
  .kcal-footer { padding: 11px 16px; background: var(--s3); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 16px 16px; }
  .kcal-footer-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .kcal-footer-val { font-family: var(--mono); font-size: 20px; font-weight: 700; line-height: 1; }
  .goal-input { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px 8px; font-size: 13px; font-family: var(--mono); width: 70px; outline: none; min-height: 44px; box-sizing: border-box; }

  /* MACRO BAR */
  .macro-row { margin-bottom: 10px; }
  .macro-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0; }
  .macro-track { height: 5px; background: var(--s4); border-radius: 99px; overflow: hidden; }
  .macro-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

  /* LOG ITEMS — better hierarchy */
  .log-item { position: relative; overflow: hidden; border-bottom: 1px solid var(--s3); }
  .log-item:last-child { border-bottom: none; }
  .pills { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .log-note { margin-top: 6px; font-size: 11px; color: var(--muted); font-style: italic; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 20px 36px; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .empty-icon { font-size: 40px; margin-bottom: 14px; display: block; opacity: 0.6; }
  .empty-title { font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }

  /* TOAST — above bottom nav */
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 10px) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }
  .toast {
    position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 13px;
    z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    transition: opacity 0.25s, transform 0.25s;
    font-family: var(--sans);
    animation: toastIn 0.2s var(--ease);
  }
  .toast.ok  { background: var(--green); color: var(--bg); }
  .toast.err { background: var(--red); color: var(--white); }
  .toast.hide { opacity: 0; transform: translate(-50%, -4px) scale(0.97); }
  /* Undo toast — neutral bg with action button */
  .toast.undo { background: var(--s4); color: var(--text); border: 1px solid var(--s6); display: flex; align-items: center; gap: 10px; }
  .toast-undo-btn { background: var(--orange); color: var(--bg); border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--sans); flex-shrink: 0; }
  /* Dimmed style for duplicate products in history */
  .product-card-duplicate { opacity: 0.4; }
  /* Swipe wrapper for history product cards */
  .hist-swipe-wrap { position: relative; overflow: hidden; }
  .hist-swipe-inner { transition: transform 0.25s var(--ease); will-change: transform; background: var(--card); }

  /* STREAK */
  .streak-wrap { display: flex; align-items: center; gap: 16px; }
  .streak-num { font-family: var(--mono); font-size: 48px; font-weight: 700; line-height: 1; color: var(--green); }
  .streak-num.zero { color: var(--muted); }
  .streak-info { flex: 1; }
  .streak-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .streak-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* WEEK CHART */
  .week-chart { width: 100%; overflow: hidden; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin-bottom: 6px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s ease; }
  .chart-day { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .chart-day.today { color: var(--green); }
  .chart-kcal { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .week-avg { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 13px; }
  .week-avg-item { text-align: center; }
  .week-avg-val { font-family: var(--mono); font-weight: 700; font-size: 13px; }
  .week-avg-label { color: var(--muted); margin-top: 2px; }

  /* WEIGHT LOG */
  .weight-log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--s4); }
  .weight-log-item:last-child { border-bottom: none; }
  .weight-log-date { font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .weight-log-val { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .weight-log-diff { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }

  /* HISTORY */
  .hist-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--s3); cursor: pointer; transition: background 0.12s; border-radius: 4px; }
  .hist-item:last-child { border-bottom: none; }
  .hist-item:active { background: var(--s4); }
  .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hist-date { font-family: var(--mono); font-size: 13px; color: var(--muted); min-width: 90px; }
  .hist-date.today { color: var(--green); }
  .hist-net { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .hist-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

  /* HISTORY DETAIL */
  .hist-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .hist-back-btn { background: var(--s4); border: none; border-radius: 8px; color: var(--text); padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: var(--sans); transition: background 0.12s; }
  .hist-back-btn:active { background: var(--s6); }
  .hist-detail-date { font-family: var(--mono); font-size: 13px; color: var(--green); font-weight: 700; }
  .hist-progress-track { height: 8px; background: var(--s4); border-radius: 4px; overflow: hidden; margin: 6px 0; }
  .hist-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s var(--ease); }
  .hist-progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .hist-meal-entry { padding: 10px 0; border-bottom: 1px solid var(--s3); }
  .hist-meal-entry:last-child { border-bottom: none; }
  .hist-meal-time { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
  .hist-meal-name { font-size: 13px; color: var(--text-secondary); }
  .hist-meal-kcal { font-size: 13px; font-family: var(--mono); font-weight: 700; }
  .hist-section-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin: 12px 0 6px; }
  .hist-workout-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--s3); font-size: 13px; }
  .hist-workout-entry:last-child { border-bottom: none; }

  /* WATER TRACKER */
  .water-drops { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .water-drop {
    width: 36px; height: 38px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: background 0.2s, border-color 0.2s, transform 0.1s;
    border: 1.5px solid var(--s6);
  }
  .water-drop.filled { background: rgba(71,200,255,0.12); border-color: rgba(71,200,255,0.4); }
  .water-drop.empty  { background: var(--s3); filter: grayscale(1); opacity: 0.4; }
  .water-btns { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .water-btn { flex: 1; padding: 14px 8px; border: 1px solid var(--s6); border-radius: 8px; background: var(--s2); color: var(--blue); font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--sans); transition: background 0.15s, transform 0.1s; min-width: 70px; min-height: 44px; }
  .water-btn:active { background: rgba(71,200,255,0.1); transform: scale(0.97); }
  .water-custom-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .water-custom-input { flex: 1; background: var(--s1); border: 1px solid var(--s6); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 13px; font-family: var(--mono); outline: none; text-align: center; }
  .water-add-btn { padding: 10px 16px; background: var(--blue); color: var(--bg); border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--sans); transition: opacity 0.15s; }
  .water-add-btn:active { opacity: 0.8; }
  .water-hist-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--s3); }
  .water-hist-row:last-child { border-bottom: none; }
  .water-hist-date { font-size: 11px; color: var(--muted); font-family: var(--mono); min-width: 28px; }
  .water-hist-bar-wrap { flex: 1; height: 7px; background: var(--s4); border-radius: 4px; overflow: hidden; }
  .water-hist-bar { height: 100%; border-radius: 4px; background: var(--blue); }
  .water-hist-val { font-size: 11px; font-family: var(--mono); min-width: 55px; text-align: right; }

  /* WEIGHT CHART */
  .weight-chart-wrap { width: 100%; overflow: hidden; }
  .weight-chart-svg { width: 100%; overflow: visible; }

  /* WEIGHT TAB REDESIGN — metric grid + card */
  .wt-metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 16px 0; }
  .wt-metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }

  /* NUTRITION SCORE & COLLAPSIBLE MEAL */
  .meal-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; cursor: pointer; user-select: none; }
  .meal-header:active { background: var(--s4); }
  .meal-time-badge { font-family: var(--mono); font-size: 11px; color: var(--green); font-weight: 700; min-width: 36px; }
  .meal-summary { flex: 1; font-size: 13px; color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-kcal-badge { font-family: var(--mono); font-size: 15px; font-weight: 800; color: var(--green); white-space: nowrap; }
  .meal-chevron { font-size: 18px; color: var(--s9); margin-left: 6px; transition: transform 0.2s var(--ease), color 0.15s; line-height: 1; }
  .meal-chevron.open { transform: rotate(180deg); color: var(--green); }
  /* Pills row — shown when collapsed, hidden when expanded */
  .meal-pills-row { padding: 0 16px 10px; display: flex; gap: 5px; flex-wrap: wrap; }
  .meal-details { padding: 10px 16px 14px; border-top: 1px solid var(--s3); display: none; }
  /* Expanded state — flip visibility without any re-render */
  .log-item.expanded .meal-pills-row { display: none; }
  .log-item.expanded .meal-details { display: block; }
  .meal-item { font-size: 13px; color: var(--muted); padding: 4px 0; }
  .meal-item-name { color: var(--text-secondary); font-weight: 600; }

  /* SWIPE TO DELETE */
  .log-item { position: relative; overflow: hidden; }
  .log-item-inner { transition: transform 0.25s var(--ease); will-change: transform; }
  .swipe-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 72px; background: var(--red); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 18px; border-radius: 0 12px 12px 0; opacity: 0; transition: opacity 0.15s; pointer-events: none; }

  /* HISTORY DETAIL — meal expand/collapse via DOM toggle (no render) */
  .hist-meal-item .hist-meal-collapsed { display: flex; }
  .hist-meal-item .hist-meal-expanded  { display: none; }
  .hist-meal-item.expanded .hist-meal-collapsed { display: none; }
  .hist-meal-item.expanded .hist-meal-expanded  { display: block; }
  /* HISTORY SCORE — expand/collapse via DOM toggle */
  .history-score-content { display: none; margin-top: 10px; }

  /* NUTRITION SCORE CARD */
  .score-btn { width: 100%; padding: 13px; background: var(--s2); border: none; border-top: 1px solid var(--s6); border-radius: 0 0 16px 16px; color: var(--muted); font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: background 0.15s; min-height: 44px; }
  .score-btn:active { background: var(--s4); }
  .meal-score-btn { background: none; border: 1px solid var(--s6); border-radius: 8px; color: var(--muted); font-size: 11px; padding: 12px 16px; cursor: pointer; font-family: var(--sans); transition: background 0.15s; margin-top: 8px; min-height: 44px; }
  .meal-score-btn:active { background: var(--s4); }
  .meal-score-inline { margin-top: 8px; padding: 10px 12px; background: var(--s3); border-radius: 10px; font-size: 13px; color: var(--muted); display: flex; align-items: flex-start; gap: 10px; }
  .meal-score-num { font-family: var(--mono); font-weight: 800; font-size: 20px; line-height: 1; flex-shrink: 0; }
  .score-num { font-size: 48px; font-weight: 800; font-family: var(--mono); line-height: 1; }
  .score-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--s3); font-size: 13px; line-height: 1.5; }
  .score-row:last-child { border-bottom: none; }

  /* ONBOARDING */
  .onboard-screen { padding: 32px 20px; }
  .onboard-title { font-family: var(--mono); color: var(--green); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .onboard-sub { color: var(--muted); font-size: 13px; line-height: 1.65; margin-bottom: 28px; }
  .onboard-field { margin-bottom: 18px; }
  .onboard-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 7px; }
  .onboard-input {
    width: 100%; background: var(--s2); border: 1px solid var(--s6);
    border-radius: 10px; color: var(--text); padding: 13px 14px;
    font-size: 16px; font-family: var(--mono); outline: none; box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .onboard-input:focus { border-color: var(--green); }
  .onboard-select {
    width: 100%; background: var(--s2); border: 1px solid var(--s6);
    border-radius: 10px; color: var(--text); padding: 13px 14px;
    font-size: 13px; font-family: var(--sans); outline: none; box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .onboard-select:focus { border-color: var(--green); }
  .onboard-btn {
    width: 100%; padding: 16px; background: var(--green); color: var(--bg);
    border: none; border-radius: 12px; font-weight: 800; font-size: 15px;
    font-family: var(--sans); cursor: pointer; margin-top: 12px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .onboard-btn:active { transform: scale(0.98); }

  /* BOTTOM NAV placeholder */
  .spacer { height: 20px; }

  /* SETTINGS DRAWER */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s var(--ease); }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; max-width: 92vw; background: var(--s1); border-left: 1px solid var(--s5); z-index: 201; transform: translateX(100%); transition: transform 0.28s var(--ease); overflow-y: auto; padding-bottom: 40px; }
  .drawer.open { transform: translateX(0); }
  .drawer-header { padding: 18px 16px 14px; border-bottom: 1px solid var(--s4); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--s1); z-index: 1; }
  .drawer-title { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--green); }
  .drawer-close { background: var(--s4); border: none; border-radius: 8px; color: var(--text); padding: 6px 14px; font-size: 15px; cursor: pointer; transition: background 0.12s; }
  .drawer-close:active { background: var(--s6); }
  .drawer-section { padding: 16px; border-bottom: 1px solid var(--s3); }
  .drawer-section-title { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 12px; }
  .drawer-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--s2); font-size: 13px; }
  .drawer-row:last-child { border-bottom: none; }
  .drawer-row-label { color: var(--muted); }
  .drawer-row-val { font-family: var(--mono); font-weight: 700; }
  .drawer-btn { width: 100%; padding: 11px; background: var(--s3); border: 1px solid var(--s5); border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: background 0.15s; text-align: left; margin-bottom: 8px; }
  .drawer-btn:last-child { margin-bottom: 0; }
  .drawer-btn:active { background: var(--s5); }
  .drawer-btn.danger { color: var(--red); border-color: rgba(255,79,79,0.27); }
  .drawer-input { width: 100%; background: var(--s2); border: 1px solid var(--s6); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: var(--mono); outline: none; transition: border-color 0.15s; box-sizing: border-box; }
  .drawer-input:focus { border-color: var(--s9); }
  .drawer-select { width: 100%; background: var(--s2); border: 1px solid var(--s6); border-radius: 8px; color: var(--text); padding: 9px 10px; font-size: 13px; font-family: var(--sans); outline: none; box-sizing: border-box; }
  .drawer-field { margin-bottom: 10px; }
  .drawer-field-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; }

  /* ACCORDION SECTIONS */
  .drawer-acc-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--s3);
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-acc-header:active { background: var(--s3); }
  .drawer-acc-title {
    font-size: 10px; color: var(--muted); font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .drawer-acc-chevron { /* alias for meal-chevron — class kept for JS querySelector compat */ }
  .drawer-acc-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s var(--ease);
  }
  .drawer-acc-body.open { max-height: 800px; }
  .drawer-acc-inner { padding: 14px 16px 16px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const SCORE_KEY = 'fitlog_score_';
const MEAL_SCORE_KEY = 'fitlog_meal_scores_';
// Base URL for Gemini API — model and key appended at call time
const GEMINI_BASE_URL = 'https://generativelanguage.googleapis.com/v1beta/models';
// localStorage schema version — bump when a breaking data migration is needed
const LS_VERSION = 1;

// ─── DOMAIN CONSTANTS ────────────────────────────────────────────────────────
const KCAL_PER_KG_FAT      = 7700;   // approximate kcal needed to burn 1 kg of body fat
const WATER_ML_PER_KG      = 30;     // recommended daily water intake in ml per kg bodyweight
const DEFAULT_WATER_GOAL_ML = 2000;  // fallback water goal when weight is unknown

// ─── GEMINI PROMPT SCHEMAS ───────────────────────────────────────────────────
// JSON output format strings shared across prompt functions — single source of truth
const GEMINI_FOOD_SCHEMA      = '{"items":[{"name":"naziv","amount":"kolicina","calories":broj,"protein":broj,"carbs":broj,"fat":broj,"sugar":broj}],"total_calories":broj,"total_protein":broj,"total_carbs":broj,"total_fat":broj,"total_sugar":broj,"note":"napomena ili prazan string"}';
const GEMINI_EXERCISE_SCHEMA  = '{"items":[{"name":"naziv aktivnosti","detail":"trajanje/broj","calories_burned":broj}],"total_burned":broj,"note":"napomena ili prazan string"}';
const GEMINI_SCORE_SCHEMA     = '{"score":broj_od_1_do_10,"protein":"✅ tekst ili ⚠️ tekst ili ❌ tekst","sugar":"✅ tekst ili ⚠️ tekst ili ❌ tekst","fat":"✅ tekst ili ⚠️ tekst ili ❌ tekst","calories":"✅ tekst ili ⚠️ tekst ili ❌ tekst","tip":"💡 jedan kratak savet za sutra"}';
const GEMINI_MEAL_SCORE_SCHEMA = '{"score":broj,"comment":"jedna rečenica na srpskom, max 12 reči","suggestion":"konkretna preporuka za sledeći obrok ili null"}';
// Schema for product/label analysis — nutritional data per 100g + serving size + AI rating
const GEMINI_PRODUCT_SCHEMA = '{"name":"naziv proizvoda","brand":"brend ili null","serving_size_g":broj_grama_porcije_ili_pakovanja,"calories_per_100g":broj,"protein_per_100g":broj,"carbs_per_100g":broj,"fat_per_100g":broj,"sugar_per_100g":broj,"fiber_per_100g":broj,"rating":"good|moderate|avoid","rating_reason":"kratko objasnjenje jednom recenicom na srpskom","red_flags":["lista crvenih zastavica, prazna lista ako nema"],"summary":"2-3 recenice opis na srpskom da li je ovaj proizvod zdrav ili ne i zasto"}';
// localStorage key prefix for scanned products
const PRODUCT_KEY = 'fitlog_products_';

function loadMealScores(date) {
  const raw = localStorage.getItem(MEAL_SCORE_KEY + date);
  try { return raw ? JSON.parse(raw) : {}; } catch { return {}; }
}

function saveMealScores(date, scores) {
  localStorage.setItem(MEAL_SCORE_KEY + date, JSON.stringify(scores));
}

// ─── STATE ───────────────────────────────────────────────────────────────────

const state = {
  apiKey: localStorage.getItem('fitlog_apikey') || '',
  weight: parseFloat(localStorage.getItem('fitlog_weight')) || null,
  height: parseFloat(localStorage.getItem('fitlog_height')) || null,
  calorieGoal: parseInt(localStorage.getItem('fitlog_goal')) || 2000,
  calorieGoalManual: !!localStorage.getItem('fitlog_goal_manual'),
  date: todayStr(),
  dayData: { meals: [], exercises: [] },
  mode: 'food',
  activeTab: 'log',
  mealInputDraft: '',     // persists food textarea content across renders
  exerciseInputDraft: '', // persists exercise textarea content across renders
  zdravljeSubTab: 'tezina',
  nutritionScore: null,
  nutritionScoreCollapsed: false,
  nutritionScoreLoading: false,
  expandedScoreDate: null,
  mealScores: {},
  mealScoreLoading: null,
  expandedHistoryMealIds: new Set(),
  expandedMealIds: new Set(),
  expandedExIds: new Set(),
  expandedProductIds: new Set(),       // product cards expanded on today's log
  expandedHistoryProductIds: new Set(), // product cards expanded in history view
  historySubTab: 'obroci',             // 'obroci' | 'proizvodi'
  historyMonthOffset: 0,               // 0 = current month, 1 = one month back, etc.
  productHistorySearch: '',            // search query for products history
  productLoading: false,               // loading state for product analysis
  productImageBase64: null,            // selected image for product scanner
  productImageMime: null,
  loading: false,
  editWeight: false,
  weightInput: '',
  heightInput: '',
  editHeight: false,
  selectedHistoryDate: null,
  weekOffset: 0,            // 0 = current week, -1 = last week, etc.
  weeklySummary: null,      // cached AI summary text for current weekOffset
  weeklySummaryLoading: false,
  imageBase64: null,
  imageMime: null,
  drawerOpen: false,
  geminiModel: localStorage.getItem('fitlog_model') || 'gemini-3.1-flash-lite-preview',
  targetWeight: parseFloat(localStorage.getItem('fitlog_target_weight')) || null,
  targetWeightInput: '',
  editTargetWeight: false,
  age: parseInt(localStorage.getItem('fitlog_age')) || 30,
  gender: localStorage.getItem('fitlog_gender') || 'male',
  activity: localStorage.getItem('fitlog_activity') || 'sedentary',
  // Fitness goal: 'lose' | 'maintain' | 'gain'
  fitnessGoal: localStorage.getItem('fitlog_fitness_goal') || 'lose',
  waterGoal: initWaterGoal(),
};

// Human-readable activity labels used across tabs and drawer
const ACT_LABELS = { sedentary: 'Sedentarni', light: 'Lako aktivan', moderate: 'Umeren', active: 'Aktivan' };

function todayStr() {
  // Delegate to localDateStr to avoid duplicating the date-formatting logic
  return localDateStr(new Date());
}

// Convert any Date object to YYYY-MM-DD using local timezone
function localDateStr(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

// Format YYYY-MM-DD storage key to DD.MM. for display

// Weight log: [{date, weight}] sorted by date desc
function loadWeightLog() {
  try {
    const raw = localStorage.getItem('fitlog_weightlog');
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function loadWater(date) {
  const raw = localStorage.getItem('fitlog_water_' + date);
  return raw ? parseInt(raw) : 0;
}

function saveWater(date, ml) {
  localStorage.setItem('fitlog_water_' + date, String(ml));
}

function loadWaterHistory(days) {
  const cacheKey = 'waterHistory_' + days;
  if (_renderCache[cacheKey] !== undefined) return _renderCache[cacheKey];
  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = localDateStr(d);
    // parseInt first, then || 0 — avoids parseInt(null || 0) === parseInt(0) edge case
    result.push({ date: dateStr, ml: parseInt(localStorage.getItem('fitlog_water_' + dateStr)) || 0 });
  }
  _renderCache[cacheKey] = result;
  return result;
}

function saveWeightEntry(date, weight) {
  const log = loadWeightLog();
  // Replace if same date exists, otherwise add
  const idx = log.findIndex(e => e.date === date);
  if (idx >= 0) log[idx].weight = weight;
  else log.push({ date, weight });
  // Sort descending
  log.sort((a, b) => b.date.localeCompare(a.date));
  localStorage.setItem('fitlog_weightlog', JSON.stringify(log));
}

// Workout log per day: [{id, name, sets, reps, secs, calories, time}]
function loadWorkout(date) {
  try {
    const raw = localStorage.getItem('fitlog_workout_' + date);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveWorkout(date, entries) {
  localStorage.setItem('fitlog_workout_' + date, JSON.stringify(entries));
}

// Cached loadWorkout — reads from localStorage once per render cycle per date.
// Uses the per-render _renderCache so the cache is automatically cleared on next render().
function cachedLoadWorkout(date) {
  const cacheKey = 'workout_' + date;
  if (_renderCache[cacheKey] !== undefined) return _renderCache[cacheKey];
  const result = loadWorkout(date);
  _renderCache[cacheKey] = result;
  return result;
}

// Safe JSON parse for localStorage — never crashes
function safeParseLS(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// Compute initial water goal: use saved value, else derive from weight, else default
function initWaterGoal() {
  const saved = parseInt(localStorage.getItem('fitlog_water_goal'));
  if (saved) return saved;
  const weight = parseFloat(localStorage.getItem('fitlog_weight'));
  return weight ? Math.round(weight * WATER_ML_PER_KG) : DEFAULT_WATER_GOAL_ML;
}

// Strip markdown fences and parse Gemini JSON response — throws on invalid JSON
function parseGeminiJson(raw) {
  try {
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch {
    throw new Error('Nije moguće parsovati odgovor — pokušaj ponovo');
  }
}

// ─── API STATS ────────────────────────────────────────────────────────────────

function loadApiStats() {
  return safeParseLS('fitlog_api_stats') || {
    requests: { total: 0, today: 0, todayDate: '' },
    errors: {},
    responseTimes: [],
    tokensApprox: 0,
  };
}

function saveApiStats(s) {
  localStorage.setItem('fitlog_api_stats', JSON.stringify(s));
}

// Called after every Gemini request to record metrics
function trackApiCall({ success, errorType, ms, promptLen, responseLen }) {
  const s = loadApiStats();
  const today = todayStr();
  // Reset daily counter on new day
  if (s.requests.todayDate !== today) { s.requests.today = 0; s.requests.todayDate = today; }
  s.requests.total++;
  s.requests.today++;
  if (!success && errorType) {
    s.errors[errorType] = (s.errors[errorType] || 0) + 1;
  }
  // Keep last 50 response times for rolling average
  s.responseTimes.push(ms);
  if (s.responseTimes.length > 50) s.responseTimes = s.responseTimes.slice(-50);
  // Rough token approximation: 4 chars ≈ 1 token
  s.tokensApprox = (s.tokensApprox || 0) + Math.round((promptLen + responseLen) / 4);
  saveApiStats(s);
}

// Generic debounce — returns a debounced wrapper that delays fn execution by ms
// after the last call, encapsulating the timer so callers stay clean.
function debounce(fn, ms) {
  let timer = null;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

// Coalesces multiple synchronous render() calls into a single RAF render.
// Multiple calls within the same synchronous block collapse to one paint frame.
// Keep render() only where the new DOM is needed immediately (e.g. focus() after).
let _renderScheduled = false;
function scheduleRender() {
  if (_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(() => {
    _renderScheduled = false;
    render();
  });
}

// Per-render memoization cache — cleared at the start of each render() call.
// Avoids repeated localStorage reads for the same key within one render cycle.
let _renderCache = {};
function clearRenderCache() { _renderCache = {}; }

// Returns a consistent user profile string injected into every AI prompt.
// Includes BMR (Mifflin-St Jeor) and calorie goal so every prompt has full context.
// Single source of truth — avoids per-function duplication and drift.
function buildUserProfile() {
  const gender     = state.gender === 'male' ? 'muškarac' : 'žena';
  const age        = state.age    || 30;
  const weight     = state.weight || 75;
  const height     = state.height || null;
  const heightStr  = height ? `, ${height}cm` : '';
  const act        = ACT_LABELS[state.activity] || 'sedentarni';
  const goalLabel  = state.fitnessGoal === 'gain' ? 'gojenje' : state.fitnessGoal === 'maintain' ? 'održavanje' : 'mršavljenje';

  // Mifflin-St Jeor BMR — same formula used in calcTDEE / drawer stats
  let bmrStr = '';
  if (height) {
    const genderOffset = state.gender === 'male' ? 5 : -161;
    const bmr = Math.round(10 * weight + 6.25 * height - 5 * age + genderOffset);
    bmrStr = ` BMR: ~${bmr} kcal.`;
  }

  return `Korisnik: ${gender}, ${age} god, ${weight}kg${heightStr}, nivo aktivnosti: ${act}. Kalorijski cilj: ${state.calorieGoal} kcal, cilj: ${goalLabel}.${bmrStr}`;
}

// ─── GEMINI API ───────────────────────────────────────────────────────────────

// Low-level Gemini call — accepts a `parts` array so callers can pass text-only
// or multimodal (text + image) content without duplicating fetch/error logic.
async function callGemini(parts, temperature = 0.1) {
  const url = `${GEMINI_BASE_URL}/${state.geminiModel}:generateContent?key=${state.apiKey}`;
  const start = Date.now();
  // Estimate prompt length from text parts only (inline_data skipped)
  const promptLen = parts.filter(p => p.text).reduce((s, p) => s + p.text.length, 0);
  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: { temperature }
      })
    });
  } catch (fetchErr) {
    trackApiCall({ success: false, errorType: 'NetworkError', ms: Date.now() - start, promptLen, responseLen: 0 });
    throw fetchErr;
  }
  if (!res.ok) {
    const err = await res.json();
    const code = res.status;
    const errType = code === 429 ? '429 TooManyRequests' : code === 503 ? '503 ServiceUnavailable' : code === 404 ? '404 NotFound' : `${code} Error`;
    trackApiCall({ success: false, errorType: errType, ms: Date.now() - start, promptLen, responseLen: 0 });
    throw new Error(err.error?.message || 'API greška');
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  trackApiCall({ success: true, errorType: null, ms: Date.now() - start, promptLen, responseLen: text.length });
  return text;
}

      <span class="drawer-row-label">Prosečno vreme odgovora</span>
      <span class="drawer-row-val" style="color:${avgTime > 3000 ? 'var(--red)' : avgTime > 1500 ? 'var(--orange)' : avgTime > 0 ? 'var(--green)' : 'var(--s7)'}">${avgTime > 0 ? avgTime + ' ms' : '0 ms'}</span>

  return `

function saveDrawerApiKey() {
  const val = document.getElementById('drawerApiInput')?.value.trim();
  if (!val) { showToast('Unesi API ključ', 'err'); return; }
  state.apiKey = val;
  localStorage.setItem('fitlog_apikey', val);
  showToast('API ključ sačuvan ✓');
  renderDrawer();
}

function saveDrawerProfile() {
  const age = parseInt(document.getElementById('drawerAge')?.value);
  const gender = document.getElementById('drawerGender')?.value;
  const activity = document.getElementById('drawerActivity')?.value;
  const height = parseFloat(document.getElementById('drawerHeight')?.value);
  const fitnessGoal = document.getElementById('drawerFitnessGoal')?.value || 'lose';

  if (!age || isNaN(age) || age < 10) { showToast('Unesi validne godine', 'err'); return; }

  // Detect if the fitness goal direction changed
  const goalChanged = fitnessGoal !== state.fitnessGoal;

  state.age = age;      localStorage.setItem('fitlog_age', age);
  state.gender = gender; localStorage.setItem('fitlog_gender', gender);
  state.activity = activity; localStorage.setItem('fitlog_activity', activity);
  state.fitnessGoal = fitnessGoal; localStorage.setItem('fitlog_fitness_goal', fitnessGoal);

  // Save height if provided and valid — triggers BMI/TDEE recalculation
  if (!isNaN(height) && height >= 100 && height <= 250) {
    state.height = height;
    localStorage.setItem('fitlog_height', height);
  }

  // Save target weight if provided and valid
  const targetWeightRaw = document.getElementById('drawerTargetWeight')?.value;
  const targetWeightVal = parseFloat(targetWeightRaw);
  if (!isNaN(targetWeightVal) && targetWeightVal >= 30 && targetWeightVal <= 300) {
    state.targetWeight = targetWeightVal;
    localStorage.setItem('fitlog_target_weight', targetWeightVal);
  } else if (targetWeightRaw === '') {
    // Explicitly cleared — remove target
    state.targetWeight = null;
    localStorage.removeItem('fitlog_target_weight');
  }

  if (goalChanged) {
    // Reset target weight — old target is in the wrong direction for the new mode
    state.targetWeight = null;
    state.targetWeightInput = '';
    localStorage.removeItem('fitlog_target_weight');

    // Reset manual calorie goal — old goal was optimized for the previous mode
    state.calorieGoalManual = false;
    localStorage.removeItem('fitlog_goal_manual');

    // Clear stale AI weekly summary — it was generated for the previous mode
    state.weeklySummary = null;

    // Clear today's nutrition score — it was graded against the previous mode's logic
    state.nutritionScore = null;
    localStorage.removeItem(SCORE_KEY + state.date);
  }

  autoCalorieGoal();
  showToast('Profil sačuvan ✓');
  scheduleRender(); // updates zdravlje kalorije tab, header progress, ring
}

function saveDrawerGoal() {
  const val = parseInt(document.getElementById('drawerGoalInput')?.value);
  if (!val || isNaN(val) || val < 500) { showToast('Unesi validan cilj (min 500 kcal)', 'err'); return; }
  state.calorieGoal = val;
  state.calorieGoalManual = true;
  localStorage.setItem('fitlog_goal', val);
  localStorage.setItem('fitlog_goal_manual', '1');
  showToast('Kalorijski cilj sačuvan ✓');
  scheduleRender(); // updates ring, progress bar, stats tab
}

function applyRecommendedGoal(val) {
  // Apply BMI-based recommended goal directly from Kalorije tab
  state.calorieGoal = val;
  state.calorieGoalManual = true;
  localStorage.setItem('fitlog_goal', val);
  localStorage.setItem('fitlog_goal_manual', '1');
  showToast(`Cilj postavljen na ${val} kcal ✓`);

}

function updateModel(val) {
  state.geminiModel = val;
  localStorage.setItem('fitlog_model', val);
  showToast(`Model: ${val}`);
  renderDrawer();
}

function clearApiStats() {
  localStorage.removeItem('fitlog_api_stats');
  showToast('Statistika resetovana');
  renderDrawer();
}

function exportData() {
  // Collect all fitlog_ prefixed keys — Object.keys is safer than index-based iteration
  const data = {};
  Object.keys(localStorage)
    .filter(key => key.startsWith('fitlog_'))
    .forEach(key => {
      try { data[key] = JSON.parse(localStorage.getItem(key)); }
      catch { data[key] = localStorage.getItem(key); }
    });
  data._exportedAt = new Date().toISOString();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fitlog_backup_${todayStr()}.json`;
  a.click();
  // Revoke after a tick — immediate revoke can race with the browser download trigger
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Podaci izvezeni ✓');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => { el.style.display = 'none'; el.classList.remove('hide'); }, 300);
  }, 3000);
}

// ─── TDEE / PROFILE HELPERS ───────────────────────────────────────────────────

function calcTDEE(w, h, age, gender, activity) {
  if (!w || !h) return null;
  const actMults = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725 };
  const genderOffset = gender === 'male' ? 5 : -161;
  const bmr = 10 * w + 6.25 * h - 5 * age + genderOffset;
  return Math.round(bmr * (actMults[activity] || 1.2));
}

function calcRecommendedGoal() {
  // Shared calorie goal recommendation — branches by fitnessGoal mode
  const w = state.weight, h = state.height;
  if (!w || !h) return null;
  const tdee = calcTDEE(w, h, state.age, state.gender, state.activity);
  if (!tdee) return null;

  if (state.fitnessGoal === 'gain') {
    // If target weight is set, base surplus on target weight TDEE (higher mass = higher maintenance)
    // Falls back to current weight TDEE if no target is set
    const gainWeight = (state.targetWeight && state.targetWeight > w) ? state.targetWeight : w;
    const gainTdee = calcTDEE(gainWeight, h, state.age, state.gender, state.activity);
    return Math.round((gainTdee || tdee) + 300);
  }

  // Default: 'lose' — BMI-based calorie deficit
  const bmiVal = w / Math.pow(h / 100, 2);
  const deficit = bmiVal >= 35 ? 1000 : bmiVal >= 30 ? 750 : bmiVal >= 25 ? 500 : 250;
  const floor   = state.gender === 'male' ? 1500 : 1200;
  return Math.max(floor, Math.round(tdee - deficit));
}

function autoCalorieGoal() {
  // Only auto-set if user hasn't manually overridden
  if (state.calorieGoalManual) return;
  const rec = calcRecommendedGoal();
  if (rec) {
    state.calorieGoal = rec;
    localStorage.setItem('fitlog_goal', rec);
  }
}

function macroLimits() {
  // Dynamic macro limits based on calorie goal
  const kcal = state.calorieGoal || 2000;
  // Protein minimum: 1.6g per kg body weight (ISSN standard), fallback 80kg if not set
  const protMin = Math.round((state.weight || 80) * 1.6);
  return {
    protMin,
    protMax: Math.max(protMin, Math.round((kcal * 0.30) / 4)), // never below minimum
    carbMin: Math.round((kcal * 0.20) / 4),
    carbMax: Math.round((kcal * 0.40) / 4),
    fatMin: 50,
    fatMax: Math.max(50, Math.round((kcal * 0.30) / 9)),   // never below minimum
    sugarMax: 50,
  };
}

function loadNutritionScore(date) {
  const cacheKey = 'ns_' + date;
  if (_renderCache[cacheKey] !== undefined) return _renderCache[cacheKey];
  const raw = localStorage.getItem(SCORE_KEY + date);
  try {
    const result = raw ? JSON.parse(raw) : null;
    _renderCache[cacheKey] = result;
    return result;
  } catch {
    _renderCache[cacheKey] = null;
    return null;
  }
}

function saveNutritionScore(date, score) {
  localStorage.setItem(SCORE_KEY + date, JSON.stringify(score));
}

// ─── RING SVG ─────────────────────────────────────────────────────────────────

function ringHTML(consumed, burned, goal) {
  const net = consumed - burned;
  const pct = Math.min(1, Math.max(0, net / goal));
  // Smaller ring: 110px container, r=44
  const r = 44, cx = 55, cy = 55;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct;
  // For gain mode: being above goal (surplus) is good — green; for lose: it's bad — red
  const overGoal = net > goal;
  const color = overGoal
    ? (state.fitnessGoal === 'gain' ? 'var(--green)' : 'var(--red)')
    : 'var(--green)';
  return `
    <div class="ring-wrap" style="width:110px;height:110px;flex-shrink:0">
      <svg width="110" height="110" style="transform:rotate(-90deg)">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s4)" stroke-width="10"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <span class="ring-kcal" style="color:${color};font-size:26px;line-height:1">${Math.round(net)}</span>
        <span class="ring-label" style="font-size:10px;margin-top:3px">NET kcal</span>
      </div>
    </div>`;
}

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────

function totals() {
  const d = state.dayData;
  const consumed    = d.meals.reduce((s, m) => s + (m.calories || 0), 0);
  const exBurned    = d.exercises.reduce((s, e) => s + (e.burned || 0), 0);
  // Include legacy workout entries (fitlog_workout_*) in burned total for history correctness
  const workout     = cachedLoadWorkout(state.date);
  const workoutBurned = workout.reduce((s, e) => s + (e.calories || 0), 0);
  const burned      = exBurned + workoutBurned;
  const protein     = d.meals.reduce((s, m) => s + (m.protein || 0), 0);
  const carbs       = d.meals.reduce((s, m) => s + (m.carbs || 0), 0);
  const fat         = d.meals.reduce((s, m) => s + (m.fat || 0), 0);
  const sugar       = d.meals.reduce((s, m) => s + (m.sugar || 0), 0);
  return { consumed, burned, protein, carbs, fat, sugar, net: consumed - burned };
}

function macroBar(label, value, min, max, color, unit) {
  unit = unit || 'g';
  const pct = Math.min(100, (value / max) * 100);
  const overMax = value > max;
  const underMin = min > 0 && value < min;
  const statusColor = overMax ? 'var(--red)' : underMin ? 'var(--orange)' : color;

  // Badge: shows overage amount for overMax, percentage otherwise
  const badgeText   = overMax ? `+${Math.round(value - max)}${unit}` : `${Math.round(pct)}%`;
  const badgeBg     = overMax ? 'var(--red)' : underMin ? 'var(--orange)' : color;

  return `
    <div class="macro-row">
      <div class="macro-top">
        <span style="color:${color};font-weight:700;font-size:13px">${label}</span>
        <div style="display:flex;align-items:baseline;gap:5px">
          <span style="color:${statusColor};font-weight:700;font-family:var(--mono);font-size:13px">${Math.round(value)}${unit}</span>
          <span style="color:var(--muted);font-size:11px">/ ${max}${unit}</span>
          <span style="font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:${badgeBg}22;color:${badgeBg}">${badgeText}</span>
        </div>
      </div>
      <div class="macro-track" style="margin-top:5px">
        <div class="macro-fill" style="width:${pct}%;background:${statusColor}"></div>
      </div>
    </div>`;
}

// ─── WEEK DATA & STREAK ───────────────────────────────────────────────────────

// Returns current week Mon–Sun (future days shown as empty)
function getWeekData(offset = 0) {
  const result = [];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  // Start from Monday of the target week (offset=0 means current week)
  const dow = today.getDay(); // 0=Sun, 1=Mon...
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset + offset * 7);
  monday.setHours(0, 0, 0, 0);

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    d.setHours(0, 0, 0, 0);
    const dateStr = localDateStr(d);
    if (d > today) {
      result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, protein: 0, carbs: 0, fat: 0, goal: state.calorieGoal, hasData: false, future: true });
      continue;
    }
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (day) {
      const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
      const exBurned  = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
      const workoutDay = cachedLoadWorkout(dateStr);
      const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
      const burned = exBurned + workoutBurned;
      // Aggregate macros from all meals of the day
      const protein = day.meals?.reduce((s, m) => s + (m.protein || 0), 0) || 0;
      const carbs   = day.meals?.reduce((s, m) => s + (m.carbs   || 0), 0) || 0;
      const fat     = day.meals?.reduce((s, m) => s + (m.fat     || 0), 0) || 0;
      // Use snapshotted goal from the day it was logged; fall back to current goal
      const goal    = day.goalSnapshot || state.calorieGoal;
      result.push({ date: dateStr, consumed, burned, net: consumed - burned, protein, carbs, fat, goal, hasData: consumed > 0, future: false });
    } else {
      result.push({ date: dateStr, consumed: 0, burned: 0, net: 0, protein: 0, carbs: 0, fat: 0, goal: state.calorieGoal, hasData: false, future: false });
    }
  }
  return result;
}

function calcStreak() {
  let streak = 0;

  // Helper: get net calories for a date including workout
  function getDayNet(dateStr) {
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (!day) return null;
    const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
    if (consumed === 0) return null;
    const exBurned = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
    const workoutDay = cachedLoadWorkout(dateStr);
    const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
    return consumed - exBurned - workoutBurned;
  }

  // Check if today counts — condition differs by fitnessGoal mode
  const todayNet = getDayNet(todayStr());
  const todayOnTarget = state.fitnessGoal === 'gain'
    ? todayNet !== null && todayNet >= state.calorieGoal   // gain: surplus = on target
    : todayNet !== null && todayNet < state.calorieGoal;   // lose/maintain: deficit = on target

  for (let i = todayOnTarget ? 0 : 1; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = localDateStr(d);
    const net = getDayNet(dateStr);
    if (net === null) break;
    const onTarget = state.fitnessGoal === 'gain' ? net >= state.calorieGoal : net < state.calorieGoal;
    if (onTarget) streak++;
    else break;
  }
  return streak;
}

function weekChartHTML(weekData) {
  const goal = state.calorieGoal;
  const maxNet = Math.max(goal * 1.3, ...weekData.map(d => d.net));
  const days = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su']; // Sun=0 index kept for getDay()
  const todayDate = todayStr();

  const bars = weekData.map(d => {
    const date = new Date(d.date + 'T12:00:00');
    const dayLabel = days[date.getDay()];
    const isToday = d.date === todayDate;
    const heightPct = d.hasData ? Math.max(4, (d.net / maxNet) * 100) : 4;
    // Today: full opacity; past with data: 0.85; past no data: 0.3; future: 0.12
    const opacity = isToday ? 1 : d.future ? 0.12 : d.hasData ? 0.85 : 0.3;
    // Future bars use s3, past no-data s5, today/past with data use green/red based on goal mode
    const onTarget = state.fitnessGoal === 'gain' ? d.net >= goal : d.net < goal;
    const color = d.future ? 'var(--s5)' : !d.hasData ? 'var(--s6)' : onTarget ? 'var(--green)' : 'var(--red)';
    // Today gets a subtle top border highlight
    const todayStyle = isToday ? 'outline:1.5px solid var(--green);outline-offset:-1px;border-radius:4px 4px 0 0;' : '';
    const kcalLabel = d.hasData ? (d.net >= 1000 ? Math.round(d.net/100)/10 + 'k' : Math.round(d.net)) : '';
    return `
      <div class="chart-col">
        <div class="chart-kcal">${kcalLabel}</div>
        <div class="chart-bar" style="height:${heightPct}%;background:${color};opacity:${opacity};${todayStyle}"></div>
        <div class="chart-day ${isToday ? 'today' : ''}">${dayLabel}</div>
      </div>`;
  }).join('');

  // Goal line position
  const goalPct = Math.min(95, (goal / maxNet) * 100);

  // Weekly averages (only days with data)
  const daysWithData = weekData.filter(d => d.hasData && !d.future);
  const avgNet = daysWithData.length ? Math.round(daysWithData.reduce((s, d) => s + d.net, 0) / daysWithData.length) : 0;
  const deficitDays = daysWithData.filter(d => d.net < goal).length;
  const surplusDays = daysWithData.length - deficitDays;
  const isGainMode  = state.fitnessGoal === 'gain';
  const onTargetDays = isGainMode ? surplusDays : deficitDays;
  // avgNet color: for gain green = above goal; for lose green = below goal
  const avgColor = isGainMode
    ? (avgNet >= goal ? 'var(--green)' : 'var(--red)')
    : (avgNet < goal ? 'var(--green)' : 'var(--red)');

  return `
    <div class="week-chart">
      <div style="position:relative">
        <div style="position:absolute;bottom:${goalPct}%;left:0;right:0;height:1px;background:var(--s8);z-index:1;display:flex;align-items:center;justify-content:flex-end">
          <span style="background:var(--s4);padding:1px 5px;font-size:9px;color:var(--s10);font-family:var(--mono);border:1px solid var(--s6);border-radius:3px;line-height:1.4;margin-right:2px">cilj ${goal}</span>
        </div>
        <div class="chart-bars">${bars}</div>
      </div>
      <div class="week-avg">
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:${avgColor}">${avgNet > 0 ? avgNet : '-'}</div>
          <div class="week-avg-label">prosek kcal</div>
        </div>
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:var(--green)">${onTargetDays}/${daysWithData.length}</div>
          <div class="week-avg-label">${isGainMode ? 'dana u suficitu' : 'dana u deficitu'}</div>
        </div>
        <div class="week-avg-item">
          <div class="week-avg-val" style="color:${avgColor}">
            ${avgNet > 0
              ? (isGainMode
                  ? (avgNet >= goal ? '✓ suficit' : '✗ deficit')
                  : (avgNet < goal ? '✓ deficit' : '✗ višak'))
              : '-'}
          </div>
          <div class="week-avg-label">nedeljni status</div>
        </div>
      </div>
    </div>`;
}

function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: 'Pothranjenost', color: 'var(--blue)' };
  if (bmi < 25)   return { label: 'Normalna težina', color: 'var(--green)' };
  if (bmi < 30)   return { label: 'Prekomerna težina', color: 'var(--orange)' };
  if (bmi < 35)   return { label: 'Gojaznost I', color: 'var(--red)' };
  if (bmi < 40)   return { label: 'Gojaznost II', color: 'var(--red)' };
  return { label: 'Gojaznost III', color: 'var(--red)' };
}



function getHistoryData(maxDays = 90) {
  const cacheKey = 'historyData_' + maxDays;
  if (_renderCache[cacheKey] !== undefined) return _renderCache[cacheKey];
  const entries = [];
  for (let i = 0; i < maxDays; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = localDateStr(d);
    const day = safeParseLS('fitlog_day_' + dateStr);
    if (day) {
      const consumed = day.meals?.reduce((s, m) => s + (m.calories || 0), 0) || 0;
      const exBurned  = day.exercises?.reduce((s, e) => s + (e.burned || 0), 0) || 0;
      const workoutDay = cachedLoadWorkout(dateStr);
      const workoutBurned = workoutDay.reduce((s, e) => s + (e.calories || 0), 0);
      const burned = exBurned + workoutBurned;
      const protein = day.meals?.reduce((s, m) => s + (m.protein || 0), 0) || 0;
      if (consumed > 0 || burned > 0) {
        entries.push({ date: dateStr, consumed, burned, net: consumed - burned, protein });
      }
    }
  }
  _renderCache[cacheKey] = entries;
  return entries;
}

function productCardInnerHTML(p, isExp, toggleFn, deleteOnClick, dataAttr, showDate = true, isDuplicate = false) {
  const rating = p.rating || 'moderate';
  const badge  = rating === 'good'
    ? `<span class="product-rating-badge rating-good">✅ Dobro</span>`
    : rating === 'avoid'
    ? `<span class="product-rating-badge rating-avoid">❌ Izbegavaj</span>`

    ? `<div style="margin-bottom:8px">${p.red_flags.map(f => `<span class="red-flag-chip">⚑ ${f}</span>`).join('')}</div>`
    : '';

  // Calculate total values for the serving size
  const srv   = p.serving_size_g || null;
  const ratio = srv ? srv / 100 : null;
  const tot   = ratio ? {
    cal:     Math.round((p.calories_per_100g || 0) * ratio),
    protein: Math.round((p.protein_per_100g  || 0) * ratio * 10) / 10,
    carbs:   Math.round((p.carbs_per_100g    || 0) * ratio * 10) / 10,
    fat:     Math.round((p.fat_per_100g      || 0) * ratio * 10) / 10,
    sugar:   Math.round((p.sugar_per_100g    || 0) * ratio * 10) / 10,
    fiber:   Math.round((p.fiber_per_100g    || 0) * ratio * 10) / 10,

  // Collapsed pills — total values when serving known, otherwise per-100g with label
  const pillProtein = tot
    ? `<span class="pill" style="background:rgba(143,212,46,0.13);color:var(--green)">P ${tot.protein}g</span>`
    : `<span class="pill" style="background:rgba(143,212,46,0.13);color:var(--green)">P ${p.protein_per_100g||0}g/100g</span>`;
  const pillSugar = tot
    ? `<span class="pill" style="background:rgba(255,107,157,0.13);color:var(--pink)">Š ${tot.sugar}g</span>`

  // Date formatted as "13.05." — same style as meal-time-badge
  const dateStr = p.date

  // Helper: one macro cell with total value (large) + per-100g label (small)
  const macroCell = (totalVal, per100Val, label, color) => `
    <div class="product-macro-cell">
      <div class="product-macro-val" style="color:${color}">${totalVal !== null ? totalVal + 'g' : '–'}</div>

      ${per100Val !== null ? `<div style="font-size:9px;color:var(--muted);margin-top:1px">${per100Val}g/100g</div>` : ''}
    </div>`;

  const calCell = `
    <div class="product-macro-cell">
      <div class="product-macro-val" style="color:var(--text)">${tot ? tot.cal : p.calories_per_100g||0}</div>
      <div class="product-macro-lbl">kcal${tot ? '' : '/100g'}</div>
      ${tot ? `<div style="font-size:9px;color:var(--muted);margin-top:1px">${p.calories_per_100g||0}/100g</div>` : ''}
    </div>`;

  return `
    <div class="product-card${isExp ? ' expanded' : ''}${isDuplicate ? ' product-card-duplicate' : ''}" ${dataAttr}="${p.id}">
      <!-- Header: date | name (truncated) | badge | chevron — mirrors meal-header layout -->
      <div class="product-card-header" onclick="${toggleFn}(${p.id})">
        ${(showDate && dateStr) ? `<span class="meal-time-badge">${dateStr}</span>` : ''}
        <span class="meal-summary">${p.name}</span>
        ${badge}
        <span class="meal-chevron${isExp ? ' open' : ''}">▾</span>
      </div>
      <!-- Collapsed pills — hidden when .expanded -->
      <div class="product-collapsed">
        ${pillProtein}${pillSugar}${pillCal}
      </div>
      <!-- Expanded full detail — shown when .expanded -->
      <div class="product-expanded">
        <!-- Full name + brand + serving size — visible only when expanded -->
        <div style="padding-bottom:10px;border-bottom:1px solid var(--s3);margin-bottom:10px">
          <div style="font-size:15px;font-weight:700;line-height:1.4">${p.name}</div>
          ${(p.brand || srv) ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${[p.brand, srv ? srv + 'g' : null].filter(Boolean).join(' · ')}</div>` : ''}
        </div>
        <div class="product-macro-grid">
          ${macroCell(tot?.protein ?? null, p.protein_per_100g||0, 'Proteini',       'var(--green)')}
          ${macroCell(tot?.carbs   ?? null, p.carbs_per_100g  ||0, 'Ugljeni hidrati','var(--blue)')}
          ${macroCell(tot?.fat     ?? null, p.fat_per_100g    ||0, 'Masti',           'var(--orange)')}
          ${macroCell(tot?.sugar   ?? null, p.sugar_per_100g  ||0, 'Šećeri',          'var(--pink)')}
          ${macroCell(tot?.fiber   ?? null, p.fiber_per_100g  ||0, 'Vlakna',          'var(--muted)')}
          ${calCell}
        </div>
        ${flagsHTML}
        ${p.rating_reason ? `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:6px;font-style:italic">${p.rating_reason}</div>` : ''}
        ${p.summary ? `<div style="font-size:13px;color:var(--muted);line-height:1.6">${p.summary}</div>` : ''}
        ${deleteOnClick ? `

        <div style="margin-top:10px">
          <button onclick="event.stopPropagation(); addProductToMeal(${p.id}, '${p.date}')"
