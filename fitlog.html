}

function deleteWeightEntry(date) {
  const log = loadWeightLog().filter(e => e.date !== date);
  localStorage.setItem('fitlog_weightlog', JSON.stringify(log));
  // Update current weight to latest entry
  if (log.length > 0) {
    state.weight = log[0].weight;
    localStorage.setItem('fitlog_weight', log[0].weight);
  } else {
    state.weight = null;
    localStorage.removeItem('fitlog_weight');
  }
  render();
}

function weightChartHTML(log) {
  if (log.length < 2) return `<div style="color:var(--s7);font-size:12px;padding:8px 0">Potrebno najmanje 2 merenja za grafikon.</div>`;
  const entries = [...log].reverse();
  const weights = entries.map(e => e.weight);
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const W = 300, H = 80;
  const xStep = entries.length > 1 ? W / (entries.length - 1) : W;
  const pts = entries.map((e, i) => {
    const x = i * xStep;
    const y = H - ((e.weight - minW) / (maxW - minW)) * H;
    return { x, y };
  });
  const points = pts.map(p => `${p.x},${p.y}`).join(' ');
  // Filled area path
  const areaPath = `M${pts[0].x},${H} ` + pts.map(p => `L${p.x},${p.y}`).join(' ') + ` L${pts[pts.length-1].x},${H} Z`;
  const dots = pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--green)"/>`).join('');

  // Linear regression trend line
  const n = entries.length;
  const sumX = entries.reduce((s, _, i) => s + i, 0);
  const sumY = entries.reduce((s, e) => s + e.weight, 0);
  const sumXY = entries.reduce((s, e, i) => s + i * e.weight, 0);
  const sumX2 = entries.reduce((s, _, i) => s + i * i, 0);
  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  const trendY0 = H - ((intercept - minW) / (maxW - minW)) * H;
  const trendY1 = H - ((intercept + slope * (n - 1) - minW) / (maxW - minW)) * H;
  const trendColor = slope < -0.01 ? 'var(--green)' : slope > 0.01 ? 'var(--red)' : 'var(--muted)';
  const trendLabel = slope < -0.01 ? '↘ trend pada' : slope > 0.01 ? '↗ trend raste' : '→ stabilan';

  const diff = entries[entries.length-1].weight - entries[0].weight;
  const diffColor = diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--muted)';
  return `
    <div class="weight-chart-wrap">
      <svg class="weight-chart-svg" viewBox="-10 -10 ${W+20} ${H+20}" height="90">
        <defs>
          <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8fd42e" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#8fd42e" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- Gradient fill under line -->
        <path d="${areaPath}" fill="url(#chartFill)"/>
        <!-- Trend line -->
        <line x1="0" y1="${trendY0}" x2="${W}" y2="${trendY1}" stroke="${trendColor}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <!-- Data line -->
        <polyline points="${points}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--s9);margin-top:2px">
        <span>${entries[0].date.slice(5)}</span>
        <span style="color:${trendColor};font-weight:700">${trendLabel}</span>
        <span style="color:${diffColor};font-weight:700">${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg</span>
      </div>
    </div>`;
}

function zdravljeTabHTML() {
  const log = loadWeightLog();
  const h = state.height;
  const current = log[0] || null;
  const w = current ? current.weight : state.weight;
  const goal = state.calorieGoal;

  const activityMultipliers = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725 };
  const actMult = activityMultipliers[state.activity] || 1.2;

  // Water
  const waterToday = loadWater(state.date);
  const waterGoal = state.waterGoal;
  const waterPct = Math.min(100, (waterToday / waterGoal) * 100);
  const drops = 8;
  const mlPerDrop = waterGoal / drops;
  const filledDrops = Math.min(drops, Math.floor(waterToday / mlPerDrop));
  const dayNames = ['Ne','Po','Ut','Sr','Ce','Pe','Su'];
  const waterHistory = loadWaterHistory(7);
  let waterStreak = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const ml = parseInt(localStorage.getItem('fitlog_water_' + ds) || 0);
    if (ml >= waterGoal) waterStreak++;
    else if (i > 0) break;
  }

  const waterSection = `
    <div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between">
        <span>💧 Voda danas</span>
        <span style="font-family:var(--mono);color:var(--blue);font-size:12px">${waterToday} / ${waterGoal} ml</span>
      </div>
      <div class="water-drops">
        ${Array.from({length: drops}, (_, i) =>
          `<div class="water-drop ${i < filledDrops ? 'filled' : 'empty'}">💧</div>`
        ).join('')}
      </div>
      <div style="height:5px;background:var(--s4);border-radius:3px;overflow:hidden;margin-bottom:12px">
        <div style="height:100%;width:${waterPct}%;background:var(--blue);border-radius:3px;transition:width 0.4s"></div>
      </div>
      <div class="water-btns">
        <button class="water-btn" onclick="addWater(250)">+250 ml<br><span style="font-size:10px;font-weight:400;color:var(--s11)">čaša</span></button>
        <button class="water-btn" onclick="addWater(330)">+330 ml<br><span style="font-size:10px;font-weight:400;color:var(--s11)">limenka</span></button>
        <button class="water-btn" onclick="addWater(500)">+500 ml<br><span style="font-size:10px;font-weight:400;color:var(--s11)">flaša</span></button>
        <button class="water-btn" style="color:var(--red)" onclick="addWater(-250)">-250 ml<br><span style="font-size:10px;font-weight:400;color:var(--s11)">ispravka</span></button>
      </div>
      <div class="water-custom-row">
        <input class="water-custom-input" id="waterInput" type="number" placeholder="ml..." min="1" max="2000"/>
        <button class="water-add-btn" onclick="addWaterCustom()">Dodaj</button>
      </div>
      ${waterStreak > 0 ? `<div style="margin-top:10px;font-size:12px;color:var(--muted)">💧 Streak: <strong style="color:var(--blue)">${waterStreak} dan${waterStreak > 1 ? 'a' : ''}</strong> zaredom</div>` : ''}
      <div style="margin-top:12px">
        <div class="card-label" style="margin-bottom:6px">Poslednjih 7 dana</div>
        ${waterHistory.map(e => {
          const pct = Math.min(100, (e.ml / waterGoal) * 100);
          const dayObj = new Date(e.date + 'T12:00:00');
          const col = e.ml >= waterGoal ? 'var(--blue)' : e.ml > 0 ? 'var(--blue)66' : 'var(--s4)';
          const isToday = e.date === todayStr();
          return `<div class="water-hist-row">
            <span class="water-hist-date" style="${isToday ? 'color:var(--blue)' : ''}">${dayNames[dayObj.getDay()]}</span>
            <div class="water-hist-bar-wrap"><div class="water-hist-bar" style="width:${pct}%;background:${col}"></div></div>
            <span class="water-hist-val" style="color:${e.ml >= waterGoal ? 'var(--blue)' : 'var(--s9)'}">${e.ml > 0 ? e.ml + 'ml' : '—'}</span>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)">
        Dnevni cilj:
        <input class="goal-input" type="number" value="${waterGoal}" onchange="updateWaterGoal(this.value)" style="width:75px"/>
        <span style="color:var(--s9)">ml</span>
      </div>
    </div>`;

  if (!w || !h) {
    return `<div class="card" style="text-align:center;padding:32px 20px">
      <div style="font-size:36px;margin-bottom:12px">⚖️</div>
      <div style="color:var(--muted);font-size:13px">Unesi težinu i visinu u Pregled tabu da vidiš zdravstvene podatke.</div>
    </div>${waterSection}`;
  }

  const bmi = w / ((h / 100) ** 2);
  const cat = bmiCategory(bmi);
  const idealMin = Math.round(18.5 * (h / 100) ** 2);
  const idealMax = Math.round(24.9 * (h / 100) ** 2);
  const toIdeal = Math.max(0, Math.round(w - idealMax));
  const genderOffset = state.gender === 'male' ? 5 : -161;
  const bmr = Math.round(10 * w + 6.25 * h - 5 * state.age + genderOffset);
  const tdee = Math.round(bmr * actMult);
  const suggestedGoal = Math.round(tdee - 500);
  const bmiMin = 15, bmiMax = 45;
  const bmiPct = Math.min(98, Math.max(2, ((bmi - bmiMin) / (bmiMax - bmiMin)) * 100));

  const tw = state.targetWeight;
  let progHTML = '';
  if (tw && tw < w) {
    const toTarget = w - tw;
    const weeklyDeficit = goal < tdee ? (tdee - goal) * 7 / 7700 : 0;
    const weeksNeeded = weeklyDeficit > 0 ? Math.ceil(toTarget / weeklyDeficit) : null;
    const startWeight = log.length > 1 ? log[log.length-1].weight : w;
    const progressPct = startWeight > tw ? Math.min(100, Math.max(0, ((startWeight - w) / (startWeight - tw)) * 100)) : 0;
    progHTML = `
      <div class="prognoza-bar"><div class="prognoza-fill" style="width:${progressPct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px">
        <span>Start: ${startWeight} kg</span>
        <span style="color:var(--green);font-weight:700">Cilj: ${tw} kg (još -${Math.round(w - tw)} kg)</span>
      </div>
      ${weeksNeeded ? `<div style="margin-top:8px;font-size:12px;color:var(--muted)">
        Procena: <strong style="color:var(--text)">~${weeksNeeded} nedelja</strong>
        (~${weeklyDeficit.toFixed(1)} kg/ned)</div>` :
        `<div style="margin-top:6px;font-size:12px;color:var(--orange)">Postavi kalorijski deficit za prognozu.</div>`}`;
  }

  const prev = log[1] || null;
  let diffHTML = '';
  if (current && prev) {
    const diff = current.weight - prev.weight;
    const col = diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--muted)';
    diffHTML = `<span class="weight-log-diff" style="background:${col}22;color:${col}">${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg</span>`;
  }

  const logHTML = log.slice(0, 8).map((e, i) => {
    let entryDiff = '';
    if (i < log.length - 1) {
      const d = e.weight - log[i+1].weight;
      const c = d < 0 ? 'var(--green)' : d > 0 ? 'var(--red)' : 'var(--muted)';
      entryDiff = `<span class="weight-log-diff" style="background:${c}22;color:${c}">${d>0?'+':''}${d.toFixed(1)}</span>`;
    }
    return `<div class="weight-log-item">
      <span class="weight-log-date">${e.date}</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${entryDiff}
        <span class="weight-log-val">${e.weight} kg</span>
        <button onclick="deleteWeightEntry('${e.date}')" style="background:none;border:none;color:var(--s6);cursor:pointer;font-size:16px;padding:4px 6px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px">×</button>
      </div>
    </div>`;
  }).join('');

  const sub = state.zdravljeSubTab || 'tezina';
  const subNav = `
    <div class="sub-tabs">
      <button class="sub-tab ${sub==='tezina'?'active':'inactive'}" onclick="setZdravljeTab('tezina')">⚖️ Težina</button>
      <button class="sub-tab ${sub==='kalorije'?'active':'inactive'}" onclick="setZdravljeTab('kalorije')">🔥 Kalorije</button>
      <button class="sub-tab ${sub==='voda'?'active':'inactive'}" onclick="setZdravljeTab('voda')">💧 Voda</button>
    </div>`;

  if (sub === 'voda') return subNav + waterSection;

  if (sub === 'kalorije') return subNav + `
    <div class="card">
      <div class="card-label">🔥 Kalorije — preporuka</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--s2);border-radius:8px;border:1px solid var(--s5);margin-bottom:12px">
        <span style="font-size:12px;color:var(--s9);font-family:var(--mono)">${state.age}g · ${state.gender === 'male' ? 'M' : 'Ž'} · ${ACT_LABELS[state.activity] || state.activity}</span>
        <button onclick="openDrawer()" style="background:none;border:1px solid var(--s6);border-radius:6px;color:var(--s9);font-size:11px;padding:3px 9px;cursor:pointer;font-family:var(--sans)">⚙ Uredi profil</button>
      </div>
      <div class="zdravlje-stat">
        <span class="zdravlje-stat-label">Bazalni metabolizam (BMR)</span>
        <span class="zdravlje-stat-val">${bmr} kcal</span>
      </div>
      <div class="zdravlje-stat">
        <span class="zdravlje-stat-label">Dnevna potrošnja (TDEE)</span>
        <span class="zdravlje-stat-val" style="color:var(--blue)">${tdee} kcal</span>
      </div>
      <div class="zdravlje-stat">
        <span class="zdravlje-stat-label">Preporučeni cilj (-500 kcal)</span>
        <span class="zdravlje-stat-val" style="color:var(--green)">${suggestedGoal} kcal</span>
      </div>
      <div class="zdravlje-stat">
        <span class="zdravlje-stat-label">Tvoj trenutni cilj</span>
        <span class="zdravlje-stat-val" style="color:${goal <= suggestedGoal+100 ? 'var(--green)' : 'var(--orange)'}">
          ${goal} kcal ${goal > suggestedGoal+100 ? '↑' : '✓'}
          <button onclick="openDrawer()" style="background:none;border:none;color:var(--s9);font-size:10px;cursor:pointer;text-decoration:underline;margin-left:4px;font-family:var(--sans)">uredi</button>
        </span>
      </div>
    </div>`;

  // Default: Težina subtab
  return subNav + `
    <div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>⚖️ Težina</span>
        ${h ? `<span style="font-size:11px;color:var(--s9)">${h} cm <span onclick="startEditHeight()" style="color:var(--s10);cursor:pointer;text-decoration:underline">izmeni</span></span>` :
          `<button class="weight-btn" onclick="startEditHeight()" style="font-size:11px">+ Visina</button>`}
      </div>
      ${state.editHeight ? `<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
        <span style="font-size:12px;color:var(--muted)">Visina:</span>
        <input class="weight-input" id="hInput" type="number" value="${state.heightInput}" placeholder="cm" style="width:70px"/>
        <button class="save-btn" onclick="saveHeight()">Sačuvaj</button>
      </div>` : ''}
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
        <div style="font-size:48px;font-weight:800;font-family:var(--mono);color:var(--text);line-height:1">${current ? current.weight : '—'}</div>
        <div style="font-size:14px;color:var(--muted)">kg ${diffHTML}</div>
        <button class="weight-btn" onclick="startEditWeight()" style="margin-left:auto;font-size:11px">${current ? '✏ Izmeri' : '+ Unesi težinu'}</button>
      </div>
      ${state.editWeight ? `<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
        <span style="font-size:12px;color:var(--muted)">Nova težina:</span>
        <input class="weight-input" id="wInput" type="number" value="${state.weightInput}" placeholder="kg"/>
        <button class="save-btn" onclick="saveWeight()">Sačuvaj</button>
      </div>` : ''}
      <div style="background:var(--s1);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="font-size:36px;font-weight:800;font-family:var(--mono);color:${cat.color}">${bmi.toFixed(1)}</div>
          <div>
            <div style="font-size:14px;font-weight:700;color:${cat.color}">${cat.label}</div>
            <div style="font-size:11px;color:var(--muted)">Idealna: ${idealMin}–${idealMax} kg</div>
            ${toIdeal > 0 ? `<div style="font-size:11px;color:var(--orange)">Do idealne: -${toIdeal} kg</div>` : ''}
          </div>
          ${(() => {
            const bf = estimateBodyFat(bmi, state.age, state.gender);
            const bfColor = state.gender === 'male'
              ? (bf < 6 ? 'var(--blue)' : bf < 14 ? 'var(--green)' : bf < 25 ? 'var(--orange)' : 'var(--red)')
              : (bf < 14 ? 'var(--blue)' : bf < 21 ? 'var(--green)' : bf < 32 ? 'var(--orange)' : 'var(--red)');
            return `<div style="margin-left:auto;text-align:center">
              <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:${bfColor}">${bf}%</div>
              <div style="font-size:11px;color:var(--muted)">tel. mast</div>
            </div>`;
          })()}
        </div>
        <div class="bmi-scale-wrap" style="margin-top:10px">
          <div class="bmi-scale-track"><div class="bmi-scale-marker" style="left:${bmiPct}%"></div></div>
          <div class="bmi-scale-labels"><span>Pothr.</span><span>Normalno</span><span>Prekomerno</span><span>Gojaznost</span></div>
        </div>
      </div>
      ${log.length >= 2 ? `<div style="margin-bottom:10px">${weightChartHTML(log)}</div>` : ''}
      <div><div class="card-label">Istorija</div>${logHTML}</div>
    </div>

    <div class="card">
      <div class="card-label">🎯 Ciljna težina</div>
      ${state.targetWeight ? `
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
          <span style="font-size:32px;font-weight:800;font-family:var(--mono);color:var(--green)">${state.targetWeight}</span>
          <span style="color:var(--muted)">kg</span>
          <button onclick="clearTargetWeight()" style="margin-left:auto;background:none;border:1px solid var(--s6);border-radius:6px;color:var(--s10);padding:4px 10px;font-size:11px;cursor:pointer">izmeni</button>
        </div>${progHTML}` :
        `<div style="color:var(--muted);font-size:13px;margin-bottom:10px">Postavi ciljnu težinu da vidiš prognozu mršavljenja.</div>`}
      ${state.editTargetWeight ? `
        <div class="target-input-row">
          <span style="font-size:12px;color:var(--muted)">Cilj:</span>
          <input class="target-input" id="twInput" type="number" placeholder="kg" value="${state.targetWeightInput}"/>
          <button class="save-btn" onclick="saveTargetWeight()">Sačuvaj</button>
          <button onclick="state.editTargetWeight=false;render()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px">✕</button>
        </div>` : `
        <button class="weight-btn" onclick="startEditTargetWeight()" style="font-size:12px;margin-top:4px">
          ${state.targetWeight ? '' : '+ '}Postavi ciljnu težinu
        </button>`}
    </div>`;
}

function addWater(ml) {
  const current = loadWater(state.date);
  const updated = Math.max(0, current + ml);
  saveWater(state.date, updated);
  if (ml > 0) showToast(`+${ml}ml dodato 💧`);
  render();
}

function addWaterCustom() {
  const input = document.getElementById('waterInput');
  const ml = parseInt(input?.value);
  if (!ml || ml <= 0) { showToast('Unesi količinu u ml', 'err'); return; }
  const current = loadWater(state.date);
  saveWater(state.date, current + ml);
  showToast(`+${ml}ml dodato 💧`);
  render();
}

function updateWaterGoal(val) {
  const v = parseInt(val);
  if (!isNaN(v) && v > 0) {
    state.waterGoal = v;
    localStorage.setItem('fitlog_water_goal', v);
    localStorage.setItem('fitlog_water_goal_manual', '1');
  }
}

function startEditTargetWeight() {
  state.editTargetWeight = true;
  state.targetWeightInput = state.targetWeight || '';
  render();
  document.getElementById('twInput')?.focus();
}

function saveTargetWeight() {
  const v = parseFloat(document.getElementById('twInput')?.value);
  if (!isNaN(v) && v > 0) {
    state.targetWeight = v;
    localStorage.setItem('fitlog_target_weight', v);
  }
  state.editTargetWeight = false;
  render();
}

function clearTargetWeight() {
  state.editTargetWeight = true;
  state.targetWeightInput = state.targetWeight || '';
  render();
  document.getElementById('twInput')?.focus();
}

// ─── SWIPE TO DELETE ──────────────────────────────────────────────────────────
const _swipe = {};
function swipeCancel(id) {
  if (!_swipe[id]) return;
  const el = document.getElementById('swipe-meal-' + id);
  const bg = el?.parentElement?.querySelector('.swipe-delete-bg');
  if (el) el.style.transform = 'translateX(0)';
  if (bg) bg.style.opacity = '0';
  delete _swipe[id];
}
function swipeStart(e, id, type) {
  _swipe[id] = { startX: e.touches[0].clientX, type };
}
function swipeMove(e, id) {
  if (!_swipe[id]) return;
  const dx = e.touches[0].clientX - _swipe[id].startX;
  if (dx >= 0) return;
  const el = document.getElementById('swipe-meal-' + id);
  const bg = el?.parentElement?.querySelector('.swipe-delete-bg');
  if (el) el.style.transform = `translateX(${Math.max(-80, dx)}px)`;
  if (bg) bg.style.opacity = String(Math.min(1, Math.abs(dx) / 60));
}
function swipeEnd(e, id, type) {
  if (!_swipe[id]) return;
  const dx = e.changedTouches[0].clientX - _swipe[id].startX;
  const el = document.getElementById('swipe-meal-' + id);
  const bg = el?.parentElement?.querySelector('.swipe-delete-bg');
  if (dx < -60) {
    if (el) el.style.transform = 'translateX(-100%)';
    if (bg) bg.style.opacity = '0';
    setTimeout(() => { if (type === 'meal') deleteMeal(id); }, 200);
  } else {
    if (el) el.style.transform = 'translateX(0)';
    if (bg) bg.style.opacity = '0';
  }
  delete _swipe[id];
}

// ─── BODY FAT ESTIMATE ────────────────────────────────────────────────────────
function estimateBodyFat(bmi, age, gender) {
  // Deurenberg formula
  const factor = gender === 'male' ? 1 : 0;
  return Math.round((1.20 * bmi) + (0.23 * age) - (10.8 * factor) - 5.4);
}

function openHistoryDetail(date) {
  state.selectedHistoryDate = date;
  render();
  window.scrollTo(0, 0);
}

function closeHistoryDetail() {
  state.selectedHistoryDate = null;

}

function handleImageSelect(input) {
  const file = input.files[0];
  if (!file) return;
  // Reject files over 8MB — Gemini API limit
  if (file.size > 8 * 1024 * 1024) {
    showToast('Slika je prevelika (max 8MB). Smanji rezoluciju.', 'err');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const b64 = e.target.result.split(',')[1];
    state.imageBase64 = b64;
    state.imageMime = file.type || 'image/jpeg';
    render();
  };
  reader.readAsDataURL(file);
}

// ── existing actions below ──

function saveApiKey() {
  const val = document.getElementById('apiInput').value.trim();
  if (!val) { showToast('Unesi API ključ', 'err'); return; }
  state.apiKey = val;
  localStorage.setItem('fitlog_apikey', val);
  state.dayData = loadDay(state.date);
  render();
}

function clearApiKey() {
  if (confirm('Obriši API ključ?')) {
    state.drawerOpen = false; // close drawer before transitioning to API key screen
    state.apiKey = '';
    localStorage.removeItem('fitlog_apikey');
    renderDrawer(); // visually close drawer first
    render(); // then show API key screen
  }
}

function startEditWeight() {
  state.editWeight = true;
  state.weightInput = state.weight || '';
  render();
  document.getElementById('wInput')?.focus();
}

function saveWeight() {
  const v = parseFloat(document.getElementById('wInput').value);
  if (!isNaN(v) && v > 0) {
    state.weight = v;
    localStorage.setItem('fitlog_weight', v);
    saveWeightEntry(todayStr(), v);
    // Auto-update water goal only if user hasn't manually set it
    const manualGoal = localStorage.getItem('fitlog_water_goal_manual');
    if (!manualGoal) {
      state.waterGoal = Math.round(v * 30);
    }
    // Recalculate calorie goal if not manually set
    autoCalorieGoal();
  }
  state.editWeight = false;
  render();
}

function startEditHeight() {
  state.editHeight = true;
  state.heightInput = state.height || '';
  render();
  document.getElementById('hInput')?.focus();
}

function saveHeight() {
  const v = parseFloat(document.getElementById('hInput').value);
  if (!isNaN(v) && v > 0) {
    state.height = v;
    localStorage.setItem('fitlog_height', v);
  }
  state.editHeight = false;
  render();
}

async function scoreNutrition() {
  const d = state.dayData;
  if (!d.meals.length) { showToast('Nema unesenih obroka za danas', 'err'); return; }
  state.nutritionScoreLoading = true;
  state.nutritionScore = null;
  render();
  try {
    const t = totals();
    const ml = macroLimits();
    const mealsSummary = d.meals.map(m =>
      m.items.map(i => `${i.amount} ${i.name} (${i.calories} kcal)`).join(', ')
    ).join(' | ');
    const prompt = `Ti si nutricionistički asistent. Oceni kvalitet ishrane za danas.
Obroci: ${mealsSummary}
Ukupno: ${Math.round(t.consumed)} kcal, ${Math.round(t.protein)}g proteina, ${Math.round(t.carbs)}g UH, ${Math.round(t.fat)}g masti, ${Math.round(t.sugar)}g šećera.
Kalorijski cilj: ${state.calorieGoal} kcal. Proteinski cilj: ${ml.protMin}g.

Vrati SAMO validan JSON bez markdown oznaka:
{"score":broj_od_1_do_10,"protein":"✅ tekst ili ⚠️ tekst ili ❌ tekst","sugar":"✅ tekst ili ⚠️ tekst ili ❌ tekst","fat":"✅ tekst ili ⚠️ tekst ili ❌ tekst","calories":"✅ tekst ili ⚠️ tekst ili ❌ tekst","tip":"💡 jedan kratak savet za sutra"}`;

    const raw = await callGemini(prompt, 0.3);
    const score = JSON.parse(raw.replace(/```json|```/g, '').trim());
    state.nutritionScore = score;
    saveNutritionScore(state.date, score);
  } catch(e) {
    showToast('Greška pri oceni ishrane', 'err');
  } finally {
    state.nutritionScoreLoading = false;
    render();
  }
}

function saveOnboarding() {
  const w = parseFloat(document.getElementById('ob_weight')?.value);
  const h = parseFloat(document.getElementById('ob_height')?.value);
  const age = parseInt(document.getElementById('ob_age')?.value);
  const gender = document.getElementById('ob_gender')?.value;
  const activity = document.getElementById('ob_activity')?.value;

  if (!w || !h || !age) { showToast('Unesi sve podatke', 'err'); return; }

  state.weight = w; localStorage.setItem('fitlog_weight', w);
  state.height = h; localStorage.setItem('fitlog_height', h);
  state.age = age; localStorage.setItem('fitlog_age', age);
  state.gender = gender; localStorage.setItem('fitlog_gender', gender);
  state.activity = activity; localStorage.setItem('fitlog_activity', activity);
  localStorage.setItem('fitlog_onboarding_done', '1');

  // Save weight to log
  saveWeightEntry(todayStr(), w);

  // Auto water goal
  state.waterGoal = Math.round(w * 30);

  // Auto calorie goal
  state.calorieGoalManual = false;
  localStorage.removeItem('fitlog_goal_manual');
  autoCalorieGoal();

  showToast('Profil sačuvan! 🎉');
  render();
}

function toggleMeal(id) {
  // Direct DOM toggle — no render() call, no flash
  const item = document.querySelector(`.log-item[data-id="${id}"]`);
  if (!item) return;
  const isExpanded = item.classList.toggle('expanded');
  const chevron = item.querySelector('.meal-chevron');
  if (chevron) chevron.classList.toggle('open', isExpanded);
  if (isExpanded) state.expandedMealIds.add(id);
  else state.expandedMealIds.delete(id);
}

function toggleEx(id) {
  // Direct DOM toggle — no render() call, no flash
  const item = document.querySelector(`.log-item[data-ex-id="${id}"]`);
  if (!item) return;
  const isExpanded = item.classList.toggle('expanded');
  const chevron = item.querySelector('.meal-chevron');
  if (chevron) chevron.classList.toggle('open', isExpanded);
  if (isExpanded) state.expandedExIds.add(id);
  else state.expandedExIds.delete(id);
}

async function scoreMeal(mealId) {
  const meal = state.dayData.meals.find(m => m.id === mealId);
  if (!meal) return;
  state.mealScoreLoading = mealId;
  render();
  try {
    const items = meal.items.map(i => `${i.amount} ${i.name} (${i.calories} kcal)`).join(', ');
    const prompt = `Oceni ovaj obrok u jednoj rečenici (max 15 reči) i daj ocenu 1-10.
Obrok: ${items}
Ukupno: ${Math.round(meal.calories)} kcal, P${Math.round(meal.protein)}g UH${Math.round(meal.carbs)}g M${Math.round(meal.fat)}g Š${Math.round(meal.sugar||0)}g
Korisnik: ${state.weight}kg, cilj mršavljenje.
Vrati SAMO JSON bez markdown: {"score":broj,"comment":"jedna rečenica na srpskom"}`;
    const raw = await callGemini(prompt, 0.2);
    state.mealScores[mealId] = JSON.parse(raw.replace(/```json|```/g, '').trim());
    saveMealScores(state.date, state.mealScores);
  } catch(e) {
    state.mealScores[mealId] = { score: null, comment: 'Greška pri analizi.' };
  } finally {
    state.mealScoreLoading = null;
    render();
  }
}

function clearMealScore(mealId) {
  delete state.mealScores[mealId];
  saveMealScores(state.date, state.mealScores);
  render();
}

function toggleHistoryMeal(id) {
  if (state.expandedHistoryMealIds.has(id)) state.expandedHistoryMealIds.delete(id);
  else state.expandedHistoryMealIds.add(id);
  render();
}

function toggleHistoryScore(date) {
  state.expandedScoreDate = state.expandedScoreDate === date ? null : date;
  render();
}

function setZdravljeTab(sub) {
  state.zdravljeSubTab = sub;
  render();
}

function setTab(tab) {
  state.activeTab = tab;
  state.selectedHistoryDate = null;
  state.imageBase64 = null;
  state.imageMime = null;
  state.expandedMealIds = new Set();
  state.expandedExIds = new Set();
  state.expandedHistoryMealIds = new Set();
  state.expandedScoreDate = null;
  if (tab === 'log') {
    state.nutritionScore = loadNutritionScore(state.date);
    state.mealScores = loadMealScores(state.date);
  }
  render();
}

function setMode(mode) {
  state.mode = mode;
  state.imageBase64 = null;
  state.imageMime = null;
  render();
  document.getElementById('msgInput')?.focus();
}

function updateTrainingInput(exId, field, value) {
  if (field === 'name') state.trainingInputs[exId][field] = value;
  else state.trainingInputs[exId][field] = parseInt(value) || 0;
  debounceRender(); // debounced to avoid lag on fast typing
}

function addWorkoutEntry(exId) {
  const ex = EXERCISES.find(e => e.id === exId);
  if (!ex) return;
  const inp = state.trainingInputs[exId];
  // Guard against zero values
  if (ex.type === 'reps' && (!inp.sets || !inp.reps)) {
    showToast('Unesi serije i ponavljanja', 'err'); return;
  }
  if (ex.type === 'secs' && (!inp.sets || !inp.secs)) {
    showToast('Unesi serije i sekunde', 'err'); return;
  }
  const calories = calcExerciseKcal(ex, inp.sets, inp.reps || 0, inp.secs || 0);
  const entry = {
    uid: Date.now() + '_' + exId,
    exId,
    name: ex.name,
    sets: inp.sets,
    reps: ex.type === 'reps' ? inp.reps : null,
    secs: ex.type === 'secs' ? inp.secs : null,
    calories,
    time: new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' }),
  };
  const workout = loadWorkout(state.date);
  workout.push(entry);
  saveWorkout(state.date, workout);
  showToast(`${ex.name} dodato · -${calories} kcal`);
  render();
}

function addCustomWorkoutEntry() {
  // Read name directly from DOM to avoid re-render on every keystroke
  const nameEl = document.getElementById('customNameInput');
  const name = nameEl ? nameEl.value.trim() : state.trainingInputs.custom.name.trim();
  if (!name) { showToast('Unesi naziv vežbe', 'err'); return; }
  // Sync name to state for persistence
  state.trainingInputs.custom.name = name;
  const ci = state.trainingInputs.custom;
  const w = state.weight || 80;
  const calories = Math.round(ci.sets * ci.reps * 0.002 * w);
  const entry = {
    uid: Date.now() + '_custom',
    exId: 'custom',
    name,
    sets: ci.sets,
    reps: ci.reps,
    secs: null,
    calories,
    time: new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' }),
  };
  const workout = loadWorkout(state.date);
  workout.push(entry);
  saveWorkout(state.date, workout);
  state.trainingInputs.custom.name = ''; // reset after adding
  showToast(`${entry.name} dodato · ~-${calories} kcal`);
  render();
}

function deleteWorkoutEntry(uid) {
  const workout = loadWorkout(state.date).filter(e => e.uid !== uid);
  saveWorkout(state.date, workout);
  render();
}

function resetGoalToAuto() {
  state.calorieGoalManual = false;
  localStorage.removeItem('fitlog_goal_manual');
  autoCalorieGoal();
  render();
}

function deleteMeal(id) {
  state.dayData.meals = state.dayData.meals.filter(m => m.id !== id);
  saveDay(state.date, state.dayData);
  render();
}

function deleteEx(id) {
  state.dayData.exercises = state.dayData.exercises.filter(e => e.id !== id);
  saveDay(state.date, state.dayData);
  render();
}

async function handleSubmit() {
  const input = document.getElementById('msgInput')?.value.trim();
  // Require text OR image (image only valid in food mode)
  if (!input && !(state.imageBase64 && state.mode === 'food')) return;
  state.loading = true;
  render();

  try {
    const now = new Date().toLocaleTimeString('sr', { hour: '2-digit', minute: '2-digit' });

    if (state.mode === 'food') {
      let result;
      if (state.imageBase64) {
        // Image path — optional text becomes context for the model
        result = await parseFoodFromImage(state.imageBase64, state.imageMime || 'image/jpeg', input || null);
        state.imageBase64 = null;
        state.imageMime = null;
      } else {
        result = await parseFood(input);
      }
      if (!result?.items?.length) throw new Error('Nije parsovano');
      const meal = {
        id: Date.now(),
        time: now,
        items: result.items,
        calories: result.total_calories,
        protein: result.total_protein,
        carbs: result.total_carbs,
        fat: result.total_fat,
        sugar: result.total_sugar || 0,
        note: result.note || '',
      };
      state.dayData.meals.push(meal);
      saveDay(state.date, state.dayData);
      showToast(`+${Math.round(meal.calories)} kcal dodato ✓`);
    } else {
      const result = await parseExercise(input);
      if (!result?.items?.length) throw new Error('Nije parsovano');
      const ex = {
        id: Date.now(),
        time: now,
        items: result.items,
        burned: result.total_burned,
        note: result.note || '',
      };
      state.dayData.exercises.push(ex);
      saveDay(state.date, state.dayData);
      showToast(`-${Math.round(ex.burned)} kcal sagoreno ✓`);
    }
  } catch (e) {
    const msg = e.message?.includes('API_KEY_INVALID') || e.message?.includes('API_KEY') ? '❌ Neispravan API ključ — proveri u Promeni API ključ' :
                e.message?.includes('RESOURCE_EXHAUSTED') ? '⏳ API limit — sačekaj minut pa pokušaj' :
                e.message?.includes('quota') ? '⏳ Dnevni limit dostignut' :
                e.message?.includes('Failed to fetch') || e.message?.includes('fetch') ? '📡 Proveri internet konekciju' :
                `Greška: ${e.message?.slice(0, 55) || 'Pokušaj ponovo'}`;
    showToast(msg, 'err');
  } finally {
    state.loading = false;
    render();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

state.dayData = loadDay(state.date);
state.weightInput = state.weight || '';
state.heightInput = state.height || '';
state.nutritionScore = loadNutritionScore(state.date);
state.mealScores = loadMealScores(state.date);

// Migrate: if weight exists but log is empty, add it as today's entry
if (state.weight && loadWeightLog().length === 0) {
  saveWeightEntry(todayStr(), state.weight);
}

render();

// Toast element (persistent)
const toastEl = document.createElement('div');
toastEl.id = 'toast';
toastEl.style.display = 'none';
document.body.appendChild(toastEl);
</script>
