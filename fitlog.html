function historyTabHTML() {
  // Show detail view if a date is selected (only for obroci sub-tab)
  if (state.selectedHistoryDate && state.historySubTab === 'obroci') {
    return historyDayDetailHTML(state.selectedHistoryDate);
  }

  // Sub-tab switcher — Obroci | Proizvodi
  const subTabBar = `
    <div class="sub-tabs">
      <button class="sub-tab ${state.historySubTab === 'obroci' ? 'active' : 'inactive'}" onclick="setHistoryTab('obroci')">🍽 Obroci</button>
      <button class="sub-tab ${state.historySubTab === 'proizvodi' ? 'active' : 'inactive'}" onclick="setHistoryTab('proizvodi')">📦 Proizvodi</button>
    </div>`;

  if (state.historySubTab === 'proizvodi') {
    return subTabBar + productsHistoryHTML();
  }

  // ── OBROCI sub-tab — paginated by month ──────────────────────────────────────
  const entries = getHistoryData();
  const goal = state.calorieGoal;
  const todayDate = todayStr();

  // Build month list from all entries + current month (even if no data yet)
  const byMonth = {};
  entries.forEach(e => {
    const month = e.date.slice(0, 7);
    if (!byMonth[month]) byMonth[month] = [];
    byMonth[month].push(e);
  });

  // Sorted months descending (newest first)
  const allMonths = Object.keys(byMonth).sort().reverse();

  // Ensure current month is always reachable even with no data
  const now = new Date();
  const currentMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  if (!byMonth[currentMonthKey]) {
    allMonths.unshift(currentMonthKey);
    byMonth[currentMonthKey] = [];
  }

  // Clamp offset to valid range
  const maxOffset = allMonths.length - 1;
  const offset = Math.min(Math.max(state.historyMonthOffset, 0), maxOffset);
  if (state.historyMonthOffset !== offset) state.historyMonthOffset = offset;

  const activeMonth = allMonths[offset];
  const [yr, mo] = activeMonth.split('-');

  // Month label in Serbian
  const monthNames = ['Januar','Februar','Mart','April','Maj','Jun','Jul','Avgust','Septembar','Oktobar','Novembar','Decembar'];
  const monthLabel = `${monthNames[parseInt(mo) - 1]} ${yr}`;

  // Navigation bar — same style as week nav in pregled tab
  const isCurrentMonth = offset === 0;
  const navBar = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button onclick="shiftHistoryMonth(1)" ${offset >= maxOffset ? 'disabled' : ''} style="background:var(--s4);border:none;border-radius:8px;color:${offset < maxOffset ? 'var(--text)' : 'var(--s6)'};font-size:18px;width:36px;height:36px;cursor:${offset < maxOffset ? 'pointer' : 'default'};display:flex;align-items:center;justify-content:center;flex-shrink:0" aria-label="Prethodni mesec">&#8249;</button>
      <div style="text-align:center">
        <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)">${monthLabel.toUpperCase()}</div>
        ${isCurrentMonth ? '<div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.5px">TEKUĆI MESEC</div>' : `<div style="font-size:10px;color:var(--muted)">${offset} mes. unazad</div>`}
      </div>
      <button onclick="shiftHistoryMonth(-1)" ${isCurrentMonth ? 'disabled' : ''} style="background:var(--s4);border:none;border-radius:8px;color:${isCurrentMonth ? 'var(--s6)' : 'var(--text)'};font-size:18px;width:36px;height:36px;cursor:${isCurrentMonth ? 'default' : 'pointer'};display:flex;align-items:center;justify-content:center;flex-shrink:0" aria-label="Sledeći mesec">&#8250;</button>
    </div>`;

  const monthEntries = byMonth[activeMonth] || [];

  if (monthEntries.length === 0) {
    return subTabBar + `<div class="card">${navBar}<div class="hist-empty">📭 Nema unosa za ovaj mesec.</div></div>`;
  }

  const monthAvg = Math.round(monthEntries.reduce((s, e) => s + e.net, 0) / monthEntries.length);
  const monthDeficit = monthEntries.filter(e => e.net < goal).length;
  const monthSurplus = monthEntries.length - monthDeficit;
  const avgColor = state.fitnessGoal === 'gain'
    ? (monthAvg >= goal ? 'var(--green)' : 'var(--red)')
    : (monthAvg < goal ? 'var(--green)' : 'var(--red)');
  const onTargetCount = state.fitnessGoal === 'gain' ? monthSurplus : monthDeficit;

  const rows = monthEntries.sort((a, b) => b.date.localeCompare(a.date)).map(e => {
    const isToday = e.date === todayDate;
    const inDeficit = e.net < goal;
    const onTarget = state.fitnessGoal === 'gain' ? !inDeficit : inDeficit;
    const dotColor = onTarget ? 'var(--green)' : 'var(--red)';
    const netColor = onTarget ? 'var(--green)' : 'var(--red)';
    const dayNum = e.date.slice(8).replace(/^0/, '');
    const dayLabel = `${dayNum}.${e.date.slice(5,7)}.`;
    const score = loadNutritionScore(e.date);

    return `<div class="hist-item" onclick="openHistoryDetail('${e.date}')">
      <div class="hist-dot" style="background:${dotColor}"></div>
      <div class="hist-date ${isToday ? 'today' : ''}" style="min-width:44px;font-size:13px;font-family:var(--mono)">${dayLabel}</div>
      <div style="flex:1"></div>
      <div style="display:flex;align-items:center;gap:6px">
        ${score ? `<span style="font-family:var(--mono);font-size:11px;color:${score.score>=7?'var(--green)':score.score>=5?'var(--orange)':'var(--red)'};font-weight:700">${score.score}/10</span>` : ''}
        <div class="hist-net" style="font-family:var(--mono);font-size:18px;font-weight:800;color:${netColor};min-width:42px;text-align:right">${Math.round(e.net)}</div>
        <span style="font-size:20px;color:var(--s8);font-weight:400;line-height:1">›</span>
      </div>
    </div>`;
  }).join('');

  const html = `<div class="card">
    ${navBar}
    <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>${onTargetCount}/${monthEntries.length} dana</span>
      <span style="color:${avgColor};font-size:12px;font-weight:600">prosek ${monthAvg} kcal</span>
    </div>
    ${rows}
  </div>`;

  return subTabBar + html;
}

// Renders the products history sub-tab — grouped by month, collapsible cards per product
function productsHistoryHTML() {
  // Collect all dates with products from the last 90 days
  const byMonth = {};
  const allProducts = [];
  for (let i = 0; i < 90; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = localDateStr(d);
    const products = loadProducts(dateStr);
    if (!products.length) continue;
    const month = dateStr.slice(0, 7);
    if (!byMonth[month]) byMonth[month] = [];
    byMonth[month].push({ date: dateStr, products });
    products.forEach(p => allProducts.push(p));
  }

  // Build a set of normalized names that appear more than once across all history
  const nameCounts = {};
  allProducts.forEach(p => {
    const key = p.name?.trim().toLowerCase();
    if (key) nameCounts[key] = (nameCounts[key] || 0) + 1;
  });
  const duplicateNames = new Set(
    Object.entries(nameCounts).filter(([, count]) => count > 1).map(([name]) => name)
  );

  const months = Object.keys(byMonth).sort().reverse();
  if (!months.length) {
    return `<div class="card"><div class="hist-empty">📦 Još nema skeniranih proizvoda.<br>Dodaj ih na Dnevnik tabu!</div></div>`;
  }

  // Active search query (trimmed, lowercase for comparison)
  const rawQuery = state.productHistorySearch || '';
  const query = rawQuery.trim().toLowerCase();

  // Search input field — oninput updates state and re-renders
  const searchBar = `
    <div style="padding:8px 16px 4px">
      <div style="position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none">🔍</span>
        <input
          type="search"
          placeholder="Pretraži proizvode…"
          value="${rawQuery.replace(/"/g, '&quot;')}"
          oninput="state.productHistorySearch=this.value;scheduleRender()"
          style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px 10px 36px;font-size:14px;font-family:var(--sans);outline:none;min-height:44px"
        />
      </div>
    </div>`;

  // When search is active, flatten all products and filter — skip monthly grouping
  if (query) {
    const matched = allProducts.filter(p => p.name?.toLowerCase().includes(query));
    if (!matched.length) {
      return searchBar + `<div class="card"><div class="hist-empty">🔍 Nema rezultata za "<strong>${rawQuery}</strong>".</div></div>`;
    }

    const cards = matched.map(p => {
      const isExp = state.expandedHistoryProductIds.has(p.id);
      const isDup = duplicateNames.has(p.name?.trim().toLowerCase());
      const cardHTML = productCardInnerHTML(p, isExp, 'toggleHistoryProduct', null, 'data-hist-product-id', false, isDup);
      return `
        <div class="hist-swipe-wrap" ontouchstart="swipeStart(event,${p.id},'hist-product','${p.date||''}')" ontouchmove="swipeMove(event,${p.id})" ontouchend="swipeEnd(event,${p.id},'hist-product')" ontouchcancel="swipeCancel(${p.id})">
          <div class="swipe-delete-bg">🗑</div>
          <div class="hist-swipe-inner" id="swipe-hist-${p.id}">${cardHTML}</div>
        </div>`;
    }).join('');

    return searchBar + `<div class="card">${cards}</div>`;
  }
  // No search active — render full monthly grouping
  return searchBar + months.map(month => {
    const [yr, mo] = month.split('-');
    const monthLabel = `${mo}.${yr}`;
    const days = byMonth[month];
    const totalProducts = days.reduce((s, d) => s + d.products.length, 0);

    const dayBlocks = days.map(({ date, products }) => {
      const dayNum  = date.slice(8).replace(/^0/, '');
      const dayLabel = `${dayNum}.${date.slice(5,7)}.`;

      const cards = products.map(p => {
        const isExp    = state.expandedHistoryProductIds.has(p.id);
        const pWithDate = p.date ? p : { ...p, date };
        const isDup    = duplicateNames.has(p.name?.trim().toLowerCase());
        // Pass isDup flag so the card gets dimmed visually
        const cardHTML = productCardInnerHTML(pWithDate, isExp, 'toggleHistoryProduct', null, 'data-hist-product-id', false, isDup);
        // Wrap in swipe-to-delete container — passes date so delete knows which key to update
        return `
          <div class="hist-swipe-wrap" ontouchstart="swipeStart(event,${p.id},'hist-product','${date}')" ontouchmove="swipeMove(event,${p.id})" ontouchend="swipeEnd(event,${p.id},'hist-product')" ontouchcancel="swipeCancel(${p.id})">
            <div class="swipe-delete-bg">🗑</div>
            <div class="hist-swipe-inner" id="swipe-hist-${p.id}">${cardHTML}</div>
          </div>`;
      }).join('');

      return `
        <div style="margin-bottom:12px">
          <div style="font-size:13px;font-weight:700;color:var(--muted);font-family:var(--mono);padding:6px 0 2px;border-top:1px solid var(--s3)">
            ${dayLabel} · ${products.length} ${products.length === 1 ? 'proizvod' : 'proizvoda'}
          </div>
          ${cards}
        </div>`;
    }).join('');

    return `<div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>${monthLabel}</span>
        <span style="color:var(--muted);font-size:12px;font-weight:600">${totalProducts} skenirano</span>
      </div>
      ${dayBlocks}
    </div>`;
  }).join('');
}

function weeklyReportHTML(weekData) {
  // weekData passed from render to avoid double compute
  weekData = weekData || getWeekData(state.weekOffset);
  const goal = state.calorieGoal;
  const daysWithData = weekData.filter(d => d.hasData && !d.future);

  // Build human-readable week label (e.g. "12.05. – 18.05.")
  const weekStart = weekData[0].date;
  const weekEnd   = weekData[6].date;
  const weekLabel = `${fmtDate(weekStart)} – ${fmtDate(weekEnd)}`;

  // Week navigation header — disable forward button when already on current week
  const isCurrentWeek = state.weekOffset === 0;
  const navHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button onclick="shiftWeek(-1)" style="background:var(--s4);border:none;border-radius:8px;color:var(--text);font-size:18px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0" aria-label="Prethodna nedelja">‹</button>
      <div style="text-align:center">
        <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)">${weekLabel}</div>
        ${isCurrentWeek ? '<div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.5px">TEKUĆA NEDELJA</div>' : `<div style="font-size:10px;color:var(--muted)">${Math.abs(state.weekOffset)} ned. unazad</div>`}
      </div>
      <button onclick="shiftWeek(1)" ${isCurrentWeek ? 'disabled' : ''} style="background:var(--s4);border:none;border-radius:8px;color:${isCurrentWeek ? 'var(--s6)' : 'var(--text)'};font-size:18px;width:36px;height:36px;cursor:${isCurrentWeek ? 'default' : 'pointer'};display:flex;align-items:center;justify-content:center;flex-shrink:0" aria-label="Sledeća nedelja">›</button>
    </div>`;

  if (daysWithData.length === 0) {
    return `<div class="card">${navHTML}<div class="hist-empty">📭 Nema podataka za ovu nedelju.<br>Počni da unosiš obroke!</div></div>`;
  }

  const totalConsumed = daysWithData.reduce((s, d) => s + d.consumed, 0);
  const totalBurned   = daysWithData.reduce((s, d) => s + d.burned, 0);
  const totalNet      = daysWithData.reduce((s, d) => s + d.net, 0);
  const avgConsumed   = Math.round(totalConsumed / daysWithData.length);
  const avgBurned     = Math.round(totalBurned / daysWithData.length);
  const avgNet        = Math.round(totalNet / daysWithData.length);
  // For gain mode, "good" days are when net >= goal (surplus achieved)
  const isGainMode = state.fitnessGoal === 'gain';
  const deficitDays   = daysWithData.filter(d => d.net < (d.goal || goal)).length;
  const surplusDays   = daysWithData.length - deficitDays;
  // Grade is based on days on-target: deficit days for lose/maintain, surplus days for gain
  const onTargetDays  = isGainMode ? surplusDays : deficitDays;
  const avgDeficit    = Math.round(goal - avgNet);
  const projectedLoss = ((avgDeficit * 7) / KCAL_PER_KG_FAT).toFixed(2);

  // Average macros across days with data
  const avgProtein = Math.round(daysWithData.reduce((s, d) => s + (d.protein || 0), 0) / daysWithData.length);
  const avgCarbs   = Math.round(daysWithData.reduce((s, d) => s + (d.carbs   || 0), 0) / daysWithData.length);
  const avgFat     = Math.round(daysWithData.reduce((s, d) => s + (d.fat     || 0), 0) / daysWithData.length);

  // Grade
  const deficitRatio = onTargetDays / daysWithData.length;
  const grade = deficitRatio >= 0.86 ? { emoji: '🏆', label: 'Odlično!', color: 'var(--green)' }
              : deficitRatio >= 0.57 ? { emoji: '💪', label: 'Dobro', color: 'var(--green)' }
              : deficitRatio >= 0.29 ? { emoji: '😐', label: 'Može bolje', color: 'var(--orange)' }
              : { emoji: '😔', label: 'Treba raditi', color: 'var(--red)' };

  // Scale bar by consumed (not net) so burn doesn't shrink the bar
  const maxConsumed = Math.max(goal * 1.1, ...weekData.map(d => d.consumed));
  const dayNames = ['Ne', 'Po', 'Ut', 'Sr', 'Če', 'Pe', 'Su'];

  const dayRows = weekData.map(d => {
    const dayObj = new Date(d.date + 'T12:00:00');
    const name = dayNames[dayObj.getDay()];
    const dayGoal = d.goal || goal;
    const isToday = !d.future && d.date === todayStr();

    if (d.future) return `
      <div class="report-day-row">
        <span class="report-day-name" style="color:var(--muted)">${name}</span>
        <div class="report-day-bar-wrap">
          <div style="position:absolute;inset:0;background:var(--s4);border-radius:99px"></div>
        </div>
        <span class="rdr-consumed" style="color:var(--muted)">—</span>
        <span class="rdr-burned"></span>
        <span class="rdr-delta"></span>
      </div>`;

    if (!d.hasData) return `
      <div class="report-day-row">
        <span class="report-day-name" style="color:var(--muted)">${name}</span>
        <div class="report-day-bar-wrap">
          <div style="position:absolute;inset:0;background:var(--s3);border-radius:99px"></div>
          <div style="position:absolute;top:-3px;bottom:-3px;left:${Math.min(97,(dayGoal/maxConsumed)*100)}%;width:1.5px;background:rgba(255,255,255,0.15);border-radius:1px"></div>
        </div>
        <span class="rdr-consumed" style="color:var(--muted)">—</span>
        <span class="rdr-burned"></span>
        <span class="rdr-delta"></span>
      </div>`;

    const consumedPct = Math.min(100, (d.consumed / maxConsumed) * 100);
    const goalPct     = Math.min(97,  (dayGoal    / maxConsumed) * 100);
    const delta       = Math.round(d.net - dayGoal);
    const inDef       = delta < 0;
    // For gain mode: surplus (delta > 0) is good = green
    const color = isGainMode ? (!inDef ? 'var(--green)' : 'var(--red)') : (inDef ? 'var(--green)' : 'var(--red)');
    const deltaStr = inDef ? `−${Math.abs(delta)}` : `+${delta}`;
    const todayStyle = isToday ? 'background:rgba(143,212,46,0.05);margin:0 -16px;padding:7px 16px;' : '';
    const clickable = isCurrentWeek ? `onclick="setTab('history');state.selectedHistoryDate='${d.date}';scheduleRender()" style="${todayStyle}cursor:pointer"` : (todayStyle ? `style="${todayStyle}"` : '');

    return `
      <div class="report-day-row" ${clickable}>
        <span class="report-day-name" style="color:${color}">${name}${isToday ? '<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:2px;vertical-align:middle;margin-bottom:1px"></span>' : ''}</span>
        <div class="report-day-bar-wrap">
          <div style="position:absolute;inset:0;background:var(--s4);border-radius:99px"></div>
          <div style="position:absolute;top:0;bottom:0;left:0;width:${consumedPct}%;background:${color}33;border-radius:99px;transition:width 0.4s ease"></div>
          <div style="position:absolute;top:-3px;bottom:-3px;left:${goalPct}%;width:1.5px;background:rgba(255,255,255,0.2);border-radius:1px"></div>
          <div style="position:absolute;top:50%;left:${consumedPct}%;width:8px;height:8px;border-radius:50%;background:${color};transform:translate(-50%,-50%);border:1.5px solid var(--card)"></div>
        </div>
        <span class="rdr-consumed">${Math.round(d.consumed)}</span>
        <span class="rdr-burned" style="color:${d.burned > 0 ? 'var(--blue)' : 'var(--muted)'}">${d.burned > 0 ? Math.round(d.burned) : '—'}</span>
        <span class="rdr-delta" style="color:${color}">${deltaStr}</span>
      </div>`;
  }).join('');

  // Best and worst day by net calories vs goal — gives AI concrete data to reference
  const sortedByDelta = [...daysWithData].sort((a, b) => {
    const deltaA = Math.abs(a.net - (a.goal || goal));
    const deltaB = Math.abs(b.net - (b.goal || goal));
    return deltaA - deltaB; // ascending: closest to goal first = best
  });
  const bestDay  = sortedByDelta.length ? { date: fmtDate(sortedByDelta[0].date), net: sortedByDelta[0].net } : null;
  const worstDay = sortedByDelta.length > 1 ? { date: fmtDate(sortedByDelta[sortedByDelta.length - 1].date), net: sortedByDelta[sortedByDelta.length - 1].net } : null;

  // Stats object passed to AI summary — deficitDays reinterpreted as on-target days per mode
  const statsForAI = { weekLabel, daysWithData: daysWithData.length, deficitDays: onTargetDays, avgConsumed, avgBurned, avgNet, avgDeficit, avgProtein, avgCarbs, avgFat, projectedLoss, bestDay, worstDay };
  const statsJson = JSON.stringify(statsForAI).replace(/'/g, "\\'");

  // AI summary section — shows button, loading state, or cached result
  const aiSummaryHTML = state.weeklySummaryLoading
    ? `<div style="margin-top:12px;padding:12px;background:var(--s3);border-radius:10px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px"><span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Generišem komentar...</div>`
    : state.weeklySummary
      ? `<div style="margin-top:12px;padding:12px;background:var(--s3);border-radius:10px;border-left:3px solid var(--green)">
           <div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.5px;margin-bottom:6px">🤖 AI KOMENTAR</div>
           <div style="font-size:13px;color:var(--text-secondary);line-height:1.65">${state.weeklySummary}</div>
           <button onclick="state.weeklySummary=null;scheduleRender()" style="background:none;border:none;color:var(--s8);font-size:11px;cursor:pointer;margin-top:8px;padding:0">↺ Generiši ponovo</button>
         </div>`
      : `<button onclick="requestWeeklySummary(${statsJson.replace(/"/g, '&quot;')})" style="width:100%;margin-top:12px;padding:11px;background:var(--s3);border:1px solid var(--s5);border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;text-align:center">🤖 Generiši AI komentar</button>`;

  return `
    <div class="card">
      ${navHTML}
      <div class="report-grade">${grade.emoji}</div>
      <div class="report-grade-label" style="color:${grade.color}">${grade.label}</div>
      <div class="report-grade-sub">${isGainMode
        ? `${surplusDays} od ${daysWithData.length} dana u suficitu`
        : `${deficitDays} od ${daysWithData.length} dana ispod cilja`}</div>
      ${aiSummaryHTML}
    </div>

    <div class="card">
      <div class="card-label">Statistike nedelje</div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan dnevni unos</span>
        <span class="report-stat-val" style="color:var(--text)">${avgConsumed} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečno sagoreno</span>
        <span class="report-stat-val" style="color:var(--blue)">${avgBurned} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Prosečan neto</span>
        <span class="report-stat-val" style="color:${
          isGainMode
            ? (avgNet >= goal ? 'var(--green)' : 'var(--red)')
            : (avgNet < goal ? 'var(--green)' : 'var(--red)')
        }">${avgNet} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">${isGainMode ? 'Prosečan suficit/deficit' : 'Prosečan deficit'}</span>
        <span class="report-stat-val" style="color:${
          isGainMode
            ? (avgDeficit < 0 ? 'var(--green)' : 'var(--orange)')   // gain: surplus=green, deficit=orange
            : (avgDeficit > 0 ? 'var(--green)' : 'var(--red)')       // lose: deficit=green, surplus=red
        }">
          ${avgDeficit > 0 ? '-' : '+'}${Math.abs(avgDeficit)} kcal
        </span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">Ukupno uneseno</span>
        <span class="report-stat-val" style="color:var(--muted)">${Math.round(totalConsumed)} kcal</span>
      </div>
      <div class="report-stat">
        <span class="report-stat-label">${isGainMode ? 'Procenjen dobitak mase' : 'Procenjen gubitak masti'}</span>
        <span class="report-stat-val" style="color:${isGainMode
          ? (avgDeficit < 0 ? 'var(--green)' : 'var(--orange)')     // gain: surplus achieved=green
          : (avgDeficit > 0 ? 'var(--green)' : 'var(--red)')        // lose: deficit achieved=green
        }">
          ${isGainMode
            ? (avgDeficit < 0 ? `~${Math.abs(parseFloat(projectedLoss))} kg` : 'Nema suficita')
            : (avgDeficit > 0 ? `~${projectedLoss} kg` : 'Nema deficita')}
        </span>
      </div>
      <!-- Average weekly macros -->
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--s3)">
        <div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px">Prosečni dnevni makroi</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div style="text-align:center;padding:10px 6px;background:var(--s3);border-radius:10px">
            <div style="font-family:var(--mono);font-size:16px;font-weight:800;color:var(--green)">${avgProtein}g</div>

function deleteWeightEntry(date) {
  const log = loadWeightLog().filter(e => e.date !== date);
  localStorage.setItem('fitlog_weightlog', JSON.stringify(log));
  // Update current weight to latest entry
  if (log.length > 0) {
    state.weight = log[0].weight;
    localStorage.setItem('fitlog_weight', log[0].weight);
  } else {
    state.weight = null;
    localStorage.removeItem('fitlog_weight');
  }
  scheduleRender();
}

function weightChartHTML(log) {
  if (log.length < 2) return `<div style="color:var(--muted);font-size:12px;padding:8px 0">Potrebno najmanje 2 merenja za grafikon.</div>`;
  const entries = [...log].reverse();
  const weights = entries.map(e => e.weight);
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const W = 300, H = 80;
  const xStep = entries.length > 1 ? W / (entries.length - 1) : W;
  const pts = entries.map((e, i) => {
    const x = i * xStep;
    const y = H - ((e.weight - minW) / (maxW - minW)) * H;
    return { x, y };
  });
  const points = pts.map(p => `${p.x},${p.y}`).join(' ');
  // Filled area path
  const areaPath = `M${pts[0].x},${H} ` + pts.map(p => `L${p.x},${p.y}`).join(' ') + ` L${pts[pts.length-1].x},${H} Z`;
  const dots = pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--green)"/>`).join('');

  // Linear regression trend line
  const n = entries.length;
  const sumX = entries.reduce((s, _, i) => s + i, 0);
  const sumY = entries.reduce((s, e) => s + e.weight, 0);
  const sumXY = entries.reduce((s, e, i) => s + i * e.weight, 0);
  const sumX2 = entries.reduce((s, _, i) => s + i * i, 0);
  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  const trendY0 = H - ((intercept - minW) / (maxW - minW)) * H;
  const trendY1 = H - ((intercept + slope * (n - 1) - minW) / (maxW - minW)) * H;
  // For gain mode: rising slope is good (green); for lose: falling is good (green)
  const trendColor = state.fitnessGoal === 'gain'
    ? (slope > 0.01 ? 'var(--green)' : slope < -0.01 ? 'var(--red)' : 'var(--muted)')
    : (slope < -0.01 ? 'var(--green)' : slope > 0.01 ? 'var(--red)' : 'var(--muted)');
  const trendLabel = slope < -0.01 ? '↘ trend pada' : slope > 0.01 ? '↗ trend raste' : '→ stabilan';

  const diff = entries[entries.length-1].weight - entries[0].weight;
  // For gain mode: weight increase is positive (green); for lose: decrease is positive (green)
  const diffColor = state.fitnessGoal === 'gain'
    ? (diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--muted)')
    : (diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--muted)');
  return `
    <div class="weight-chart-wrap">
      <svg class="weight-chart-svg" viewBox="-10 -10 ${W+20} ${H+20}" height="90">
        <defs>
          <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8fd42e" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#8fd42e" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- Gradient fill under line -->
        <path d="${areaPath}" fill="url(#chartFill)"/>
        <!-- Trend line -->
        <line x1="0" y1="${trendY0}" x2="${W}" y2="${trendY1}" stroke="${trendColor}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <!-- Data line -->
        <polyline points="${points}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px">
        <span>${fmtDate(entries[0].date)}</span>
        <span style="color:${trendColor};font-weight:700">${trendLabel}</span>
        <span style="color:${diffColor};font-weight:700">${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg</span>
      </div>
    </div>`;
}

function zdravljeTabHTML() {

  // For gain mode: weight increase is good (green); for lose: decrease is good (green)

        <button class="water-btn" onclick="addWater(330)">+330 ml<br><span style="font-size:10px;font-weight:400;color:var(--muted)">limenka</span></button>
        <button class="water-btn" onclick="addWater(500)">+500 ml<br><span style="font-size:10px;font-weight:400;color:var(--muted)">flaša</span></button>
        <button class="water-btn" style="color:var(--red)" onclick="addWater(-250)">-250 ml<br><span style="font-size:10px;font-weight:400;color:var(--muted)">ispravka</span></button>
      </div>
      <div class="water-custom-row">
        <input class="water-custom-input" id="waterInput" type="number" placeholder="ml..." min="1" max="2000"/>
        <button class="water-add-btn" onclick="addWaterCustom()">Dodaj</button>
      </div>
      ${waterStreak > 0 ? `<div style="margin-top:10px;font-size:12px;color:var(--muted)">💧 Streak: <strong style="color:var(--blue)">${waterStreak} dan${waterStreak > 1 ? 'a' : ''}</strong> zaredom</div>` : ''}
      <div style="margin-top:12px">
        <div class="card-label" style="margin-bottom:6px">Poslednjih 7 dana</div>
        ${waterHistory.map(e => {

          const dayObj = new Date(e.date + 'T12:00:00');

          const isToday = e.date === todayStr();

      </div>

  if (!w || !h) {
    return `<div class="card" style="text-align:center;padding:32px 20px">
      <div style="font-size:36px;margin-bottom:12px">⚖️</div>

  const tdee = Math.round(bmr * actMult);
  // BMI-based deficit via shared helper — consistent with drawer and autoCalorieGoal
  const suggestedGoal   = calcRecommendedGoal() || Math.round(tdee - 500);
  const deficitAmount   = bmi >= 35 ? 1000 : bmi >= 30 ? 750 : bmi >= 25 ? 500 : 250;
  const minFloor        = state.gender === 'male' ? 1500 : 1200;
  const suggestedGoalRaw = Math.round(tdee - deficitAmount);
  const floorApplied    = state.fitnessGoal === 'lose' && suggestedGoalRaw < minFloor;

  const deficitLabel    = state.fitnessGoal === 'gain' ? '+300 kcal · gojenje'

    : bmi >= 30 ? '−750 kcal · BMI 30–35'
    : bmi >= 25 ? '−500 kcal · BMI 25–30'
    : '−250 kcal · blizu ideala';
  const bmiMin = 15, bmiMax = 45;
  const bmiPct = Math.min(98, Math.max(2, ((bmi - bmiMin) / (bmiMax - bmiMin)) * 100));

  const tw = state.targetWeight;
  // Computed progress values used by the target weight card
  let progProgressPct = 0;
  let progWeeksNeeded = null;
  let progWeeklyRate = 0;
  let progStartWeight = w;
  let progToTarget = 0;
  let progGoalColor = 'var(--green)';
  let progSign = '−';

  if (tw && tw < w) {
    // Loss: target is below current weight
    progToTarget = w - tw;
    const weeklyDeficit = goal < tdee ? (tdee - goal) * 7 / KCAL_PER_KG_FAT : 0;
    progStartWeight = log.length > 1 ? log[log.length-1].weight : w;
    progProgressPct = progStartWeight > tw
      ? Math.min(100, Math.max(0, ((progStartWeight - w) / (progStartWeight - tw)) * 100))
      : 0;
    progWeeksNeeded = weeklyDeficit > 0 ? Math.ceil(progToTarget / weeklyDeficit) : null;
    progWeeklyRate = weeklyDeficit;
    progGoalColor = 'var(--green)';
    progSign = '−';
  } else if (tw && tw > w) {
    // Gain: target is above current weight
    progToTarget = tw - w;
    const weeklySurplus = goal > tdee ? (goal - tdee) * 7 / KCAL_PER_KG_FAT : 0;
    progStartWeight = log.length > 1 ? log[log.length-1].weight : w;
    progProgressPct = progStartWeight < tw
      ? Math.min(100, Math.max(0, ((w - progStartWeight) / (tw - progStartWeight)) * 100))

    const colFade = diff < 0 ? 'rgba(143,212,46,0.45)' : diff > 0 ? 'rgba(255,79,79,0.45)' : 'rgba(153,153,153,0.45)';
    // Calculate days between the two measurements for temporal context
    const dayDiff = Math.round((new Date(current.date) - new Date(prev.date)) / 86400000);
    const whenLabel = dayDiff === 1 ? 'juče' : dayDiff < 7 ? `${dayDiff}d` : `${Math.round(dayDiff / 7)} ned`;
    diffHTML = `<span class="weight-log-diff" style="background:${colAlpha};color:${col};display:inline-flex;align-items:center;gap:4px">

  if (sub === 'voda') return subNav + waterSection;

  if (sub === 'kalorije') {

            </div>
          </div>`;
        const weeklyLoss   = (dailyDeficit * 7) / KCAL_PER_KG_FAT;
        const weeksNeeded  = Math.ceil((w - tw) / weeklyLoss);
        const eta          = new Date();
        eta.setDate(eta.getDate() + weeksNeeded * 7);
        const etaStr = eta.toLocaleDateString('sr-RS', { day: 'numeric', month: 'long', year: 'numeric' });
        const startWeight  = log.length > 1 ? log[log.length - 1].weight : w;
        const progressPct  = startWeight > tw

      }

      // Gain scenario
      if (tw > w) {
        const dailySurplus = goal - tdee;
        if (dailySurplus <= 0) return `
          <div class="card">
            <div class="card-label" style="margin-bottom:10px">🎯 Put do cilja</div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <span style="font-size:28px;font-weight:800;font-family:var(--mono);color:var(--blue)">${tw} kg</span>
              <span style="font-size:13px;color:var(--muted)">· ostalo <strong style="color:var(--text)">${(tw - w).toFixed(1)} kg</strong></span>

            </div>
          </div>`;
        const weeklyGain  = (dailySurplus * 7) / KCAL_PER_KG_FAT;
        const weeksNeeded = Math.ceil((tw - w) / weeklyGain);
        const eta         = new Date();
        eta.setDate(eta.getDate() + weeksNeeded * 7);
        const etaStr = eta.toLocaleDateString('sr-RS', { day: 'numeric', month: 'long', year: 'numeric' });
        const startWeight = log.length > 1 ? log[log.length - 1].weight : w;
        const progressPct = startWeight < tw
          ? Math.min(100, Math.max(0, Math.round(((w - startWeight) / (tw - startWeight)) * 100)))
          : 0;
        return `
          <div class="card">
            <div class="card-label" style="margin-bottom:10px">🎯 Put do cilja</div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
              <div>
                <div style="font-size:32px;font-weight:800;font-family:var(--mono);color:var(--blue);line-height:1">${tw}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px">kg cilj</div>
              </div>
              <div style="flex:1">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px">
                  <span>${w} kg</span><span style="color:var(--blue)">${tw} kg</span>
                </div>
                <div style="height:5px;background:var(--s4);border-radius:3px;overflow:hidden">
                  <div style="height:100%;width:${progressPct}%;background:var(--blue);border-radius:3px"></div>
                </div>
                <div style="font-size:11px;color:var(--muted);margin-top:5px">ostalo: <span style="color:var(--text);font-weight:700">+${(tw - w).toFixed(1)} kg</span></div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              <div style="background:var(--s2);border-radius:10px;padding:10px 12px">
                <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Dnevni suficit</div>
                <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:var(--blue)">+${Math.round(dailySurplus)} kcal</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px">+${weeklyGain.toFixed(2)} kg/ned</div>
              </div>
              <div style="background:var(--s2);border-radius:10px;padding:10px 12px">
                <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Procena cilja</div>
                <div style="font-size:13px;font-weight:700;color:var(--text);line-height:1.3">${etaStr}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px">~${weeksNeeded} nedelja</div>
              </div>
            </div>
          </div>`;
      }

      return '';
    })();

    return subNav + `
    <div class="card">
      <div class="card-label">🔥 Kalorije — preporuka</div>
      <div style="padding:8px 10px;background:var(--s2);border-radius:8px;border:1px solid var(--s5);margin-bottom:12px">
        <span style="font-size:12px;color:var(--muted);font-family:var(--mono)">${state.age}g · ${state.gender === 'male' ? 'M' : 'Ž'} · ${ACT_LABELS[state.activity] || state.activity}</span>
      </div>
      <div class="zdravlje-stat">
        <span class="zdravlje-stat-label">Bazalni metabolizam (BMR)</span>
        <span class="zdravlje-stat-val">${bmr} kcal</span>
      </div>
      <div class="zdravlje-stat">
        <span class="zdravlje-stat-label">Dnevna potrošnja (TDEE)</span>
        <span class="zdravlje-stat-val" style="color:var(--blue)">${tdee} kcal</span>
      </div>
      <div class="zdravlje-stat" style="padding-bottom:10px">
        <span class="zdravlje-stat-label">Preporučeni cilj <span style="font-size:10px;color:var(--green);font-weight:700">${deficitLabel}</span></span>
        <span class="zdravlje-stat-val" style="color:var(--green)">${suggestedGoal} kcal</span>
      </div>
      ${floorApplied ? `
      <div style="font-size:11px;color:var(--orange);background:rgba(255,179,71,0.08);padding:8px 10px;border-radius:8px;border-left:3px solid var(--orange);margin-bottom:10px">
        ⚠ Minimalni dnevni unos (${minFloor} kcal) primenjen zbog zaštite od pothranjenosti.
      </div>` : ''}
      <div class="zdravlje-stat" style="padding-top:10px;border-top:1px solid var(--s3);flex-wrap:wrap;gap:6px">
        <span class="zdravlje-stat-label">
          Tvoj podešeni cilj
          <span style="font-size:10px;color:${state.calorieGoalManual ? 'var(--orange)' : 'var(--blue)'};margin-left:6px">${state.calorieGoalManual ? 'ručno' : 'auto'}</span>
        </span>
        <span style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${(() => {
            // For gain/maintain: flag when goal is too low (below recommendation)
            // For lose: flag when goal is too high (above recommendation)
            const isOffTarget = state.fitnessGoal === 'lose'
              ? goal > suggestedGoal + 100
              : goal < suggestedGoal - 100;
            const goalColor = isOffTarget ? 'var(--orange)' : 'var(--green)';
            const goalArrow = isOffTarget
              ? (state.fitnessGoal === 'lose' ? '↑' : '↓')
              : '✓';
            return `<span class="zdravlje-stat-val" style="color:${goalColor}">
              ${goal} kcal ${goalArrow}
            </span>
            ${isOffTarget ? `
            <button onclick="applyRecommendedGoal(${suggestedGoal})" style="background:var(--green);border:none;border-radius:7px;color:#0a0a0a;font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:var(--sans);white-space:nowrap">
              Primeni preporuku
            </button>` : ''}`;
          })()}
        </span>
      </div>
    </div>

    ${twCardHTML}

    <div class="card">
      <div class="card-label" style="margin-bottom:12px">🥗 Preporučeni makroi</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Na osnovu preporučenog cilja od <span style="color:var(--green);font-weight:700">${suggestedGoal} kcal/dan</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--green);line-height:1">${Math.max(mt.protMin, mt.protMax)}g</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:5px">Proteini</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${mt.protMax < mt.protMin ? `cilj ${mt.protMin}g` : `min ${mt.protMin}g`}</div>
        </div>
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--blue);line-height:1">${mt.carbMax}g</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:5px">Ugljeni h.</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${mt.carbMin}–${mt.carbMax}g</div>
        </div>
        <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--orange);line-height:1">${Math.max(mt.fatMin, mt.fatMax)}g</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:5px">Masti</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${mt.fatMax < mt.fatMin ? `cilj ${mt.fatMin}g` : `min ${mt.fatMin}g`}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);padding-top:10px;border-top:1px solid var(--s3)">
        Preporuka: 30% proteini · 40% ugljeni hidrati · 30% masti
      </div>
    </div>`;
  }

  // Default: Težina subtab — redesigned layout
  return subNav + `

    <div class="card">
      <div class="card-label" style="margin-bottom:12px">Trenutna težina</div>

      <!-- Row 1: big weight number -->
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:12px">
        ${(() => {
          // Split weight into integer and decimal parts for visual hierarchy
          const wStr = current ? String(current.weight) : '—';
          const parts = wStr.split('.');
          const intPart = parts[0];
          const decPart = parts[1] !== undefined ? '.' + parts[1] : '';
          return `
            <span style="font-size:52px;font-weight:800;font-family:var(--mono);color:var(--text);line-height:1;letter-spacing:-1px">${intPart}</span>
            ${decPart ? `<span style="font-size:32px;font-weight:800;font-family:var(--mono);color:var(--text-secondary);line-height:1;letter-spacing:-1px">${decPart}</span>` : ''}
            <span style="font-size:14px;color:var(--muted);padding-bottom:4px;align-self:flex-end">kg</span>
          `;
        })()}
      </div>

      <!-- Row 2: badge + action button -->
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--s3);border-bottom:1px solid var(--s3)">
        <div>${diffHTML || ''}</div>
        <button class="weight-btn" onclick="startEditWeight()" style="font-size:12px;flex-shrink:0">${current ? '✏ Upiši merenje' : '+ Unesi težinu'}</button>
      </div>

      <!-- Row 3: stats -->
      <div style="display:flex;gap:0;padding-top:12px">
        ${h ? `
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:2px">${h} cm</div>
          <div style="font-size:10px;color:var(--muted)">visina</div>
        </div>
        <div style="width:1px;background:var(--s3);margin:0 12px;align-self:stretch"></div>` : ''}
        ${startEntry ? `
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:2px">${startEntry.weight} kg</div>
          <div style="font-size:10px;color:var(--muted)">početna</div>
        </div>
        <div style="width:1px;background:var(--s3);margin:0 12px;align-self:stretch"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:${weightDeltaColor};margin-bottom:2px">${weightDeltaStr}</div>
          <div style="font-size:10px;color:var(--muted)">ukupno</div>
        </div>` : ''}
      </div>

      <!-- Edit row: shown below all content when active -->
      ${state.editWeight ? `
        <div style="display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--s3);align-items:center">
          <span style="font-size:12px;color:var(--muted);white-space:nowrap">Nova težina:</span>
          <input class="weight-input" id="wInput" type="number" value="${state.weightInput}" placeholder="kg"/>
          <button class="save-btn" onclick="saveWeight()">Sačuvaj</button>
          <button onclick="state.editWeight=false;scheduleRender()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1">✕</button>
        </div>` : ''}
    </div>

    <div class="wt-metrics-row">
      <div class="wt-metric-card">
        <div class="card-label" style="margin-bottom:6px">BMI indeks</div>
        <div style="font-size:30px;font-weight:800;font-family:var(--mono);color:${cat.color};line-height:1">${bmi.toFixed(1)}</div>
        <div style="font-size:12px;font-weight:700;color:${cat.color};margin-top:5px">${cat.label}</div>
      </div>
      ${(() => {
        const bf = estimateBodyFat(bmi, state.age, state.gender);
        const bfColor = state.gender === 'male'
          ? (bf < 6 ? 'var(--blue)' : bf < 14 ? 'var(--green)' : bf < 25 ? 'var(--orange)' : 'var(--red)')
          : (bf < 14 ? 'var(--blue)' : bf < 21 ? 'var(--green)' : bf < 32 ? 'var(--orange)' : 'var(--red)');
        return `<div class="wt-metric-card">
          <div class="card-label" style="margin-bottom:6px">Tel. mast</div>
          <div style="font-size:30px;font-weight:800;font-family:var(--mono);color:${bfColor};line-height:1">${bf}%</div>
          <div style="font-size:11px;color:var(--muted);margin-top:5px">procena (BMI)</div>
        </div>`;
      })()}
    </div>

    <div class="card" style="padding:12px 16px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Idealna: ${idealMin}–${idealMax} kg
        ${toIdeal > 0
          ? `· <span style="color:var(--orange)">do ideala još −${toIdeal} kg</span>`
          : `· <span style="color:var(--green)">u idealnom opsegu ✓</span>`}
      </div>
      <div class="bmi-scale-wrap" style="margin:0">
        <div class="bmi-scale-track"><div class="bmi-scale-marker" style="left:${bmiPct}%"></div></div>
        <div class="bmi-scale-labels"><span>Pothr.</span><span>Normalno</span><span>Prekomerno</span><span>Gojaznost</span></div>
      </div>
    </div>

    ${log.length >= 2 ? `
    <div class="card">
      <div class="card-label" style="margin-bottom:10px">Trend težine</div>
      ${weightChartHTML(log)}
    </div>` : ''}

    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 16px 10px;border-bottom:1px solid var(--s3);display:flex;justify-content:space-between;align-items:center">
        <div class="card-label" style="margin:0">Istorija merenja</div>
        <span style="font-size:11px;color:var(--muted)">${log.length} ${log.length === 1 ? 'unos' : 'unosa'}</span>
      </div>
      ${log.length === 0
        ? `<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:13px">Nema unosa — tapni "Upiši merenje" da počneš.</div>`
        : (() => {
          const shown = log.slice(0, 10);
          const maxW = Math.max(...shown.map(e => e.weight));
          const minW = Math.min(...shown.map(e => e.weight));
          const wRange = maxW - minW || 1;
          return shown.map((e, i) => {
            let diffBadge = '';
            let dotColor = 'var(--s7)';
            if (i < log.length - 1) {
              const d = e.weight - log[i + 1].weight;
              // For gain mode: weight increase (d > 0) is good (green)
              const isGood = state.fitnessGoal === 'gain' ? d > 0 : d < 0;
              const c = isGood ? 'var(--green)' : d === 0 ? 'var(--muted)' : 'var(--red)';
              const cAlpha = isGood ? 'rgba(143,212,46,0.13)' : d === 0 ? 'rgba(85,85,85,0.13)' : 'rgba(255,79,79,0.13)';
              diffBadge = `<span class="weight-log-diff" style="background:${cAlpha};color:${c}">${d > 0 ? '+' : ''}${d.toFixed(1)}</span>`;
              dotColor = isGood ? 'var(--green)' : d === 0 ? 'var(--muted)' : 'var(--red)';
            }
            const barPct = Math.max(10, Math.round(((e.weight - minW) / wRange) * 80) + 20);
            const isLatest = i === 0;
            return `<div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--s3)${isLatest ? ';background:rgba(143,212,46,0.03)' : ''}">
              <div style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
              <span class="weight-log-date" style="color:${isLatest ? 'var(--green)' : 'var(--text-secondary)'}">${fmtDate(e.date)}</span>
              <div style="flex:1;height:4px;background:var(--s4);border-radius:2px;overflow:hidden;margin:0 4px">
                <div style="height:100%;width:${barPct}%;background:${isLatest ? 'rgba(143,212,46,0.45)' : 'var(--s7)'};border-radius:2px"></div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                ${diffBadge}
                <span class="weight-log-val">${e.weight} kg</span>
                <button onclick="deleteWeightEntry('${e.date}')" style="background:none;border:none;color:var(--s6);cursor:pointer;font-size:16px;padding:4px 6px;min-width:28px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px">×</button>
              </div>
            </div>`;
          }).join('') + (log.length > 10 ? `<div style="padding:10px 16px;text-align:center;font-size:12px;color:var(--muted)">... i još ${log.length - 10} starijih merenja</div>` : '');
        })()}
    </div>

    <div class="card">
      <div class="card-label" style="margin-bottom:12px">🎯 Ciljna težina</div>
      ${state.targetWeight ? `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div>
            <div style="font-size:42px;font-weight:800;font-family:var(--mono);color:${progGoalColor};line-height:1">${state.targetWeight}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px">kg cilj</div>
          </div>

        </div>
        <div style="margin-bottom:14px">
          <div style="height:7px;background:var(--s4);border-radius:4px;position:relative;margin-bottom:8px">
            <div style="height:100%;width:${progProgressPct}%;background:${progGoalColor};border-radius:4px"></div>
            <div style="position:absolute;top:50%;left:${progProgressPct}%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:${progGoalColor};border:2px solid var(--card)"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
            <span>${progStartWeight} kg</span>
            <span style="color:var(--text-secondary)">${state.targetWeight} kg cilj</span>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:var(--s3);border-radius:10px;padding:10px 12px">
            <div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${progGoalColor};margin-bottom:2px">${progSign}${Math.round(progToTarget)} kg</div>
            <div style="font-size:10px;color:var(--muted)">preostalo</div>
          </div>
          <div style="flex:1;background:var(--s3);border-radius:10px;padding:10px 12px">
            <div style="font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);margin-bottom:2px">${progWeeksNeeded ? '~' + progWeeksNeeded + ' ned' : '—'}</div>
            <div style="font-size:10px;color:var(--muted)">procena</div>
          </div>
          <div style="flex:1;background:var(--s3);border-radius:10px;padding:10px 12px">
            <div style="font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);margin-bottom:2px">${progWeeklyRate > 0 ? progWeeklyRate.toFixed(1) + ' kg' : '—'}</div>
            <div style="font-size:10px;color:var(--muted)">ned. tempo</div>
          </div>
        </div>` :
        `<div style="color:var(--muted);font-size:13px;margin-bottom:10px">${state.fitnessGoal === 'gain' ? 'Postavi ciljnu težinu da vidiš prognozu gojenja.' : 'Postavi ciljnu težinu da vidiš prognozu mršavljenja.'}</div>`}
      ${!state.targetWeight && !state.editTargetWeight ? `
        <button class="weight-btn" onclick="openDrawer()" style="font-size:12px;margin-top:4px">
          + Postavi ciljnu težinu
        </button>` : ''}
    </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function render() {
  // Clear per-render memoization cache on every new render cycle
  clearRenderCache();
  const app = document.getElementById('app');

  // API key screen
  if (!state.apiKey) {
    app.innerHTML = `
      <div class="header"><span class="logo">FITLOG</span></div>
      <div class="api-screen">
        <h2>Gemini API ključ</h2>
        <p>Da bi app radio, potreban ti je besplatan Gemini API ključ.<br>
        Nabavi ga na <strong>aistudio.google.com</strong> → Get API Key → Create API key.</p>
        <input class="api-input" id="apiInput" type="password" placeholder="AIzaSy..." autocomplete="off"/>
        <button class="api-save-btn" onclick="saveApiKey()">SAČUVAJ I NASTAVI</button>
        <p class="api-hint">Ključ se čuva samo lokalno na tvom uređaju. <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></p>
      </div>`;
    return;
  }

  // Onboarding screen — shown if profile not complete
  const profileComplete = !!(state.height && localStorage.getItem('fitlog_onboarding_done'));
  if (!profileComplete) {
    app.innerHTML = `
      <div class="header"><span class="logo">FITLOG</span></div>
      <div class="onboard-screen">
        <div class="onboard-title">Podesi profil</div>
        <div class="onboard-sub">Ovi podaci se koriste za tačan izračun kalorija i makroa. Sve možeš da promeniš kasnije.</div>
        <div class="onboard-field">
          <div class="onboard-label">Telesna masa (kg)</div>
          <input class="onboard-input" id="ob_weight" type="number" placeholder="npr. 85" value="${state.weight || ''}"/>
        </div>
        <div class="onboard-field">
          <div class="onboard-label">Visina (cm)</div>
          <input class="onboard-input" id="ob_height" type="number" placeholder="npr. 182" value="${state.height || ''}"/>
        </div>
        <div class="onboard-field">
          <div class="onboard-label">Godine</div>
          <input class="onboard-input" id="ob_age" type="number" placeholder="npr. 30" value="${state.age !== 30 ? state.age : ''}"/>
        </div>
        <div class="onboard-field">
          <div class="onboard-label">Pol</div>
          <select class="onboard-select" id="ob_gender">
            <option value="male" ${state.gender==='male'?'selected':''}>Muško</option>
            <option value="female" ${state.gender==='female'?'selected':''}>Žensko</option>
          </select>
        </div>
        <div class="onboard-field">
          <div class="onboard-label">Nivo aktivnosti</div>
          <select class="onboard-select" id="ob_activity">
            <option value="sedentary" ${state.activity==='sedentary'?'selected':''}>Sedentarni (desk job, bez vežbanja)</option>
            <option value="light" ${state.activity==='light'?'selected':''}>Lako aktivan (1-3x nedeljno)</option>
            <option value="moderate" ${state.activity==='moderate'?'selected':''}>Umeren (3-5x nedeljno)</option>
            <option value="active" ${state.activity==='active'?'selected':''}>Aktivan (6-7x nedeljno)</option>
          </select>
        </div>
        <div class="onboard-field">
          <div class="onboard-label">Cilj</div>
          <select class="onboard-select" id="ob_goal">
            <option value="lose"     ${state.fitnessGoal==='lose'    ?'selected':''}>🔥 Mršavljenje</option>
            <option value="gain"     ${state.fitnessGoal==='gain'    ?'selected':''}>💪 Gojenje</option>
          </select>
        </div>
        <button class="onboard-btn" onclick="saveOnboarding()">POČNI →</button>
      </div>`;
    return;
  }

  const t = totals();
  const d = state.dayData;

  // Streak & week data — only computed for stats tab
  let statsContent = '';
  if (state.activeTab === 'stats') {
    const streak = calcStreak();
    const weekData = getWeekData(state.weekOffset);
    const streakEmoji = streak >= 14 ? '🔥' : streak >= 7 ? '⚡' : streak >= 3 ? '💪' : streak >= 1 ? '✅' : '😴';
    const streakMsg = streak === 0
      ? 'Još nema niza. Počni danas!'
      : streak === 1 ? 'Odličan početak! Nastavi sutra.'
      : state.fitnessGoal === 'gain'
        ? `${streak} dana zaredom u suficitu!`
        : `${streak} dana zaredom ispod cilja!`;

    statsContent = `
    <div class="card" style="padding:0;overflow:hidden">
      <!-- Card header -->
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px 0">
        <span class="card-label" style="margin:0">Kalorije</span>
        <span style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.5px;text-transform:uppercase">Danas</span>
      </div>
      <!-- Horizontal body: ring left, stats right -->
      <div class="kcal-body">
        ${ringHTML(t.consumed, t.burned, state.calorieGoal)}
        <div class="kcal-stats-side">
          <!-- Uneseno / Sagoreno side by side -->
          <div style="display:flex;align-items:center;gap:0">
            <div class="kcal-vstat" style="flex:1">
              <div class="stat-label">Uneseno</div>
              <div class="stat-val" style="color:var(--green);font-size:16px">
                ${Math.round(t.consumed)}<span style="color:var(--muted);font-size:10px;font-family:var(--sans);font-weight:400"> kcal</span>
              </div>
            </div>
            <div style="width:1px;height:34px;background:var(--border);flex-shrink:0"></div>
            <div class="kcal-vstat" style="flex:1;padding-left:12px">
              <div class="stat-label">Sagoreno</div>
              <div class="stat-val" style="color:${t.burned > 0 ? 'var(--blue)' : 'var(--muted)'};font-size:16px">
                ${Math.round(t.burned)}<span style="color:var(--muted);font-size:10px;font-family:var(--sans);font-weight:400"> kcal</span>
              </div>
            </div>
          </div>
          <div class="kcal-vsep"></div>
          <!-- Cilj row -->
          <div class="kcal-vstat">
            <div class="stat-label">Cilj · <span style="color:${state.calorieGoalManual ? 'var(--orange)' : 'var(--blue)'};font-weight:700">${state.calorieGoalManual ? 'ručno' : state.fitnessGoal === 'gain' ? 'gojenje' : 'BMI preporuka'}</span></div>
            <div class="stat-val" style="color:var(--text-secondary);font-size:16px">
              ${state.calorieGoal}<span style="color:var(--muted);font-size:10px;font-family:var(--sans);font-weight:400"> kcal</span>
            </div>
          </div>
        </div>
      </div>
      <!-- Enhanced preostalo footer with distinct background -->
      <div class="kcal-footer">
        <span class="kcal-footer-label">${state.fitnessGoal === 'gain' ? 'Preostalo do suficita' : 'Preostalo do cilja'}</span>
        <span class="kcal-footer-val" style="color:${
          state.fitnessGoal === 'gain'
            ? (t.net >= state.calorieGoal ? 'var(--green)' : 'var(--text-secondary)')
            : (t.net > state.calorieGoal ? 'var(--red)' : 'var(--green)')
        }">
          ${state.fitnessGoal === 'gain'
            ? (t.net >= state.calorieGoal ? '✓ +' + Math.round(t.net - state.calorieGoal) : Math.round(state.calorieGoal - t.net))
            : (t.net > state.calorieGoal ? '+' + Math.round(t.net - state.calorieGoal) : Math.round(state.calorieGoal - t.net))
          }<span style="color:var(--muted);font-size:12px;font-family:var(--sans);font-weight:400"> kcal</span>
        </span>
      </div>
    </div>
    <div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>Makronutrijenti</span>
        <span style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:0.5px;text-transform:uppercase">Danas</span>
      </div>
      ${(() => { const ml = macroLimits(); return `
      ${macroBar('Proteini', t.protein, ml.protMin, ml.protMax, 'var(--green)')}
      ${macroBar('Ugljeni hidrati', t.carbs, ml.carbMin, ml.carbMax, 'var(--blue)')}
      ${macroBar('Masti', t.fat, ml.fatMin, ml.fatMax, 'var(--orange)')}
      ${macroBar('Šećer', t.sugar, 0, ml.sugarMax, 'var(--pink)')}`; })()}
    </div>
    ${weeklyReportHTML(weekData)}`;
  }

  // Meals — both pill row AND details always in DOM; .log-item.expanded controls visibility via CSS
  const mealsHTML = d.meals.length ? `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 16px 8px;border-bottom:1px solid var(--s3)">
        <div class="card-label" style="margin:0">Obroci · ${Math.round(t.consumed)} kcal</div>
      </div>
      ${d.meals.map(m => {
        const isOpen = state.expandedMealIds.has(m.id);
        const mainName = m.items[0]?.name || 'Obrok';
        const extraCount = m.items.length > 1 ? ` +${m.items.length - 1}` : '';
        const ms = state.mealScores[m.id];
        const scoreHTML = state.mealScoreLoading === m.id
          ? `<div class="meal-score-inline"><span style="font-size:11px;color:var(--muted)">🤖 Ocenjujem...</span></div>`
          : ms
            ? (() => {
                const c = ms.score >= 7 ? 'var(--green)' : ms.score >= 5 ? 'var(--orange)' : 'var(--red)';
                // Render suggestion only when present
                const suggHTML = ms.suggestion
                  ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text-secondary);line-height:1.4">💡 ${ms.suggestion}</div>`
                  : '';
                return `<div class="meal-score-inline" style="flex-direction:column;align-items:flex-start;gap:4px">
                  <div style="display:flex;align-items:center;gap:8px;width:100%">
                    <span class="meal-score-num" style="color:${c}">${ms.score}/10</span>
                    <span style="flex:1;font-size:12px;line-height:1.4">${ms.comment}</span>
                    <button onclick="clearMealScore('${m.id}')" style="background:none;border:none;color:var(--s8);cursor:pointer;font-size:15px;flex-shrink:0">×</button>
                  </div>
                  ${suggHTML}
                </div>`; })()
            : `<button class="meal-score-btn" onclick="scoreMeal('${m.id}')">🤖 Oceni obrok</button>`;
        return `
          <div class="log-item${isOpen ? ' expanded' : ''}" data-id="${m.id}" ontouchstart="swipeStart(event,'${m.id}','meal')" ontouchmove="swipeMove(event,'${m.id}')" ontouchend="swipeEnd(event,'${m.id}','meal')" ontouchcancel="swipeCancel('${m.id}')">
            <div class="swipe-delete-bg">🗑</div>
            <div class="log-item-inner" id="swipe-meal-${m.id}" style="background:var(--card)">
              <div class="meal-header" onclick="toggleMeal('${m.id}')">
                <span class="meal-time-badge">${m.time}</span>
                <span class="meal-summary">${mainName}${extraCount}</span>
                <span class="meal-kcal-badge">${Math.round(m.calories)} kcal</span>
                <span class="meal-chevron${isOpen ? ' open' : ''}">▾</span>
              </div>
              <div class="meal-pills-row">
                <span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(143,212,46,0.1);color:var(--green);font-weight:600">P ${Math.round(m.protein)}g</span>
                <span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(71,200,255,0.1);color:var(--blue);font-weight:600">UH ${Math.round(m.carbs)}g</span>
                <span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(255,179,71,0.1);color:var(--orange);font-weight:600">M ${Math.round(m.fat)}g</span>
                ${m.sugar > 0 ? `<span style="font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(255,107,157,0.1);color:var(--pink);font-weight:600">Š ${Math.round(m.sugar)}g</span>` : ''}
              </div>
              <div class="meal-details">
                ${m.items.map(it => `
                  <div class="meal-item"><span class="meal-item-name">${it.name}</span> · ${it.amount} · ${it.calories} kcal</div>`).join('')}
                <div class="pills" style="margin-top:8px">
                  <span class="pill" style="background:rgba(143,212,46,0.13);color:var(--green)">P ${Math.round(m.protein)}g</span>
                  <span class="pill" style="background:rgba(71,200,255,0.13);color:var(--blue)">UH ${Math.round(m.carbs)}g</span>
                  <span class="pill" style="background:rgba(255,179,71,0.13);color:var(--orange)">M ${Math.round(m.fat)}g</span>
                  ${m.sugar ? `<span class="pill" style="background:rgba(255,107,157,0.13);color:var(--pink)">Š ${Math.round(m.sugar)}g</span>` : ''}
                </div>
                ${m.note ? `<div class="log-note" style="margin-top:6px">${m.note}</div>` : ''}
                <div class="meal-score-area">
                ${scoreHTML}
                </div>
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>` : '';

  // Exercises — same pattern: details always in DOM, .log-item.expanded shows them
  const exHTML = d.exercises.length ? `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 16px 8px;border-bottom:1px solid var(--s3)">
        <div class="card-label" style="margin:0">Aktivnosti · -${Math.round(t.burned)} kcal</div>
      </div>
      ${d.exercises.map(e => {
        const isOpen = state.expandedExIds.has(e.id);
        const mainName = e.items[0]?.name || 'Aktivnost';
        return `
          <div class="log-item${isOpen ? ' expanded' : ''}" data-ex-id="${e.id}" ontouchstart="swipeStart(event,'${e.id}','exercise')" ontouchmove="swipeMove(event,'${e.id}')" ontouchend="swipeEnd(event,'${e.id}','exercise')" ontouchcancel="swipeCancel('${e.id}')">
            <div class="swipe-delete-bg">🗑</div>
            <div class="log-item-inner" id="swipe-ex-${e.id}" style="background:var(--card)">
              <div class="meal-header" onclick="toggleEx('${e.id}')">
                <span class="meal-time-badge" style="color:var(--blue)">${e.time}</span>
                <span class="meal-summary">${mainName}</span>
                <span class="meal-kcal-badge" style="color:var(--blue)">-${Math.round(e.burned)} kcal</span>
                <span class="meal-chevron${isOpen ? ' open' : ''}">▾</span>
              </div>
              <div class="meal-pills-row"></div>
              <div class="meal-details">
                ${e.items.map(it => `
                  <div class="meal-item"><span class="meal-item-name">${it.name}</span> · ${it.detail}</div>`).join('')}
                ${e.note ? `<div class="log-note" style="margin-top:6px">${e.note}</div>` : ''}
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>` : '';

  const hour = new Date().getHours();

  const isFemale = state.gender === 'female';
  const emptyMsg = hour < 11 ? `Šta si ${isFemale ? 'pojela' : 'pojeo'} za doručak?` :
                   hour < 15 ? `Vreme je za ručak! Šta si ${isFemale ? 'jela' : 'jeo'}?` :
                   hour < 19 ? 'Dodaj popodnevni obrok ili vežbu.' :
                                'Večernji unos zatvara dan.';
  const emptyIcon = hour < 11 ? '🌅' : hour < 15 ? '☀️' : hour < 19 ? '🌤' : '🌙';

  const emptyHTML = (state.mode === 'food' && !d.meals.length) ? `
    <div class="empty">
      <span class="empty-icon">${emptyIcon}</span>
      <div class="empty-title">${state.date === todayStr() ? emptyMsg : 'Nema unosa za ovaj dan.'}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${state.date === todayStr() ? `Upiši šta si ${isFemale ? 'jela' : 'jeo'} ili fotografiši obrok` : ''}</div>
    </div>`
  : (state.mode === 'exercise' && !d.exercises.length) ? `
    <div class="empty">
      <span class="empty-icon">💪</span>
      <div class="empty-title">Nema unesenih vežbi.</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${state.date === todayStr() ? 'Opiši svoju vežbu iznad.' : ''}</div>
    </div>` : '';

  const placeholder = state.mode === 'food'
    ? `npr. ${isFemale ? 'jela sam' : 'jeo sam'} 200g pilećih prsa sa 100g pirinča...`
    : `npr. ${isFemale ? 'uradila sam' : 'uradio sam'} 50 čučnjeva i ${isFemale ? 'prošetala' : 'prošetao'} 4000 koraka...`;

  const btnText = state.loading ? '⏳ Analiziram...' : state.mode === 'food' ? '+ Dodaj obrok' : '+ Dodaj vežbu';

  const progressPct = state.calorieGoal > 0 ? Math.min(100, (t.net / state.calorieGoal) * 100) : 0;
  const isGainMode  = state.fitnessGoal === 'gain';
  // For gain: reaching 100% is the goal (green); for lose: going over is bad (red/orange)
  const progressColor = isGainMode
    ? (progressPct >= 100 ? 'var(--green)' : progressPct >= 85 ? 'var(--blue)' : 'var(--green)')
    : (progressPct >= 100 ? 'var(--red)' : progressPct >= 85 ? 'var(--orange)' : 'var(--green)');
  const remaining = state.calorieGoal - Math.round(t.net);
  const progressLabel = isGainMode
    ? (progressPct >= 100
        ? `<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">✓ +${Math.round(t.net - state.calorieGoal)}</span><span style="font-size:11px;color:var(--muted);margin-left:3px">kcal suficit</span>`
        : `<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${remaining < 200 ? 'var(--blue)' : 'var(--text)'}">${remaining}</span><span style="font-size:11px;color:var(--muted);margin-left:3px">kcal do suficita</span>`)
    : (progressPct >= 100
        ? `<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red)">+${Math.round(t.net - state.calorieGoal)}</span><span style="font-size:11px;color:var(--muted);margin-left:3px">kcal preko cilja</span>`
        : `<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${remaining < 200 ? 'var(--orange)' : 'var(--text)'}">${remaining}</span><span style="font-size:11px;color:var(--muted);margin-left:3px">kcal preostalo</span>`);

  app.innerHTML = `
    <div class="header">
      <span class="logo">FITLOG</span>
      <button onclick="openDrawer()" style="background:var(--s3);border:1px solid var(--s5);color:var(--text-secondary);cursor:pointer;padding:6px 10px;border-radius:10px;line-height:1;transition:background 0.15s,color 0.15s;display:flex;align-items:center;gap:5px;font-family:var(--sans);font-size:13px;font-weight:600" onmouseover="this.style.background='var(--s5)'" onmouseout="this.style.background='var(--s3)'">⚙ <span>Podešavanja</span></button>
    </div>
    <div class="header-progress-wrap">
      <div class="header-progress-labels" style="margin-bottom:5px">
        <div style="display:flex;align-items:baseline;gap:4px">
          ${progressLabel}
        </div>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${t.burned > 0 ? 'var(--blue)' : 'var(--green)'}">${Math.round(t.consumed)}</span>
          <span style="font-size:11px;color:var(--muted)">/ ${state.calorieGoal} kcal</span>
          ${t.burned > 0 ? `<span style="font-size:11px;color:var(--blue);margin-left:4px">· −${Math.round(t.burned)} sag.</span>` : ''}
        </div>
      </div>
      <div class="header-progress-track">
        <div class="header-progress-fill" style="width:${progressPct}%;${progressPct >= 85 ? 'background:' + progressColor : ''}"></div>
      </div>
    </div>

    <div class="tab-content">
    ${state.activeTab === 'stats' ? statsContent : ''}
    ${state.activeTab === 'history' ? historyTabHTML() : ''}
    ${state.activeTab === 'zdravlje' ? zdravljeTabHTML() : ''}

    ${state.activeTab === 'log' ? `
      <div class="card">
        <div class="mode-toggle">
          <button class="mode-btn ${state.mode === 'food' ? 'active' : 'inactive'}" onclick="setMode('food')" ${state.loading || state.productLoading ? 'disabled' : ''}>🍽 Obrok</button>
          <button class="mode-btn ${state.mode === 'exercise' ? 'active' : 'inactive'}" onclick="setMode('exercise')" ${state.loading || state.productLoading ? 'disabled' : ''}>💪 Vežba</button>
          <button class="mode-btn ${state.mode === 'product' ? 'active' : 'inactive'}" onclick="setMode('product')" ${state.loading || state.productLoading ? 'disabled' : ''}>📦 Proizvod</button>
        </div>

        ${state.mode === 'product' ? `
          <textarea class="msg-input" id="productInput" rows="4" placeholder="Opiši proizvod ili dodaj sliku deklaracije..."></textarea>
          ${state.productImageBase64 ? `
          <div class="img-strip" style="margin-top:8px">
            <img src="data:${state.productImageMime||'image/jpeg'};base64,${state.productImageBase64}"/>
            <span style="font-size:12px;color:var(--blue);flex:1">Etiketa priložena — analiziraće se</span>
            <button onclick="state.productImageBase64=null;state.productImageMime=null;scheduleRender()" style="background:none;border:none;color:var(--s9);cursor:pointer;font-size:18px;padding:4px;line-height:1">×</button>
          </div>` : ''}
          <!-- Photo + Send in one row: secondary | primary -->
          <div style="display:flex;gap:8px;margin-top:8px">
            <label class="input-img-label" style="flex-shrink:0;${state.productImageBase64 ? 'color:var(--blue);border-color:rgba(71,200,255,0.4);background:rgba(71,200,255,0.07)' : 'color:var(--text-secondary)'}">
              <span style="font-size:16px;line-height:1">📷</span>
              <span>${state.productImageBase64 ? '✓' : 'Slika'}</span>
              <input type="file" accept="image/*" onchange="handleProductImageSelect(this)"/>
            </label>
            <button class="send-btn" onclick="handleProductSubmit()" ${state.productLoading ? 'disabled' : ''} style="flex:1;margin-top:0">${state.productLoading ? 'Analiziram...' : '+ Analiziraj proizvod'}</button>
          </div>
        ` : `
          <textarea class="msg-input" id="msgInput" rows="4" placeholder="${placeholder}" oninput="state.mode === 'food' ? state.mealInputDraft = this.value : state.exerciseInputDraft = this.value"></textarea>
          ${state.mode === 'food' && state.imageBase64 ? `
          <div class="img-strip" style="margin-top:8px">
            <img src="data:${state.imageMime||'image/jpeg'};base64,${state.imageBase64}"/>
            <span style="font-size:12px;color:var(--blue);flex:1">Slika priložena — analiziraće se uz tekst</span>
            <button onclick="state.imageBase64=null;state.imageMime=null;scheduleRender()" style="background:none;border:none;color:var(--s9);cursor:pointer;font-size:18px;padding:4px;line-height:1">×</button>
          </div>` : ''}
          <!-- Photo + Send in one row: secondary | primary -->
          <div style="display:flex;gap:8px;margin-top:8px">
            ${state.mode === 'food' ? `
            <label class="input-img-label" style="flex-shrink:0;${state.imageBase64 ? 'color:var(--blue);border-color:rgba(71,200,255,0.4);background:rgba(71,200,255,0.07)' : 'color:var(--text-secondary)'}">
              <span style="font-size:16px;line-height:1">📷</span>
              <span>${state.imageBase64 ? '✓' : 'Slika'}</span>
              <input type="file" accept="image/*" onchange="handleImageSelect(this)"/>
            </label>` : ''}
            <button class="send-btn" id="sendBtn" onclick="handleSubmit()" ${state.loading ? 'disabled' : ''} style="flex:1;margin-top:0">${btnText}</button>
          </div>
        `}
      </div>

      ${state.mode === 'product' ? `
        ${state.productLoading ? `
        <div class="skeleton-card">
          <div class="skeleton skeleton-time"></div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding-right:26px">
            <div style="flex:1">
              <div class="skeleton skeleton-line" style="width:75%"></div>
              <div class="skeleton skeleton-line" style="width:55%"></div>
            </div>
            <div class="skeleton skeleton-kcal"></div>
          </div>
          <div class="skeleton-pills">
            <div class="skeleton skeleton-pill"></div>
            <div class="skeleton skeleton-pill"></div>
            <div class="skeleton skeleton-pill"></div>
          </div>
        </div>` : ''}
        ${productsLogHTML()}
      ` : `
        ${state.loading ? `
          <div class="skeleton-card">
            <div class="skeleton skeleton-time"></div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;padding-right:26px">
              <div style="flex:1">
                <div class="skeleton skeleton-line" style="width:80%"></div>
                <div class="skeleton skeleton-line" style="width:60%"></div>
              </div>
              <div class="skeleton skeleton-kcal"></div>
            </div>
            <div class="skeleton-pills">
              <div class="skeleton skeleton-pill"></div>
              <div class="skeleton skeleton-pill"></div>
              <div class="skeleton skeleton-pill"></div>
            </div>
          </div>` : ''}
        ${state.mode === 'food' ? mealsHTML : ''}
        ${state.mode === 'exercise' ? exHTML : ''}
        ${emptyHTML}
        ${state.mode === 'food' && d.meals.length ? `
          <div id="nutrition-score-card" class="card" style="padding:0;overflow:hidden">
            ${state.nutritionScoreLoading ? `
              <div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">
                🤖 AI analizira tvoj unos...
              </div>` :
            state.nutritionScore ? `
              ${(() => {
                const sc = state.nutritionScore;
                const scoreColor = sc.score >= 7 ? 'var(--green)' : sc.score >= 5 ? 'var(--orange)' : 'var(--red)';
                const pct = sc.score * 10;
                const barColor = sc.score >= 7 ? '#8fd42e' : sc.score >= 5 ? '#ffb347' : '#ff4f4f';
                const statusTxt = sc.score >= 7 ? 'Odličan dan' : sc.score >= 5 ? 'Solidan dan' : 'Loš dan';
                return `
              <div style="height:4px;background:linear-gradient(90deg,${barColor} ${pct}%,var(--s4) ${pct}%)"></div>
              <div class="score-header-row" onclick="toggleNutritionScore()" style="padding:12px 16px;display:flex;align-items:center;gap:0;cursor:pointer">
